---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "cloudnative-pg-operator",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "cloudnative-pg-operator",
    },
    values: {
      crds: {
        create: true,
      },
      monitoring: {
        podMonitorEnabled: true,
        grafanaDashboard: {
          create: false,
        },
      },
      config: {
        clusterWide: false,
      },
    },
  },
}
