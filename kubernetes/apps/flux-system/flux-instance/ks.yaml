---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "flux-instance",
  },
  spec: {
    dependsOn: [{
      name: "flux-operator",
    }],
    interval: "1h",
    path: "./kubernetes/apps/flux-system/flux-instance/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
  },
}
