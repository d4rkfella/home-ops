---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "envoy-gateway-instance",
  },
  spec: {
    commonMetadata: {
      labels: {
        app.kubernetes.io/name: "envoy-gateway-instance",
      },
    },
    dependsOn: [{
      name: "envoy-gateway-controller",
    }],
    path: "./kubernetes/apps/envoy-gateway-system/envoy-gateway-instance/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
    interval: "1h",
    timeout: "5m",
    retryInterval: "2m",
  },
}
