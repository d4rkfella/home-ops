---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "home-ops-runner2",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "gha-runner-scale-set",
    },
    values: {
      githubConfigUrl: "https://github.com/d4rkfella/home-ops",
      githubConfigSecret: "home-ops-runner-secret",
      namespaceOverride: "arc-runners",
      minRunners: 1,
      maxRunners: 3,
      containerMode: {
        type: "kubernetes",
        kubernetesModeWorkVolumeClaim: {
          accessModes: [
            "ReadWriteOnce",
          ],
          storageClassName: "openebs-zfs-128k",
          resources: {
            requests: {
              storage: "25Gi",
            },
          },
        },
      },
      template: {
        spec: {
          hostUsers: false,
          securityContext: {
            runAsNonRoot: true,
            seccompProfile: {
              type: "RuntimeDefault",
            },
            runAsUser: 1001,
            fsGroup: 123,
          },
          containers: [{
            name: "runner",
            image: "ghcr.io/actions/actions-runner:2.335.0@sha256:ccdcb5f6ad3ff02cda20d47544b9bc335b9d555b535fb3556da83e823652a8b4",
            command: [
              "/home/runner/run.sh",
            ],
            env: [{
              name: "ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER",
              value: "false",
            }, {
              name: "NODE",
              valueFrom: {
                fieldRef: {
                  fieldPath: "status.hostIP",
                },
              },
            }],
            securityContext: {
              allowPrivilegeEscalation: false,
              readOnlyRootFilesystem: false,
            },
          }],
          serviceAccountName: "home-ops-runner2",
        },
      },
      controllerServiceAccount: {
        name: "actions-runner-controller",
        namespace: "arc-system",
      },
    },
  },
}
