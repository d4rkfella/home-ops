---
# yaml-language-server: $schema=https://kubernetes-schemas-9iu.pages.dev/cert-manager.io/certificate_v1.json
{
  apiVersion: "cert-manager.io/v1",
  kind: "Certificate",
  metadata: {
    name: "openbao-server-cert",
  },
  spec: {
    dnsNames: [
      "openbao.darkfellanetwork.com",
    ],
    duration: "2160h",
    issuerRef: {
      group: "cert-manager.io",
      kind: "ClusterIssuer",
      name: "zerossl-prod",
    },
    privateKey: {
      algorithm: "ECDSA",
      rotationPolicy: "Always",
      size: 256,
      encoding: "PKCS8",
    },
    secretName: "openbao-server-tls",
    usages: [
      "server auth",
    ],
  },
}
