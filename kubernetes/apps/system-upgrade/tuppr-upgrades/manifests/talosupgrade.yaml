---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/tuppr.home-operations.com/talosupgrade_v1alpha1.json
{
  apiVersion: "tuppr.home-operations.com/v1alpha1",
  kind: "TalosUpgrade",
  metadata: {
    name: "talos",
  },
  spec: {
    talos: {
      # renovate: datasource=custom.talos-factory depName=siderolabs/talos
      version: "v1.13.6",
    },
    policy: {
      rebootMode: "default",
    },
    healthChecks: [{
      apiVersion: "volsync.backube/v1alpha1",
      kind: "ReplicationSource",
      expr: "status.conditions.filter(c, c.type == \"Synchronizing\").all(c, c.status == \"False\")",
    }],
    hooks: {
      pre: [{
        name: "nas-nfs-quiesce",
        image: "dtzar/helm-kubectl:3.16",
        serviceAccountName: "tuppr-nfs-hook",
        command: [
          "/bin/bash",
          "/scripts/pre.sh",
        ],
        volumeMounts: [{
          name: "hook-scripts",
          mountPath: "/scripts",
        }],
        volumes: [{
          name: "hook-scripts",
          configMap: {
            name: "nfs-quiesce-scripts",
            defaultMode: 493,
          },
        }],
      }],
      post: [{
        name: "restore-nfs-consumers",
        image: "dtzar/helm-kubectl:3.16",
        serviceAccountName: "tuppr-nfs-hook",
        command: [
          "/bin/bash",
          "/scripts/post.sh",
        ],
        volumeMounts: [{
          name: "hook-scripts",
          mountPath: "/scripts",
        }],
        volumes: [{
          name: "hook-scripts",
          configMap: {
            name: "nfs-quiesce-scripts",
            defaultMode: 493,
          },
        }],
      }],
    },
  },
}
