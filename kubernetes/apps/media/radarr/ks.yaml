---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "radarr",
  },
  spec: {
    healthChecks: [{
      apiVersion: "helm.toolkit.fluxcd.io/v2",
      kind: "HelmRelease",
      name: "radarr",
      namespace: "media",
    }],
    components: ,
    dependsOn: [{
      name: "cloudnative-pg-cluster",
      namespace: "database",
    }, {
      name: "keycloak-instance",
      namespace: "keycloak",
    }],
    path: "./kubernetes/apps/media/radarr/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    interval: "1h",
  },
}
