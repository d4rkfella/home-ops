---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "artifactory",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "artifactory",
    },
    values: {
      global: {
        jfrog: {
          observability: {
            branch: "master",
          },
        },
        prometheus: {
          loki_url: "http://loki-headless.observability.svc.cluster.local:3100",
          release_name: "kube-prometheus-stack",
        },
      },
      mc: {
        enabled: false,
      },
      access: {
        javaOpts: {
          other: "-javaagent:/opt/jfrog/artifactory/app/artifactory/jfrog-artifactory-license-patcher-1.0.jar",
        },
        accessConfig: {
          security: {
            tls: true,
          },
        },
        customCertificatesSecretName: "artifactory-ca",
      },
      jfconnect: {
        enabled: false,
      },
      onemodel: {
        enabled: true,
      },
      evidence: {
        enabled: false,
      },
      event: {
        enabled: false,
      },
      artifactory: {
        statefulset: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
        },
        metrics: {
          enabled: true,
        },
        customInitContainersBegin: "\
           - name: \"prepare-fluentd-conf-on-persistent-volume\"\n\
          \  image: \"{{ include \"artifactory.getImageInfoByValue\" (list . \"initContainers\") }}\"\n\
          \  imagePullPolicy: \"{{ .Values.artifactory.image.pullPolicy }}\"\n\
          \  command: [\"/bin/sh\", \"-c\", \"mkdir -p {{ .Values.artifactory.persistence.mountPath }}/etc/fluentd/; curl https://raw.githubusercontent.com/jfrog/log-analytics-prometheus/{{ .Values.global.jfrog.observability.branch }}/fluent_metrics.conf.rt -o {{ .Values.artifactory.persistence.mountPath }}/etc/fluentd/fluentd.conf\"]\n\
          \  volumeMounts:\n\
          \    - mountPath: \"{{ .Values.artifactory.persistence.mountPath }}\"\n\
          \      name: artifactory-volume\n\
          ",
        customSidecarContainers: "\
           - name: \"artifactory-fluentd-sidecar\"\n\
          \  image: \"releases-docker.jfrog.io/fluentd:4.17@sha256:9a806aca316f8cd2bfd5b09f9b24ad3c3d53f8f31802c6b7e36dffac1f0719ed\"\n\
          \  imagePullPolicy: \"IfNotPresent\"\n\
          \  volumeMounts:\n\
          \    - mountPath: \"{{ .Values.artifactory.persistence.mountPath }}\"\n\
          \      name: artifactory-volume\n\
          \  env:\n\
          \    - name: JF_PRODUCT_DATA_INTERNAL\n\
          \      value: {{ .Values.artifactory.persistence.mountPath }}\n\
          \    - name: LOKI_URL\n\
          \      value: {{ .Values.global.prometheus.loki_url }}\n\
          \    - name: FLUENTD_CONF\n\
          \      value: ../../../..{{ .Values.artifactory.persistence.mountPath }}/etc/fluentd/fluentd.conf\n\
          ",
        image: {
          registry: "ghcr.io",
          repository: "d4rkfella/artifactory-pro",
          tag: "7.146.7@sha256:2d94c5d3772cb9599ba1a8cdc01cf89cfdf438c7b12277f5548113baaa88aed0",
          pullPolicy: "IfNotPresent",
        },
        persistence: {
          size: "200Gi",
        },
        customVolumes: "\
           - name: nfs-backup-volume\n\
          \  nfs:\n\
          \    server: 192.168.91.40\n\
          \    path: /mnt/exos20/artifactory-backup\n\
          ",
        customVolumeMounts: "\
           - name: nfs-backup-volume\n\
          \  mountPath: /mnt/artifactory-backup\n\
          ",
        extraSystemYaml: {
          artifactory: {
            tomcat: {
              httpsConnector: {
                enabled: true,
              },
            },
          },
        },
        masterKeySecretName: "artifactory-secret",
        joinKeySecretName: "artifactory-secret",
        admin: {
          secret: "artifactory-secret",
          dataKey: "bootstrap.creds",
        },
      },
      postgresql: {
        enabled: false,
      },
      database: {
        type: "postgresql",
        driver: "org.postgresql.Driver",
        secrets: {
          user: {
            name: "artifactory-secret",
            key: "db-user",
          },
          password: {
            name: "artifactory-secret",
            key: "db-password",
          },
          url: {
            name: "artifactory-secret",
            key: "db-url",
          },
        },
      },
      nginx: {
        enabled: false,
      },
      additionalResources: "\
         apiVersion: v1\n\
         kind: Service\n\
         metadata:\n\
        \  name: {{ template \"artifactory.fullname\" . }}-metrics\n\
        \  labels:\n\
        \    app: {{ template \"artifactory.name\" . }}\n\
        \    component: {{ template \"artifactory.name\" . }}\n\
        \    chart: {{ template \"artifactory.chart\" . }}\n\
        \    heritage: {{ .Release.Service }}\n\
        \    release: {{ .Values.global.prometheus.release_name }}\n\
         spec:\n\
        \  type: ClusterIP\n\
        \  ports:\n\
        \  - name: metrics\n\
        \    port: 24231\n\
        \    targetPort: 8082\n\
        \    protocol: TCP\n\
        \  selector:\n\
        \    app: {{ template \"artifactory.name\" . }}\n\
        \    component: {{ template \"artifactory.name\" . }}\n\
         ---\n\
         apiVersion: monitoring.coreos.com/v1\n\
         kind: ServiceMonitor\n\
         metadata:\n\
        \  name: servicemonitor-{{ template \"artifactory.name\" . }}\n\
        \  labels:\n\
        \    metrics: jfrog\n\
        \    app: {{ template \"artifactory.name\" . }}\n\
        \    chart: {{ template \"artifactory.chart\" . }}\n\
        \    heritage: {{ .Release.Service }}\n\
        \    release: {{ .Values.global.prometheus.release_name }}\n\
         spec:\n\
        \  selector:\n\
        \    matchLabels:\n\
        \      app: {{ template \"artifactory.name\" . }}\n\
        \      component: {{ template \"artifactory.name\" . }}\n\
        \  endpoints:\n\
        \  - port: metrics\n\
        \    scheme: https\n\
        \    path: /artifactory/api/v1/metrics\n\
        \    interval: 15s\n\
        \    tlsConfig:\n\
        \      insecureSkipVerify: true\n\
        \    bearerTokenSecret:\n\
        \      name: artifactory-secret\n\
        \      key: jfrog-metrics-token\n\
         ---\n\
         apiVersion: v1\n\
         kind: Service\n\
         metadata:\n\
        \  name: {{ .Values.observability.name }}-metrics\n\
        \  labels:\n\
        \    app: {{ .Values.observability.name }}\n\
        \    component: {{ .Values.observability.name }}\n\
        \    chart: {{ template \"artifactory.chart\" . }}\n\
        \    heritage: {{ .Release.Service }}\n\
        \    release: {{ .Values.global.prometheus.release_name }}\n\
         spec:\n\
        \  type: ClusterIP\n\
        \  ports:\n\
        \  - name: metricsob\n\
        \    port: 24232\n\
        \    targetPort: 8082\n\
        \    protocol: TCP\n\
        \  selector:\n\
        \    app: {{ template \"artifactory.name\" . }}\n\
        \    component: {{ template \"artifactory.name\" . }}\n\
         ---\n\
         apiVersion: monitoring.coreos.com/v1\n\
         kind: ServiceMonitor\n\
         metadata:\n\
        \  name: servicemonitor-{{ .Values.observability.name }}\n\
        \  labels:\n\
        \    metrics: jfrog\n\
        \    app: {{ .Values.observability.name }}\n\
        \    chart: {{ template \"artifactory.chart\" . }}\n\
        \    heritage: {{ .Release.Service }}\n\
        \    release: {{ .Values.global.prometheus.release_name }}\n\
         spec:\n\
        \  selector:\n\
        \    matchLabels:\n\
        \      app: {{ .Values.observability.name }}\n\
        \      component: {{ .Values.observability.name }}\n\
        \  endpoints:\n\
        \  - port: metricsob\n\
        \    scheme: https\n\
        \    path: /observability/api/v1/metrics\n\
        \    interval: 15s\n\
        \    tlsConfig:\n\
        \      insecureSkipVerify: true\n\
        \    bearerTokenSecret:\n\
        \      name: artifactory-secret\n\
        \      key: jfrog-metrics-token\n\
        ",
    },
  },
}
