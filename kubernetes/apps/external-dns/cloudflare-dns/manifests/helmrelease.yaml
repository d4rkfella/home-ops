---
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "cloudflare-dns",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "external-dns",
    },
    postRenderers: [{
      kustomize: {
        patches: [{
          target: {
            kind: "Deployment",
            name: "cloudflare-dns",
          },
          patch: "\
             - op: add\n\
            \  path: /spec/template/spec/hostUsers\n\
            \  value: false\
            ",
        }],
      },
    }],
    values: {
      fullnameOverride: "cloudflare-dns",
      provider: {
        name: "cloudflare",
      },
      env: [{
        name: "CF_API_TOKEN",
        valueFrom: {
          secretKeyRef: {
            name: "cloudflare-dns-secret",
            key: "CF_API_TOKEN",
          },
        },
      }, {
        name: "CF_ZONE_ID",
        valueFrom: {
          secretKeyRef: {
            name: "cloudflare-dns-secret",
            key: "CF_ZONE_ID",
          },
        },
      }],
      extraArgs: [
        "--cloudflare-dns-records-per-page=1000",
        "--cloudflare-proxied",
        "--crd-source-apiversion=externaldns.k8s.io/v1alpha1",
        "--crd-source-kind=DNSEndpoint",
        "--gateway-name=external",
        "--zone-id-filter=$(CF_ZONE_ID)",
      ],
      triggerLoopOnEvent: true,
      policy: "sync",
      sources: [
        "crd",
        "gateway-httproute",
      ],
      txtOwnerId: "default",
      txtPrefix: "k8s.",
      domainFilters: [
        "darkfellanetwork.com",
      ],
      serviceMonitor: {
        enabled: true,
      },
      podAnnotations: {
        secret.reloader.stakater.com/reload: "cloudflare-dns-secret",
      },
    },
  },
}
