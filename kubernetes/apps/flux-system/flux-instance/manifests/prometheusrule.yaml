---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
{
  apiVersion: "monitoring.coreos.com/v1",
  kind: "PrometheusRule",
  metadata: {
    name: "flux-instance-rules",
  },
  spec: {
    groups: [{
      name: "flux-instance.rules",
      rules: [{
        alert: "FluxInstanceAbsent",
        expr: "\
           absent(flux_instance_info{exported_namespace=\"flux-system\", name=\"flux\"})\n\
          ",
        for: "5m",
        annotations: {
          summary: "Flux instance metric is missing",
        },
        labels: {
          severity: "critical",
        },
      }, {
        alert: "FluxInstanceNotReady",
        expr: "\
           flux_instance_info{exported_namespace=\"flux-system\", name=\"flux\", ready!=\"True\"}\n\
          ",
        for: "5m",
        annotations: {
          summary: "Flux instance {{ $labels.name }} is not ready",
        },
        labels: {
          severity: "critical",
        },
      }],
    }],
  },
}
