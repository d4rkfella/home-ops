---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/external-secrets.io/pushsecret_v1alpha1.json
{
  apiVersion: "external-secrets.io/v1alpha1",
  kind: "PushSecret",
  metadata: {
    name: "postgres-db-ca",
  },
  spec: {
    refreshInterval: "5m",
    secretStoreRefs: [{
      name: "hashicorp-vault",
      kind: "ClusterSecretStore",
    }],
    selector: {
      secret: {
        name: "postgres-db-ca",
      },
    },
    data: [{
      match: {
        secretKey: "ca.crt",
        remoteRef: {
          remoteKey: "certificates/postgres",
          property: "ca.crt",
        },
      },
    }],
  },
}
