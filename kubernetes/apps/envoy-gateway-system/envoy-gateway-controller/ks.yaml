---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "envoy-gateway-controller",
  },
  spec: {
    commonMetadata: {
      labels: {
        app.kubernetes.io/name: "envoy-gateway-controller",
      },
    },
    path: "./kubernetes/apps/envoy-gateway-system/envoy-gateway-controller/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    healthChecks: [{
      apiVersion: "helm.toolkit.fluxcd.io/v2",
      kind: "HelmRelease",
      name: "envoy-gateway-controller",
      namespace: "envoy-gateway-system",
    }],
    interval: "1h",
    timeout: "5m",
    retryInterval: "2m",
  },
}
