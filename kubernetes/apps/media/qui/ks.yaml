---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "qui",
  },
  spec: {
    interval: "1h",
    path: "./kubernetes/apps/media/qui/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
  },
}
