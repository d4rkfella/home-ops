---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "gatus",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "gatus",
    },
    values: {
      controllers: {
        gatus: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          initContainers: {
            gatus-sidecar: {
              image: {
                repository: "ghcr.io/home-operations/gatus-sidecar",
                tag: "0.2.2@sha256:1a68c2ede0397e1c4380e9f874bbebbd06562a6c5750c5978c771743ecab1812",
              },
              args: [
                "--auto-httproute",
                "--enable-httproute",
                "--enable-service",
              ],
              resources: {
                requests: {
                  cpu: "10m",
                },
                limits: {
                  memory: "64Mi",
                },
              },
              restartPolicy: "Always",
            },
          },
          containers: {
            app: {
              image: {
                repository: "ghcr.io/twin/gatus",
                tag: "v5.36.0@sha256:c5f210d095fa78e6efaa20ffeb14803f2ba4f10615e16a6d12087697149617f0",
              },
              env: {
                TZ: "Europe/Sofia",
                GATUS_CONFIG_PATH: "/config",
                GATUS_DELAY_START_SECONDS: 5,
                WEB_PORT: 80,
                POSTGRES_HOST: "postgres-db-rw.database.svc.cluster.local",
                POSTGRES_PORT: 5432,
                POSTGRES_DBNAME: "gatus",
                POSTGRES_USERNAME: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "gatus-secret",
                      key: "POSTGRES_USERNAME",
                    },
                  },
                },
                POSTGRES_PASSWORD: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "gatus-secret",
                      key: "POSTGRES_PASSWORD",
                    },
                  },
                },
                PUSHOVER_TOKEN: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "gatus-secret",
                      key: "PUSHOVER_TOKEN",
                    },
                  },
                },
                PUSHOVER_USER_KEY: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "gatus-secret",
                      key: "PUSHOVER_USER_KEY",
                    },
                  },
                },
                OIDC_CLIENT_SECRET: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "gatus-secret",
                      key: "OIDC_CLIENT_SECRET",
                    },
                  },
                },
              },
              probes: {
                liveness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/health",
                      port: 80,
                    },
                    initialDelaySeconds: 0,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
                readiness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/health",
                      port: 80,
                    },
                    initialDelaySeconds: 0,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
              resources: {
                requests: {
                  cpu: "100m",
                },
                limits: {
                  memory: "256Mi",
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        hostUsers: false,
        automountServiceAccountToken: true,
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
        },
      },
      service: {
        app: {
          ports: {
            http: {
              port: 80,
            },
          },
        },
      },
      serviceMonitor: {
        app: {
          endpoints: [{
            port: "http",
          }],
        },
      },
      route: {
        app: {
          hostnames: [
            "status.darkfellanetwork.com",
            "{{ .Release.Name }}.darkfellanetwork.com",
          ],
          annotations: {
            gatus.home-operations.com/enabled: "false",
          },
          parentRefs: [{
            name: "external",
            namespace: "envoy-gateway-system",
            sectionName: "https",
          }],
        },
      },
      persistence: {
        config: {
          type: "emptyDir",
        },
        config-file: {
          type: "configMap",
          name: "gatus-configmap",
          globalMounts: [{
            path: "/config/config.yaml",
            subPath: "config.yaml",
            readOnly: true,
          }],
        },
        postgres-ca: {
          type: "secret",
          name: "gatus-secret",
          advancedMounts: {
            gatus: {
              app: [{
                path: "/etc/ssl/certs/postgres-ca.crt",
                subPath: "ca.crt",
                readOnly: true,
              }],
            },
          },
        },
      },
      rbac: {
        roles: {
          gatus: {
            type: "ClusterRole",
            rules: [{
              apiGroups: [
                "",
              ],
              resources: [
                "services",
              ],
              verbs: [
                "get",
                "list",
                "watch",
              ],
            }, {
              apiGroups: [
                "gateway.networking.k8s.io",
              ],
              resources: [
                "httproutes",
                "gateways",
              ],
              verbs: [
                "get",
                "list",
                "watch",
              ],
            }],
          },
        },
        bindings: {
          gatus: {
            type: "ClusterRoleBinding",
            roleRef: {
              identifier: "gatus",
            },
            subjects: [{
              identifier: "gatus",
            }],
          },
        },
      },
    },
  },
}
