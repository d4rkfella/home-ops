---
{
  # yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "collabora",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "collabora",
    },
    values: {
      fullnameOverride: "collabora",
      collabora: {
        aliasgroups: [{
          host: "https://filestash.darkfellanetwork.com:443",
        }],
        extra_params: "--o:ssl.enable=false --o:ssl.termination=true",
        server_name: "office.darkfellanetwork.com",
        existingSecret: {
          enabled: true,
          secretName: "collabora-credentials",
        },
        proofKeysSecretRef: "collabora-proof-key",
      },
      podSecurityContext: {},
      securityContext: {
        privileged: false,
        readOnlyRootFilesystem: false,
        runAsNonRoot: true,
        allowPrivilegeEscalation: true,
        seccompProfile: {
          type: "Localhost",
          localhostProfile: "cool-seccomp-profile.json",
        },
        capabilities: {
          drop: [
            "ALL",
          ],
          add: [
            "SYS_ADMIN",
            "SYS_CHROOT",
            "FOWNER",
            "CHOWN",
          ],
        },
      },
      installCOOLSeccompProfile: false,
      route: {
        enabled: true,
        apiVersion: "gateway.networking.k8s.io/v1",
        kind: "HTTPRoute",
        hostnames: [
          "office.darkfellanetwork.com",
        ],
        parentRefs: [{
          name: "internal",
          namespace: "envoy-gateway-system",
          sectionName: "https",
        }],
        matches: [{
          path: {
            type: "PathPrefix",
            value: "/",
          },
        }],
      },
      extraVolumes: [{
        name: "custom-css",
        configMap: {
          name: "collabora-custom-css",
        },
      }],
      extraVolumeMounts: [{
        name: "custom-css",
        mountPath: "/usr/share/coolwsd/browser/dist/branding-desktop.css",
        subPath: "branding-desktop.css",
      }],
    },
  },
}
