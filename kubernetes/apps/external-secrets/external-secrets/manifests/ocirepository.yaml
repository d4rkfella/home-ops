---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
{
  apiVersion: "source.toolkit.fluxcd.io/v1",
  kind: "OCIRepository",
  metadata: {
    name: "external-secrets",
  },
  spec: {
    interval: "15m",
    layerSelector: {
      mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip",
      operation: "copy",
    },
    ref: {
      tag: "2.4.0",
    },
    url: "oci://ghcr.io/external-secrets/charts/external-secrets",
    verify: {
      provider: "cosign",
      matchOIDCIdentity: [{
        issuer: "https://token.actions.githubusercontent.com",
        subject: "https://github.com/external-secrets/external-secrets/.github/workflows/helm.yml@refs/heads/main",
      }],
    },
  },
}
