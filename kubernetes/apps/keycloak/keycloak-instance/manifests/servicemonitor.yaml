---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/monitoring.coreos.com/servicemonitor_v1.json
{
  apiVersion: "monitoring.coreos.com/v1",
  kind: "ServiceMonitor",
  metadata: {
    name: "keycloak",
  },
  spec: {
    endpoints: [{
      port: "management",
      path: "/metrics",
    }],
    jobLabel: "keycloak",
    namespaceSelector: {
      matchNames: [
        "keycloak",
      ],
    },
    selector: {
      matchLabels: {
        app: "keycloak",
        app.kubernetes.io/instance: "keycloak",
        app.kubernetes.io/managed-by: "keycloak-operator",
      },
    },
  },
}
