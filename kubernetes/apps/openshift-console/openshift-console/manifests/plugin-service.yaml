---
{
  apiVersion: "v1",
  kind: "Service",
  metadata: {
    name: "kubevirt-plugin",
    labels: {
      app: "kubevirt-plugin",
    },
  },
  spec: {
    type: "ClusterIP",
    ports: [{
      name: "http",
      port: 80,
      targetPort: 80,
      protocol: "TCP",
    }],
    selector: {
      app: "kubevirt-plugin",
    },
  },
}
