---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "actions-runner-controller",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "gha-runner-scale-set-controller",
    },
    postRenderers: [{
      kustomize: {
        patches: [{
          target: {
            kind: "Deployment",
          },
          patch: "\
             - op: add\n\
            \  path: /spec/template/spec/hostUsers\n\
            \  value: false\n\
             - op: replace\n\
            \  path: /spec/template/spec/containers/0/command\n\
            \  value:\n\
            \    - /usr/bin/manager\n\
            ",
        }],
      },
    }],
    values: {
      fullnameOverride: "actions-runner-controller",
      replicaCount: 1,
      podSecurityContext: {
        runAsNonRoot: true,
        runAsUser: 65532,
        runAsGroup: 65532,
        seccompProfile: {
          type: "RuntimeDefault",
        },
      },
      securityContext: {
        allowPrivilegeEscalation: false,
        readOnlyRootFilesystem: true,
        capabilities: {
          drop: [
            "ALL",
          ],
        },
      },
      flags: {
        watchSingleNamespace: "arc-runners",
      },
      namespaceOverride: "arc-system",
      image: {
        repository: "ghcr.io/d4rkfella/actions-runner-controller",
        pullPolicy: "IfNotPresent",
        tag: "0.14.0@sha256:16f17a9d9f6e10c29c6bee116c16a5c92cd410055b15553b3ff1b122313649e2",
      },
    },
  },
}
