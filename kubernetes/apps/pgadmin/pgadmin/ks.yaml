---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "pgadmin",
  },
  spec: {
    components: [
      "../../../../components/volsync",
    ],
    postBuild: {
      substitute: {
        APP: "pgadmin",
        VOLSYNC_PUID: "5050",
        VOLSYNC_PGID: "5050",
      },
    },
    path: "./kubernetes/apps/pgadmin/pgadmin/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    interval: "1h",
  },
}
