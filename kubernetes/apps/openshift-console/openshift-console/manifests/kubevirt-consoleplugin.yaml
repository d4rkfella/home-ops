---
{
  apiVersion: "console.openshift.io/v1",
  kind: "ConsolePlugin",
  metadata: {
    name: "kubevirt-plugin",
  },
  spec: {
    displayName: "KubeVirt Plugin",
    backend: {
      type: "Service",
      service: {
        name: "kubevirt-plugin",
        namespace: "openshift-console",
        port: 8080,
        basePath: "/",
      },
    },
    proxy: [{
      alias: "kubevirt-plugin",
      authorization: "None",
      endpoint: {
        type: "Service",
        service: {
          name: "kubevirt-plugin",
          namespace: "openshift-console",
          port: 8080,
        },
      },
    }],
    i18n: {
      loadType: "Preload",
    },
  },
}
