---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/gateway.networking.k8s.io/httproute_v1beta1.json
{
  apiVersion: "gateway.networking.k8s.io/v1",
  kind: "HTTPRoute",
  metadata: {
    name: "keycloak",
  },
  spec: {
    hostnames: [
      "accounts.darkfellanetwork.com",
    ],
    parentRefs: [{
      name: "external",
      namespace: "envoy-gateway-system",
      sectionName: "https",
    }],
    rules: [{
      backendRefs: [{
        name: "keycloak-service",
        namespace: "keycloak",
        port: 80,
      }],
    }],
  },
}
