---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "cloudflared",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "cloudflared",
    },
    values: {
      controllers: {
        cloudflared: {
          replicas: 2,
          strategy: "RollingUpdate",
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          containers: {
            app: {
              image: {
                repository: "ghcr.io/d4rkfella/cloudflared",
                tag: "2026.5.0@sha256:8deaab2c322688be97e806c2ee40e51b875a0d166f23c447eb111bade621a981",
              },
              env: {
                NO_AUTOUPDATE: true,
                TUNNEL_METRICS: "0.0.0.0:8080",
                TUNNEL_ORIGIN_ENABLE_HTTP2: true,
                TUNNEL_TRANSPORT_PROTOCOL: "quic",
                TUNNEL_POST_QUANTUM: true,
              },
              envFrom: [{
                secretRef: {
                  name: "{{ .Release.Name }}-secret",
                },
              }],
              args: [
                "tunnel",
                "run",
              ],
              probes: {
                liveness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/ready",
                      port: 8080,
                    },
                    initialDelaySeconds: 0,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
                readiness: {
                    enabled: true,
                    custom: true,
                    spec: {
                      httpGet: {
                        path: "/ready",
                        port: 8080,
                      },
                      initialDelaySeconds: 0,
                      periodSeconds: 10,
                      timeoutSeconds: 1,
                      failureThreshold: 3,
                    },
                  },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
              resources: {
                requests: {
                  cpu: "10m",
                },
                limits: {
                  memory: "256Mi",
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        hostUsers: false,
        securityContext: {
          sysctls: [{
            name: "net.ipv4.ping_group_range",
            value: "65532       65532",
          }],
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      service: {
        app: {
          ports: {
            http: {
              port: 8080,
            },
          },
        },
      },
      serviceMonitor: {
        app: {
          endpoints: [{
            port: "http",
          }],
        },
      },
      configMaps: {
        config: {
          data: {
            config.yaml: "\
               originRequest:\n\
              \  matchSNItoHost: true\n\
               ingress:\n\
              \  - hostname: darkfellanetwork.com\n\
              \    service: https://external.envoy-gateway-system.svc.cluster.local\n\
              \  - hostname: \"*.darkfellanetwork.com\"\n\
              \    service: https://external.envoy-gateway-system.svc.cluster.local\n\
              \  - service: http_status:404\
              ",
          },
        },
      },
      persistence: {
        config: {
          type: "configMap",
          identifier: "config",
          globalMounts: [{
            path: "/etc/cloudflared/config.yaml",
            subPath: "config.yaml",
            readOnly: true,
          }],
        },
      },
    },
  },
}
