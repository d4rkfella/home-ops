---
{
  apiVersion: "apps/v1",
  kind: "Deployment",
  metadata: {
    name: "kubevirt-plugin",
    labels: {
      app: "kubevirt-plugin",
    },
  },
  spec: {
    replicas: 1,
    selector: {
      matchLabels: {
        app: "kubevirt-plugin",
      },
    },
    template: {
      metadata: {
        labels: {
          app: "kubevirt-plugin",
        },
      },
      spec: {
        initContainers: [{
          name: "setup",
          image: "ghcr.io/d4rkfella/kubevirt-plugin:dev@sha256:adc0532ed1d7fee6d7bca1293572c91f1e3def4f1afb9e09d3360964f824328d",
          command: [
            "sh",
            "-c",
          ],
          args: [
            "cp -r /opt/app-root/etc/* /tmp/app-root-etc/ && cp -r /var/lib/nginx/* /tmp/nginx-lib/ && cp -r /usr/share/nginx/html/* /tmp/src/",
          ],
          volumeMounts: [{
            name: "app-root-etc",
            mountPath: "/tmp/app-root-etc",
          }, {
            name: "nginx-lib",
            mountPath: "/tmp/nginx-lib",
          }, {
            name: "src",
            mountPath: "/tmp/src",
          }],
          securityContext: {
            allowPrivilegeEscalation: false,
            readOnlyRootFilesystem: true,
            runAsNonRoot: true,
            runAsUser: 1000,
          },
        }],
        containers: [{
          name: "plugin",
          image: "ghcr.io/d4rkfella/kubevirt-plugin:dev@sha256:adc0532ed1d7fee6d7bca1293572c91f1e3def4f1afb9e09d3360964f824328d",
          ports: [{
            name: "http",
            containerPort: 8080,
            protocol: "TCP",
          }],
          resources: {
            requests: {
              cpu: "50m",
              memory: "128Mi",
            },
            limits: {
              cpu: "200m",
              memory: "256Mi",
            },
          },
          securityContext: {
            allowPrivilegeEscalation: false,
            readOnlyRootFilesystem: true,
            runAsNonRoot: true,
            runAsUser: 1000,
            capabilities: {
              drop: [
                "ALL",
              ],
            },
          },
          volumeMounts: [{
            name: "app-root-etc",
            mountPath: "/opt/app-root/etc",
          }, {
            name: "nginx-logs",
            mountPath: "/var/log/nginx",
          }, {
            name: "nginx-cache",
            mountPath: "/var/cache/nginx",
          }, {
            name: "nginx-run",
            mountPath: "/var/run",
          }, {
            name: "nginx-lib",
            mountPath: "/var/lib/nginx",
          }, {
            name: "serving-cert",
            mountPath: "/var/serving-cert",
          }, {
            name: "src",
            mountPath: "/opt/app-root/src",
          }],
        }],
        volumes: [{
          name: "app-root-etc",
          emptyDir: {},
        }, {
          name: "nginx-logs",
          emptyDir: {},
        }, {
          name: "nginx-cache",
          emptyDir: {},
        }, {
          name: "nginx-run",
          emptyDir: {},
        }, {
          name: "nginx-lib",
          emptyDir: {},
        }, {
          name: "src",
          emptyDir: {},
        }, {
          name: "serving-cert",
          secret: {
            secretName: "kubevirt-plugin-serving-cert",
          },
        }],
      },
    },
  },
}
