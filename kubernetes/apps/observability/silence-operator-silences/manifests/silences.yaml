---
{
  apiVersion: "observability.giantswarm.io/v1alpha2",
  kind: "Silence",
  metadata: {
    name: "zfs-volume-usage-critical-truenas-os-disk",
  },
  spec: {
    matchers: [{
      name: "alertname",
      value: "ZFSVolumeUsageCritical",
    }, {
      name: "persistentvolumeclaim",
      value: "truenas-os-disk",
    }, {
      name: "namespace",
      value: "virtualization",
    }, {
      name: "node",
      value: "k8s-0",
    }, {
      name: "severity",
      value: "warning",
    }],
  },
}
---
{
  apiVersion: "observability.giantswarm.io/v1alpha2",
  kind: "Silence",
  metadata: {
    name: "cdi-default-storage-class-degraded",
  },
  spec: {
    matchers: [{
      name: "alertname",
      value: "CDIDefaultStorageClassDegraded",
    }, {
      name: "severity",
      value: "warning",
    }],
  },
}
