---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "radarr",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "radarr",
    },
    values: {
      controllers: {
        radarr: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          containers: {
            app: {
              image: {
                repository: "ghcr.io/d4rkfella/radarr",
                tag: "6.2.0.10390@sha256:d4cf6cb0c8b35b5b1427f0ebf6965ed82158b86c3348095d1b31dcb9086a53d2",
              },
              env: {
                TZ: "Europe/Sofia",
                RADARR__APP__INSTANCENAME: "Radarr",
                RADARR__APP__THEME: "dark",
                RADARR__AUTH__METHOD: "External",
                RADARR__AUTH__REQUIRED: "DisabledForLocalAddresses",
                RADARR__LOG__DBENABLED: "False",
                RADARR__LOG__LEVEL: "info",
                RADARR__SERVER__PORT: 80,
                RADARR__SERVER__BINDADDRESS: "0.0.0.0",
                RADARR__AUTH__APIKEY: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "{{ .Release.Name }}-secret",
                      key: "RADARR_API_KEY",
                    },
                  },
                },
                RADARR__POSTGRES__HOST: "postgres-db-rw.database.svc.cluster.local",
                RADARR__POSTGRES__MAINDB: "{{ .Release.Name }}",
                RADARR__POSTGRES__USER: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "{{ .Release.Name }}-secret",
                      key: "POSTGRES_USERNAME",
                    },
                  },
                },
                RADARR__POSTGRES__PASSWORD: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "{{ .Release.Name }}-secret",
                      key: "POSTGRES_PASSWORD",
                    },
                  },
                },
              },
              probes: {
                liveness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/ping",
                      port: 80,
                    },
                    initialDelaySeconds: 2,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
                readiness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/ping",
                      port: 80,
                    },
                    initialDelaySeconds: 2,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
              resources: {
                requests: {
                  cpu: "100m",
                  memory: "512Mi",
                },
                limits: {
                  memory: "4Gi",
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      service: {
        app: {
          controller: "radarr",
          ports: {
            http: {
              port: 80,
            },
          },
        },
      },
      route: {
        app: {
          hostnames: [
            "{{ .Release.Name }}.darkfellanetwork.com",
          ],
          parentRefs: [{
            name: "internal",
            namespace: "envoy-gateway-system",
            sectionName: "https",
          }],
          rules: [{
            backendRefs: [{
              name: "radarr",
              port: 80,
            }],
          }],
        },
      },
      persistence: {
        config: {
          suffix: "config",
          type: "persistentVolumeClaim",
          size: "15Gi",
          accessMode: "ReadWriteOnce",
          storageClass: "openebs-zfs-128k",
          globalMounts: [{
            path: "/config",
          }],
        },
        tmp: {
          type: "emptyDir",
        },
        media: {
          type: "nfs",
          server: "192.168.91.40",
          path: "/mnt/exos20/data",
          globalMounts: [{
            path: "/data",
          }],
        },
      },
    },
  },
}
