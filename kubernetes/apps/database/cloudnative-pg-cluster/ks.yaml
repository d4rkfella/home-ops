---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "cloudnative-pg-cluster",
  },
  spec: {
    healthCheckExprs: [{
      apiVersion: "postgresql.cnpg.io/v1",
      kind: "Cluster",
      failed: "status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')",
      current: "status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')",
    }],
    dependsOn: [{
      name: "cloudnative-pg-operator",
    }, {
      name: "cloudnative-pg-barman-cloud",
    }],
    path: "./kubernetes/apps/database/cloudnative-pg-cluster/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: true,
    interval: "1h",
  },
}
