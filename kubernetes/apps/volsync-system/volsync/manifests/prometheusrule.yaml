---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
{
  apiVersion: "monitoring.coreos.com/v1",
  kind: "PrometheusRule",
  metadata: {
    name: "volsync",
  },
  spec: {
    groups: [{
      name: "volsync.rules",
      rules: [{
        alert: "VolSyncComponentAbsent",
        annotations: {
          summary: "VolSync component has disappeared from Prometheus target discovery.",
        },
        expr: "\
           absent(up{job=\"volsync-metrics\"})\n\
          ",
        for: "15m",
        labels: {
          severity: "critical",
        },
      }, {
        alert: "VolSyncVolumeOutOfSync",
        annotations: {
          summary: "{{ $labels.obj_namespace }}/{{ $labels.obj_name }} volume is out of sync.",
        },
        expr: "\
           volsync_volume_out_of_sync == 1\n\
          ",
        for: "15m",
        labels: {
          severity: "critical",
        },
      }],
    }],
  },
}
