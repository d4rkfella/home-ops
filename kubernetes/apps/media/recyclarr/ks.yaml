---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "recyclarr",
  },
  spec: {
    dependsOn: [{
      name: "radarr",
      namespace: "media",
    }, {
      name: "sonarr",
      namespace: "media",
    }],
    interval: "1h",
    path: "./kubernetes/apps/media/recyclarr/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
  },
}
