---
{
  # yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "qui",
  },
  spec: {
    chartRef: {
      kind: "OCIRepository",
      name: "qui",
    },
    interval: "1h",
    values: {
      controllers: {
        qui: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          containers: {
            app: {
              image: {
                repository: "ghcr.io/autobrr/qui",
                tag: "develop@sha256:d4410e0ccc5b53b03cded7909efc930f9408b886b5ed56aee3fc86573c343ac2",
              },
              env: {
                QUI__HOST: "0.0.0.0",
                QUI__PORT: 80,
                QUI__DATABASE_ENGINE: "postgres",
                QUI__OIDC_ENABLED: true,
                QUI__OIDC_ISSUER: "https://accounts.darkfellanetwork.com/realms/DarkfellaNET",
                QUI__OIDC_CLIENT_ID: "466c6b7f-3314-41f6-84d7-adb366b7566f",
                QUI__OIDC_REDIRECT_URL: "https://qui.darkfellanetwork.com/api/auth/oidc/callback",
                QUI__OIDC_DISABLE_BUILT_IN_LOGIN: true,
                TZ: "Europe/Sofia",
              },
              envFrom: [{
                secretRef: {
                  name: "{{ .Release.Name }}-secret",
                },
              }],
              probes: {
                liveness: {
                  enabled: true,
                  spec: {
                    periodSeconds: 30,
                    timeoutSeconds: 5,
                    failureThreshold: 5,
                  },
                },
                readiness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/health",
                      port: 80,
                    },
                    periodSeconds: 10,
                    timeoutSeconds: 5,
                    failureThreshold: 5,
                  },
                },
                startup: {
                  enabled: true,
                  spec: {
                    failureThreshold: 30,
                    periodSeconds: 10,
                  },
                },
              },
              resources: {
                requests: {
                  cpu: "10m",
                },
                limits: {
                  memory: "2Gi",
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
        },
      },
      service: {
        app: {
          ports: {
            http: {
              port: 80,
            },
          },
        },
      },
      configMaps: {
        config: {
          data: {
            config.toml: "\
               databaseEngine = \"postgres\"\n\
              ",
          },
        },
      },
      route: {
        app: {
          hostnames: [
            "{{ .Release.Name }}.darkfellanetwork.com",
          ],
          parentRefs: [{
            name: "internal",
            namespace: "envoy-gateway-system",
          }],
        },
      },
      persistence: {
        config: {
          type: "emptyDir",
          globalMounts: [{
            path: "/config",
          }],
        },
        config-toml: {
          type: "configMap",
          name: "qui",
          globalMounts: [{
            path: "/config/config.toml",
            subPath: "config.toml",
            readOnly: true,
          }],
        },
        media: {
          type: "nfs",
          server: "192.168.91.40",
          path: "/mnt/exos20/data",
          globalMounts: [{
            path: "/data",
          }],
        },
        postgres-ca: {
          type: "secret",
          name: "{{ .Release.Name }}-secret",
          globalMounts: [{
            path: "/etc/ssl/certs/postgres-ca.crt",
            subPath: "ca.crt",
            readOnly: true,
          }],
        },
      },
    },
  },
}
