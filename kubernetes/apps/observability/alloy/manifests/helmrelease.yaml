---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "alloy",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "alloy",
    },
    postRenderers: [{
      kustomize: {
        patches: [{
          target: {
            kind: "StatefulSet",
            name: "alloy",
          },
          patch: "\
             - op: add\n\
            \  path: /spec/template/spec/hostUsers\n\
            \  value: false\
            ",
        }],
      },
    }],
    values: {
      fullnameOverride: "alloy",
      serviceMonitor: {
        enabled: true,
      },
      alloy: {
        configMap: {
          create: false,
          name: "alloy-configmap",
          key: "config.alloy",
        },
        storagePath: "/var/lib/alloy",
        enableReporting: false,
        mounts: {
          extra: [{
            name: "alloy",
            mountPath: "/var/lib/alloy",
          }, {
            name: "host-rootfs-path",
            mountPath: "/host/root",
          }, {
            name: "host-procfs-path",
            mountPath: "/host/proc",
          }, {
            name: "host-sysfs-path",
            mountPath: "/host/sys",
          }],
        },
      },
      controller: {
        podAnnotations: {
          configmap.reloader.stakater.com/reload: "alloy-configmap",
        },
        type: "statefulset",
        replicas: 1,
        enableStatefulSetAutoDeletePVC: true,
        volumeClaimTemplates: [{
          metadata: {
            name: "alloy",
          },
          spec: {
            accessModes: [
              "ReadWriteOnce",
            ],
            storageClassName: "openebs-zfs-128k",
            resources: {
              requests: {
                storage: "5Gi",
              },
            },
          },
        }],
      },
    },
  },
}
