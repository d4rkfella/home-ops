---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "qbittorrent",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "qbittorrent",
    },
    dependsOn: [{
      name: "volsync",
      namespace: "volsync-system",
    }],
    values: {
      controllers: {
        qbittorrent: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          containers: {
            app: {
              image: {
                repository: "ghcr.io/d4rkfella/qbittorrent",
                tag: "5.1.4.2012@sha256:1bd4b73b6cf1bcf93f17d68029b94c0c85ceb644207f22edeedf5a5b34af3f38",
              },
              env: {
                TZ: "Europe/Sofia",
              },
              probes: {
                readiness: {
                  enabled: false,
                  spec: {
                    initialDelaySeconds: 2,
                    periodSeconds: 10,
                    failureThreshold: 3,
                  },
                },
                liveness: {
                  enabled: false,
                  spec: {
                    initialDelaySeconds: 2,
                    periodSeconds: 10,
                    failureThreshold: 3,
                  },
                },
                startup: {
                  enabled: true,
                  spec: {
                    failureThreshold: 30,
                    periodSeconds: 10,
                  },
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
              resources: {
                requests: {
                  cpu: "100m",
                },
                limits: {
                  memory: "10Gi",
                },
              },
            },
            git-sync: {
              image: {
                repository: "registry.k8s.io/git-sync/git-sync",
                tag: "v4.6.0",
              },
              args: [
                "--repo=https://github.com/VueTorrent/VueTorrent",
                "--ref=latest-release",
                "--period=86400s",
                "--root=/addons",
              ],
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
              resources: {
                requests: {
                  cpu: "10m",
                  memory: "25Mi",
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        terminationGracePeriodSeconds: 300,
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      service: {
        app: {
          forceRename: "qbittorrent",
          controller: "qbittorrent",
          primary: true,
          ports: {
            http: {
              port: 80,
            },
          },
        },
        upload: {
          controller: "qbittorrent",
          primary: false,
          type: "LoadBalancer",
          allocateLoadBalancerNodePorts: false,
          externalTrafficPolicy: "Local",
          annotations: {
            lbipam.cilium.io/ips: "192.168.91.55",
          },
          ports: {
            bittorrent-tcp: {
              enabled: true,
              port: 50413,
              protocol: "TCP",
            },
            bittorrent-udp: {
              enabled: true,
              port: 50413,
              protocol: "UDP",
            },
          },
        },
      },
      route: {
        app: {
          hostnames: [
            "{{ .Release.Name }}.darkfellanetwork.com",
          ],
          parentRefs: [{
            name: "internal",
            namespace: "envoy-gateway-system",
            sectionName: "https",
          }],
          rules: [{
            backendRefs: [{
              name: "qbittorrent",
              port: 80,
            }],
          }],
        },
      },
      persistence: {
        config: {
          existingClaim: "qbittorrent",
        },
        media: {
          type: "nfs",
          server: "192.168.91.40",
          path: "/mnt/exos20/data/downloads/torrents",
          advancedMounts: {
            qbittorrent: {
              app: [{
                path: "/data/downloads/torrents",
              }],
            },
          },
        },
        game-library: {
          type: "nfs",
          server: "192.168.91.40",
          path: "/mnt/exos20/SMB/LaunchBox",
          advancedMounts: {
            qbittorrent: {
              app: [{
                path: "/data/LaunchBox",
              }],
            },
          },
        },
        addons: {
          type: "emptyDir",
          advancedMounts: {
            qbittorrent: {
              app: [{
                path: "/addons",
                readOnly: true,
              }],
              git-sync: [{
                path: "/addons",
              }],
            },
          },
        },
        tmp: {
          type: "emptyDir",
          advancedMounts: {
            qbittorrent: {
              git-sync: [{
                path: "/tmp",
              }],
            },
          },
        },
      },
    },
  },
}
