---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "brrpolice",
  },
  spec: {
    chartRef: {
      kind: "OCIRepository",
      name: "brrpolice",
    },
    interval: "1h",
    values: {
      controllers: {
        brrpolice: {
          containers: {
            app: {
              image: {
                repository: "ghcr.io/zariel/brrpolice",
                tag: "v0.13.0@sha256:5be94b0835579314ab1d337c5fcd9dae9896db6da97edfd4fe89e1d41a88e32c",
              },
              env: {
                BRRPOLICE_HTTP__PORT: 80,
                BRRPOLICE_LOGGING__LEVEL: "info",
                BRRPOLICE_QBITTORRENT__BASE_URL: "http://qbittorrent.media.svc.cluster.local",
                TZ: "Europe/Sofia",
              },
              probes: {
                liveness: {
                  enabled: true,
                  spec: {
                    periodSeconds: 30,
                    timeoutSeconds: 5,
                    failureThreshold: 5,
                  },
                },
                readiness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/readyz",
                      port: 80,
                    },
                    initialDelaySeconds: 0,
                    periodSeconds: 10,
                    timeoutSeconds: 5,
                    failureThreshold: 3,
                  },
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
              resources: {
                requests: {
                  cpu: "10m",
                },
                limits: {
                  memory: "128Mi",
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
        },
      },
      service: {
        app: {
          ports: {
            http: {
              port: 80,
            },
          },
        },
      },
      serviceMonitor: {
        app: {
          endpoints: [{
            port: "http",
          }],
        },
      },
      persistence: {
        data: {
          existingClaim: "{{ .Release.Name }}",
        },
      },
    },
  },
}
