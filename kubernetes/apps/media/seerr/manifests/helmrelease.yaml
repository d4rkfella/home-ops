---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "seerr",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "seerr",
    },
    dependsOn: [{
      name: "volsync",
      namespace: "volsync-system",
    }],
    values: {
      controllers: {
        seerr: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          containers: {
            app: {
              image: {
                repository: "ghcr.io/d4rkfella/seerr",
                tag: "3.1.0@sha256:e16cf03aabd5deff1ba55adf107efa20e35d190305768238ca39dafd8f4111e8",
              },
              env: {
                TZ: "Europe/Sofia",
                LOG_LEVEL: "info",
                PORT: 80,
                DB_TYPE: "postgres",
                DB_HOST: "postgres-db-rw.database.svc.cluster.local",
                DB_NAME: "seerr",
                DB_USE_SSL: "true",
                DB_SSL_CA_FILE: "/etc/ssl/certs/postgres-ca.crt",
              },
              envFrom: [{
                secretRef: {
                  name: "{{ .Release.Name }}-secret",
                },
              }],
              probes: {
                liveness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/api/v1/status",
                      port: 80,
                    },
                    initialDelaySeconds: 20,
                    periodSeconds: 15,
                    timeoutSeconds: 3,
                    failureThreshold: 3,
                  },
                },
                readiness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/api/v1/status",
                      port: 80,
                    },
                    initialDelaySeconds: 60,
                    periodSeconds: 15,
                    timeoutSeconds: 3,
                    failureThreshold: 3,
                  },
                },
                startup: {
                  enabled: true,
                  spec: {
                    failureThreshold: 30,
                    periodSeconds: 10,
                  },
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
              resources: {
                requests: {
                  cpu: "10m",
                  memory: "512Mi",
                },
                limits: {
                  memory: "2Gi",
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        annotations: {
          security.darkfellanetwork.com/mount-postgres-ca: "true",
        },
        hostUsers: false,
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      service: {
        app: {
          controller: "seerr",
          ports: {
            http: {
              port: 80,
            },
          },
        },
      },
      route: {
        app: {
          annotations: {
            gatus.home-operations.com/endpoint: "url: https://{{ .Release.Name }}.darkfellanetwork.com/api/v1/status",
          },
          hostnames: [
            "requests.darkfellanetwork.com",
            "{{ .Release.Name }}.darkfellanetwork.com",
          ],
          parentRefs: [{
            name: "external",
            namespace: "envoy-gateway-system",
            sectionName: "https",
          }],
          rules: [{
            backendRefs: [{
              name: "seerr",
              port: 80,
            }],
          }],
        },
      },
      persistence: {
        config: {
          existingClaim: "seerr",
          globalMounts: [{
            path: "/usr/lib/seerr/config",
          }],
        },
        cache: {
          suffix: "cache",
          type: "persistentVolumeClaim",
          size: "20Gi",
          accessMode: "ReadWriteOnce",
          storageClass: "openebs-zfs-128k",
          globalMounts: [{
            path: "/usr/lib/seerr/config/cache",
          }],
        },
        logs: {
          type: "emptyDir",
          globalMounts: [{
            path: "/usr/lib/seerr/config/logs",
          }],
        },
      },
    },
  },
}
