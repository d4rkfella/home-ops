---
# yaml-language-server: $schema=https://kubernetes-schemas-9iu.pages.dev/cert-manager.io/clusterissuer_v1.json
{
  apiVersion: "cert-manager.io/v1",
  kind: "ClusterIssuer",
  metadata: {
    name: "zerossl-prod",
  },
  spec: {
    acme: {
      server: "https://acme.zerossl.com/v2/DV90",
      privateKeySecretRef: {
        name: "zerossl-prod",
      },
      externalAccountBinding: {
        keyID: "jnTUJ0UFn6YhlBZUrjmrfA",
        keySecretRef: {
          name: "zerossl-credentials",
          key: "EAB_HMAC_KEY",
        },
      },
      solvers: [{
        dns01: {
          cloudflare: {
            apiTokenSecretRef: {
              name: "zerossl-credentials",
              key: "CF_API_TOKEN",
            },
          },
        },
        selector: {
          dnsZones: [
            "darkfellanetwork.com",
          ],
        },
      }],
    },
  },
}
---
# yaml-language-server: $schema=https://kubernetes-schemas-9iu.pages.dev/cert-manager.io/clusterissuer_v1.json
{
  apiVersion: "cert-manager.io/v1",
  kind: "ClusterIssuer",
  metadata: {
    name: "vault-issuer",
  },
  spec: {
    vault: {
      path: "pki_intermediate/sign/kubernetes",
      server: "https://vault.darkfellanetwork.com:8200",
      auth: {
        kubernetes: {
          role: "vault-issuer",
          mountPath: "/v1/auth/kubernetes",
          serviceAccountRef: {
            name: "vault-issuer",
          },
        },
      },
    },
  },
}
