---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevirt-operator
spec:
  interval: 1h
  path: ./kubernetes/apps/kubevirt/kubevirt-operator/manifests
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthCheckExprs:
    - apiVersion: kubevirt.io/v1
      kind: KubeVirt
      current: >
        has(status) &&
        status.conditions.exists(c, c.type == 'Available') &&
        status.conditions.filter(c, c.type == 'Available').all(c, c.status == 'True')
      failed: >
        has(status) &&
        status.conditions.exists(c, c.type == 'Degraded') &&
        status.conditions.filter(c, c.type == 'Degraded').exists(c, c.status == 'True')
