---
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "multus",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "multus",
    },
    values: {
      cni-plugins: {
        image: {
          repository: "ghcr.io/d4rkfella/cni-plugins",
          tag: "1.9.0@sha256:4cc3292f8fb0bbec44fec7ba80c091ff687520f85cde714fa8725ac66f9c5d7d",
        },
        resources: {},
      },
      multus: {
        image: {
          repository: "ghcr.io/d4rkfella/multus-cni",
          tag: "4.2.4@sha256:a3947942db7f61cbc6f3f857f86db7264823d377532caea09d3ae3f49656155d",
        },
        resources: {
          requests: {
            cpu: "10m",
          },
          limits: {
            memory: "512Mi",
          },
        },
      },
      cni: {
        netPath: "/etc/cni/net.d",
        binPath: "/opt/cni/bin",
      },
    },
  },
}
