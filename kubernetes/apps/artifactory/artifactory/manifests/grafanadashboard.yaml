      datasourceName: "loki",
      inputName: "cdvj8bzzu2hogd",
    }],
    url: "https://raw.githubusercontent.com/jfrog/log-analytics-prometheus/refs/heads/master/grafana/ArtifactoryLogAnalyticsAndSystemMetrics.json",
