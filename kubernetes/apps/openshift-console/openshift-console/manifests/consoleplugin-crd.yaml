---
{
  apiVersion: "apiextensions.k8s.io/v1",
  kind: "CustomResourceDefinition",
  metadata: {
    name: "consoleplugins.console.openshift.io",
    annotations: {
      api-approved.openshift.io: "https://github.com/openshift/api/pull/1186",
      api.openshift.io/merged-by-featuregates: "true",
      capability.openshift.io/name: "Console",
      description: "Extension for configuring openshift web console plugins.",
      displayName: "ConsolePlugin",
    },
  },
  spec: {
    group: "console.openshift.io",
    scope: "Cluster",
    names: {
      plural: "consoleplugins",
      singular: "consoleplugin",
      kind: "ConsolePlugin",
      listKind: "ConsolePluginList",
    },
    versions: [{
      name: "v1",
      served: true,
      storage: true,
      schema: {
        openAPIV3Schema: {
          description: "ConsolePlugin is an extension for customizing OpenShift web console by dynamically loading code from another service running on the cluster.",
          type: "object",
          required: [
            "metadata",
            "spec",
          ],
          properties: {
            apiVersion: {
              type: "string",
            },
            kind: {
              type: "string",
            },
            metadata: {
              type: "object",
            },
            spec: {
              description: "spec contains the desired configuration for the console plugin.",
              type: "object",
              required: [
                "backend",
                "displayName",
              ],
              properties: {
                backend: {
                  description: "backend holds the configuration of backend which is serving console's plugin.",
                  type: "object",
                  required: [
                    "type",
                  ],
                  properties: {
                    service: {
                      description: "service is a Kubernetes Service that exposes the plugin using a deployment with an HTTP server. The Service must use HTTPS and Service serving certificate.",
                      type: "object",
                      required: [
                        "name",
                        "namespace",
                        "port",
                      ],
                      properties: {
                        basePath: {
                          description: "basePath is the path to the plugin's assets.",
                          type: "string",
                          default: "/",
                          maxLength: 256,
                          minLength: 1,
                        },
                        name: {
                          description: "name of Service that is serving the plugin assets.",
                          type: "string",
                          maxLength: 128,
                          minLength: 1,
                        },
                        namespace: {
                          description: "namespace of Service that is serving the plugin assets.",
                          type: "string",
                          maxLength: 128,
                          minLength: 1,
                        },
                        port: {
                          description: "port on which the Service that is serving the plugin is listening to.",
                          type: "integer",
                          format: "int32",
                          maximum: 65535,
                          minimum: 1,
                        },
                      },
                    },
                    type: {
                      description: "type is the backend type which serves the console's plugin. Currently only Service is supported.",
                      type: "string",
                      enum: [
                        "Service",
                      ],
                    },
                  },
                },
                contentSecurityPolicy: {
                  description: "contentSecurityPolicy is a list of Content-Security-Policy directives for the plugin.",
                  type: "array",
                  maxItems: 5,
                  items: {
                    description: "ConsolePluginCSP holds configuration for a specific CSP directive",
                    type: "object",
                    required: [
                      "directive",
                      "values",
                    ],
                    properties: {
                      directive: {
                        description: "directive specifies which Content-Security-Policy directive to configure.",
                        type: "string",
                        enum: [
                          "DefaultSrc",
                          "ScriptSrc",
                          "StyleSrc",
                          "ImgSrc",
                          "FontSrc",
                          "ConnectSrc",
                        ],
                      },
                      values: {
                        description: "values defines an array of values to append to the console defaults for this directive.",
                        type: "array",
                        minItems: 1,
                        maxItems: 16,
                        items: {
                          type: "string",
                          maxLength: 1024,
                          minLength: 1,
                        },
                      },
                    },
                  },
                },
                displayName: {
                  description: "displayName is the display name of the plugin.",
                  type: "string",
                  maxLength: 128,
                  minLength: 1,
                },
                i18n: {
                  description: "i18n is the configuration of plugin's localization resources.",
                  type: "object",
                  required: [
                    "loadType",
                  ],
                  properties: {
                    loadType: {
                      description: "loadType indicates how the plugin's localization resource should be loaded.",
                      type: "string",
                      enum: [
                        "Preload",
                        "Lazy",
                        "",
                      ],
                    },
                  },
                },
                proxy: {
                  description: "proxy is a list of proxies that describe various service type to which the plugin needs to connect to.",
                  type: "array",
                  items: {
                    description: "ConsolePluginProxy holds information on various service types to which console's backend will proxy the plugin's requests.",
                    type: "object",
                    required: [
                      "alias",
                      "endpoint",
                    ],
                    properties: {
                      alias: {
                        description: "alias is a proxy name that identifies the plugin's proxy.",
                        type: "string",
                        maxLength: 128,
                        minLength: 1,
                        pattern: "^[A-Za-z0-9-_]+$",
                      },
                      authorization: {
                        description: "authorization provides information about authorization type",
                        type: "string",
                        default: "None",
                        enum: [
                          "UserToken",
                          "None",
                        ],
                      },
                      caCertificate: {
                        description: "caCertificate provides the cert authority certificate contents",
                        type: "string",
                        pattern: "^-----BEGIN CERTIFICATE-----([\\s\\S]*)-----END CERTIFICATE-----\\s?$",
                      },
                      endpoint: {
                        description: "endpoint provides information about endpoint to which the request is proxied to.",
                        type: "object",
                        required: [
                          "type",
                        ],
                        properties: {
                          service: {
                            description: "service is an in-cluster Service that the plugin will connect to.",
                            type: "object",
                            required: [
                              "name",
                              "namespace",
                              "port",
                            ],
                            properties: {
                              name: {
                                description: "name of Service that the plugin needs to connect to.",
                                type: "string",
                                maxLength: 128,
                                minLength: 1,
                              },
                              namespace: {
                                description: "namespace of Service that the plugin needs to connect to",
                                type: "string",
                                maxLength: 128,
                                minLength: 1,
                              },
                              port: {
                                description: "port on which the Service that the plugin needs to connect to is listening on.",
                                type: "integer",
                                format: "int32",
                                maximum: 65535,
                                minimum: 1,
                              },
                            },
                          },
                          type: {
                            description: "type is the type of the console plugin's proxy. Currently only Service is supported.",
                            type: "string",
                            enum: [
                              "Service",
                            ],
                          },
                        },
                      },
                    },
                  },
                },
              },
            },
          },
        },
      },
    }],
  },
}
