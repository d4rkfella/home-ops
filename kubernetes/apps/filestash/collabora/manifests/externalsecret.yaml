---
{
  # yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/external-secrets.io/externalsecret_v1.json
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "collabora-proof-key",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "collabora-proof-key",
      template: {
        data: {
          proof_key: "{{ .proof_key }}",
          proof_key.pub: "{{ .proof_key.pub }}",
        },
      },
    },
    dataFrom: [{
      extract: {
        key: "secrets/collabora",
      },
    }],
  },
}
---
{
  # yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/external-secrets.io/externalsecret_v1.json
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "collabora-credentials",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "collabora-credentials",
      template: {
        data: {
          username: "{{ .username }}",
          password: "{{ .password }}",
        },
      },
    },
    dataFrom: [{
      extract: {
        key: "secrets/collabora",
      },
    }],
  },
}
