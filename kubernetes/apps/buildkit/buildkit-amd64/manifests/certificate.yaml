---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/cert-manager.io/certificate_v1.json
{
  apiVersion: "cert-manager.io/v1",
  kind: "Certificate",
  metadata: {
    name: "buildkit-amd64",
  },
  spec: {
    secretName: "buildkit-amd64-tls",
    duration: "2160h",
    privateKey: {
      algorithm: "ECDSA",
      encoding: "PKCS8",
      rotationPolicy: "Always",
      size: 256,
    },
    issuerRef: {
      name: "vault-issuer",
      kind: "ClusterIssuer",
      group: "cert-manager.io",
    },
    dnsNames: [
      "buildkit-amd64.buildkit.svc.cluster.local",
    ],
    usages: [
      "server auth",
    ],
  },
}
