# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/cert-manager.io/certificate_v1.json
{
  apiVersion: "cert-manager.io/v1",
  kind: "Certificate",
  metadata: {
    name: "kubevirt-plugin-serving-cert",
  },
  spec: {
    secretName: "kubevirt-plugin-serving-cert",
    commonName: "kubevirt-plugin.kubevirt-hyperconverged.svc.cluster.local",
    dnsNames: [
      "kubevirt-plugin.kubevirt-hyperconverged.svc.cluster.local",
      "kubevirt-plugin.kubevirt-hyperconverged.svc",
      "kubevirt-plugin.kubevirt-hyperconverged",
      "kubevirt-plugin",
    ],
    issuerRef: {
      name: "vault-issuer",
      kind: "ClusterIssuer",
    },
