---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/tuppr.home-operations.com/kubernetesupgrade_v1alpha1.json
{
  apiVersion: "tuppr.home-operations.com/v1alpha1",
  kind: "KubernetesUpgrade",
  metadata: {
    name: "kubernetes",
  },
  spec: {
    kubernetes: {
      # renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
      version: "v1.36.1",
    },
    healthChecks: [{
      apiVersion: "volsync.backube/v1alpha1",
      kind: "ReplicationSource",
      expr: "status.conditions.filter(c, c.type == \"Synchronizing\").all(c, c.status == \"False\")",
    }],
  },
}
