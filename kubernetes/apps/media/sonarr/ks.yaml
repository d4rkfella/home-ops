---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "sonarr",
  },
  spec: {
    commonMetadata: {
      labels: {
        app.kubernetes.io/name: "sonarr",
      },
    },
    healthChecks: [{
      apiVersion: "helm.toolkit.fluxcd.io/v2",
      kind: "HelmRelease",
      name: "sonarr",
      namespace: "media",
    }],
    dependsOn: [{
      name: "cloudnative-pg-cluster",
      namespace: "database",
    }, {
      name: "keycloak-instance",
      namespace: "keycloak",
    }],
    path: "./kubernetes/apps/media/sonarr/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    interval: "1h",
    timeout: "5m",
    retryInterval: "2m",
  },
}
