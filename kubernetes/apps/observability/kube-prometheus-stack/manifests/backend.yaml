---
# yaml-language-server: $schema=https://kubernetes-schemas-9iu.pages.dev/gateway.envoyproxy.io/backend_v1alpha1.json
{
  apiVersion: "gateway.envoyproxy.io/v1alpha1",
  kind: "Backend",
  metadata: {
    name: "prometheus",
  },
  spec: {
    endpoints: [{
      fqdn: {
        hostname: "kube-prometheus-stack-prometheus.observability.svc.cluster.local",
        port: 9090,
      },
    }],
    tls: {
      sni: "kube-prometheus-stack-prometheus.observability.svc.cluster.local",
      caCertificateRefs: [{
        group: "",
        name: "internal-ca-secret",
        kind: "Secret",
      }],
    },
  },
}
