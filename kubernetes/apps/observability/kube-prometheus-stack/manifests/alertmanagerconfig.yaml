---
{
  apiVersion: "monitoring.coreos.com/v1alpha1",
  kind: "AlertmanagerConfig",
  metadata: {
    name: "alertmanager",
  },
  spec: {
    route: {
      groupBy: [
        "alertname",
        "job",
      ],
      groupInterval: "10m",
      groupWait: "1m",
      receiver: "pushover",
      repeatInterval: "12h",
      routes: [{
        receiver: "null",
        matchers: [{
          name: "alertname",
          value: "InfoInhibitor",
          matchType: "=",
        }],
      }, {
        receiver: "heartbeat",
        groupWait: "0s",
        groupInterval: "1m",
        repeatInterval: "5m",
        matchers: [{
          name: "alertname",
          value: "Watchdog",
          matchType: "=",
        }],
      }, {
        receiver: "pushover",
        matchers: [{
          name: "severity",
          value: "critical",
          matchType: "=",
        }],
      }],
    },
    inhibitRules: [{
      equal: [
        "alertname",
        "namespace",
      ],
      sourceMatch: [{
        name: "severity",
        value: "critical",
        matchType: "=",
      }],
      targetMatch: [{
        name: "severity",
        value: "warning",
        matchType: "=",
      }],
    }],
    receivers: [{
      name: "null",
    }, {
      name: "heartbeat",
      webhookConfigs: [{
        urlSecret: {
          name: "alertmanager-secret",
          key: "HEARTBEAT_URL",
        },
      }],
    }, {
      name: "pushover",
      pushoverConfigs: [{
        html: true,
        message: "\
           {{- range .Alerts }}\n\
          \  {{- if ne .Annotations.description \"\" }}\n\
          \    {{ .Annotations.description }}\n\
          \  {{- else if ne .Annotations.summary \"\" }}\n\
          \    {{ .Annotations.summary }}\n\
          \  {{- else if ne .Annotations.message \"\" }}\n\
          \    {{ .Annotations.message }}\n\
          \  {{- else }}\n\
          \    Alert description not available\n\
          \  {{- end }}\n\
          \  {{- if gt (len .Labels.SortedPairs) 0 }}\n\
          \    <small>\n\
          \      {{- range .Labels.SortedPairs }}\n\
          \        <b>{{ .Name }}:</b> {{ .Value }}\n\
          \      {{- end }}\n\
          \    </small>\n\
          \  {{- end }}\n\
           {{- end }}\
          ",
        priority: "{{ if eq .Status \"firing\" }}1{{ else }}0{{ end }}",
        sendResolved: true,
        sound: "gamelan",
        title: "[{{ .Status | toUpper }}{{ if eq .Status \"firing\" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}",
        ttl: "86400s",
        token: {
          name: "alertmanager-secret",
          key: "PUSHOVER_TOKEN",
        },
        userKey: {
          name: "alertmanager-secret",
          key: "PUSHOVER_USER_KEY",
        },
        urlTitle: "View in Alertmanager",
      }],
    }],
  },
}
