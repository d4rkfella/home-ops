---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/cilium.io/ciliumloadbalancerippool_v2.json
{
  apiVersion: "cilium.io/v2",
  kind: "CiliumLoadBalancerIPPool",
  metadata: {
    name: "pool",
  },
  spec: {
    allowFirstLastIPs: "Yes",
    blocks: [{
      start: "192.168.91.50",
      stop: "192.168.91.99",
    }],
  },
}
---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/cilium.io/ciliuml2announcementpolicy_v2alpha1.json
{
  apiVersion: "cilium.io/v2alpha1",
  kind: "CiliumL2AnnouncementPolicy",
  metadata: {
    name: "l2-policy",
  },
  spec: {
    interfaces: [
      "eth0",
    ],
    loadBalancerIPs: true,
  },
}
