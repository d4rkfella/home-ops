---
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "recyclarr",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "recyclarr",
    },
    values: {
      controllers: {
        recyclarr: {
          type: "cronjob",
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          cronjob: {
            schedule: "0 0 * * *",
            backoffLimit: 0,
            concurrencyPolicy: "Forbid",
            failedJobsHistory: 1,
            successfulJobsHistory: 1,
            ttlSecondsAfterFinished: 86400,
          },
          pod: {
            restartPolicy: "Never",
          },
          containers: {
            app: {
              image: {
                repository: "ghcr.io/recyclarr/recyclarr",
                tag: "8.5.1@sha256:734cecf44ae9be7cf0cb05b2c1bc7da0abef9d938cc11b605e58b3146205e5c0",
              },
              args: [
                "sync",
              ],
              env: {
                COMPlus_EnableDiagnostics: "0",
                RECYCLARR_CONFIG_DIR: "/config",
                RECYCLARR_DATA_DIR: "/data",
              },
              envFrom: [{
                secretRef: {
                  name: "{{ .Release.Name }}-secret",
                },
              }],
              resources: {
                requests: {
                  cpu: "10m",
                },
                limits: {
                  memory: "128M",
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        hostUsers: false,
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      persistence: {
        config: {
          enabled: true,
          type: "persistentVolumeClaim",
          size: "5Gi",
          accessMode: "ReadWriteOnce",
          storageClass: "openebs-zfs-128k",
          globalMounts: [{
            path: "/config",
          }],
        },
        config-file: {
          type: "configMap",
          name: "recyclarr-configmap",
          globalMounts: [{
            path: "/config/recyclarr.yml",
            subPath: "recyclarr.yml",
            readOnly: true,
          }],
        },
        data: {
          type: "emptyDir",
          globalMounts: [{
            path: "/data",
          }],
        },
      },
    },
  },
}
