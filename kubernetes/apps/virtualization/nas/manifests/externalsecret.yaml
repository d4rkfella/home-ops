---
{
  # yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/external-secrets.io/externalsecret_v1beta1.json
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "nas-cloudinit",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "nas-cloudinit",
      template: {
        data: {
          userdata: "\
             #cloud-config\n\
             hostname: nas\n\
             fqdn: nas.darkfellanetwork.com\n\
             timezone: Europe/Sofia\n\
             \n\
             users:\n\
            \  - name: nas_admin\n\
            \    groups: [sudo, users, systemd-journal, adm]\n\
            \    sudo: ALL=(ALL) NOPASSWD:ALL\n\
            \    shell: /bin/bash\n\
            \    lock_passwd: false\n\
            \    passwd: {{ .NAS_ADMIN_PASSWORD }}\n\
            \    ssh_authorized_keys:\n\
            \      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIx83FBOhdNFJdkycrja/72bDI5lQlATVQm8vgZtTy4L d4rkfella@TheBeast\n\
             \n\
            \  - name: darkfella\n\
            \    shell: /usr/sbin/nologin\n\
            \    lock_passwd: true\n\
            \    no_create_home: true\n\
            \    sudo: null\n\
             \n\
            \  - name: kubernetes_workloads\n\
            \    uid: 65532\n\
            \    shell: /usr/sbin/nologin\n\
            \    lock_passwd: true\n\
            \    no_create_home: true\n\
            \    sudo: null\n\
             \n\
            \  - name: artifactory-system\n\
            \    uid: 1030\n\
            \    shell: /usr/sbin/nologin\n\
            \    lock_passwd: true\n\
            \    no_create_home: true\n\
            \    sudo: null\n\
             \n\
             package_update: true\n\
             package_upgrade: true\n\
             \n\
             packages:\n\
            \  - nfs-kernel-server\n\
            \  - nfs-common\n\
            \  - nfs4-acl-tools\n\
            \  - zfsutils-linux\n\
            \  - acl\n\
            \  - attr\n\
            \  - samba\n\
            \  - wsdd-server\n\
            \  - smartmontools\n\
            \  - msmtp\n\
            \  - msmtp-mta\n\
             \n\
             write_files:\n\
            \  - path: /etc/nfs.conf.d/local.conf\n\
            \    content: |\n\
            \      [nfsd]\n\
            \      vers3=n\n\
            \      vers4=y\n\
            \      vers4.1=y\n\
            \      vers4.2=y\n\
             \n\
            \  - path: /etc/exports\n\
            \    content: |\n\
            \      /mnt/exos20/data *(sec=sys,rw,insecure,no_subtree_check)\n\
            \      /mnt/exos20/data/media *(sec=sys,rw,insecure,subtree_check)\n\
            \      /mnt/exos20/data/downloads/torrents *(sec=sys,rw,insecure,subtree_check)\n\
            \      /mnt/exos20/SMB/LaunchBox *(sec=sys,rw,insecure,subtree_check)\n\
            \      /mnt/exos20/artifactory-backup *(sec=sys,rw,insecure,no_subtree_check)\n\
             \n\
            \  - path: /etc/samba/smb.conf\n\
            \    content: |\n\
            \      [global]\n\
            \        disable netbios = yes\n\
            \        workgroup = WORKGROUP\n\
            \        server string = NAS\n\
            \        server role = standalone server\n\
            \        ntlm auth = ntlmv2-only\n\
            \        server min protocol = SMB3\n\
            \        server max protocol = SMB3\n\
            \        security = user\n\
            \        passdb backend = tdbsam\n\
            \        map to guest = never\n\
            \        guest ok = no\n\
            \        inherit acls = yes\n\
            \        map acl inherit = yes\n\
            \        acl group control = yes\n\
            \        store dos attributes = yes\n\
            \        vfs objects = acl_xattr\n\
            \        logging = systemd\n\
            \        log level = 1\n\
            \        aio read size = 1\n\
            \        aio write size = 1\n\
            \        min receivefile size = 16384\n\
             \n\
            \      [data]\n\
            \        comment = Data\n\
            \        path = /mnt/exos20/data\n\
            \        browseable = yes\n\
            \        read only = no\n\
            \        valid users = darkfella\n\
            \        inherit acls = yes\n\
            \        inherit permissions = no\n\
             \n\
            \      [SMB]\n\
            \        comment = SMB\n\
            \        path = /mnt/exos20/SMB\n\
            \        browseable = yes\n\
            \        read only = no\n\
            \        valid users = darkfella\n\
            \        inherit acls = yes\n\
            \        inherit permissions = no\n\
             \n\
            \  - path: /etc/smartd.conf\n\
            \    content: |\n\
            \      DEVICESCAN -a -o on -S on \\\n\
            \        -m {{ .ALERT_RECEIVER_EMAIL }} \\\n\
            \        -M exec /usr/share/smartmontools/smartd-runner \\\n\
            \        -M daily\n\
             \n\
            \  - path: /etc/systemd/system/smart-short.service\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=SMART short test on all drives\n\
            \      After=smartd.service\n\
             \n\
            \      [Service]\n\
            \      Type=oneshot\n\
            \      ExecStart=/bin/bash -c 'for dev in $(smartctl --scan | awk '{print $1}'); do smartctl -t short $dev; done'\n\
            \      ExecStartPost=/bin/bash -c 'sleep 600; for dev in $(smartctl --scan | awk '{print $1}'); do result=$(smartctl -a $dev); echo '$result' | mail -s 'SMART short test: $dev' {{ .ALERT_RECEIVER_EMAIL }}; done'\n\
             \n\
            \  - path: /etc/systemd/system/smart-short.timer\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=Weekly SMART short test\n\
             \n\
            \      [Timer]\n\
            \      OnCalendar=Sat *-*-* 02:00:00\n\
            \      RandomizedDelaySec=30m\n\
            \      Persistent=true\n\
             \n\
            \      [Install]\n\
            \      WantedBy=timers.target\n\
             \n\
            \  - path: /etc/systemd/system/smart-long.service\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=SMART long test on all drives\n\
            \      After=smartd.service\n\
             \n\
            \      [Service]\n\
            \      Type=oneshot\n\
            \      TimeoutStartSec=86400\n\
            \      ExecStart=/bin/bash -c 'for dev in $(smartctl --scan | awk '{print $1}'); do smartctl -t long $dev; done'\n\
            \      ExecStartPost=/bin/bash -c 'sleep 72000; for dev in $(smartctl --scan | awk '{print $1}'); do result=$(smartctl -a $dev); echo '$result' | mail -s 'SMART long test: $dev' {{ .ALERT_RECEIVER_EMAIL }}; done'\n\
             \n\
            \  - path: /etc/systemd/system/smart-long.timer\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=Monthly SMART long test\n\
             \n\
            \      [Timer]\n\
            \      OnCalendar=*-*-01 03:00:00\n\
            \      RandomizedDelaySec=1h\n\
            \      Persistent=true\n\
             \n\
            \      [Install]\n\
            \      WantedBy=timers.target\n\
             \n\
            \  - path: /etc/systemd/system/zfs-scrub.service\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=ZFS scrub on exos20\n\
            \      After=zfs.target\n\
             \n\
            \      [Service]\n\
            \      Type=oneshot\n\
            \      ExecStart=/sbin/zpool scrub exos20\n\
             \n\
            \  - path: /etc/systemd/system/zfs-scrub.timer\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=Monthly ZFS scrub on exos20\n\
             \n\
            \      [Timer]\n\
            \      OnCalendar=*-*-15 03:00:00\n\
            \      RandomizedDelaySec=1h\n\
            \      Persistent=true\n\
             \n\
            \      [Install]\n\
            \      WantedBy=timers.target\n\
             runcmd:\n\
            \  - systemctl enable zfs-import-cache.service\n\
            \  - systemctl enable zfs-import.target\n\
            \  - systemctl enable zfs-mount.service\n\
            \  - systemctl enable zfs.target\n\
            \  - ufw enable\n\
            \  - ufw allow 2049/tcp\n\
            \  - ufw allow 445/tcp\n\
            \  - ufw allow 3702/udp\n\
            \  - ufw allow 5357/tcp\n\
            \  - zpool import -f exos20\n\
            \  - zfs set acltype=nfsv4 exos20/data\n\
            \  - zfs set aclinherit=passthrough exos20/data\n\
            \  - zfs set aclmode=passthrough exos20/data\n\
            \  - zfs set xattr=sa exos20/data\n\
            \  - zfs set acltype=nfsv4 exos20/SMB\n\
            \  - zfs set aclinherit=passthrough exos20/SMB\n\
            \  - zfs set aclmode=passthrough exos20/SMB\n\
            \  - zfs set xattr=sa exos20/SMB\n\
            \  - zfs set acltype=nfsv4 exos20/artifactory-backup\n\
            \  - zfs set aclinherit=passthrough exos20/artifactory-backup\n\
            \  - zfs set aclmode=passthrough exos20/artifactory-backup\n\
            \  - zfs set xattr=sa exos20/artifactory-backup\n\
            \  - exportfs -ra\n\
            \  - systemctl enable --now nfs-kernel-server\n\
            \  - printf '%s\\n%s\\n' '{{ .DARKFELLA_SMB_PASSWORD }}' '{{ .DARKFELLA_SMB_PASSWORD }}' | smbpasswd -a -s darkfella\n\
            \  - smbpasswd -e darkfella\n\
            \  - systemctl enable --now smbd\n\
            \  - systemctl enable --now wsdd-server\n\
            \  - systemctl enable --now smartd\n\
            \  - systemctl enable --now smart-short.timer\n\
            \  - systemctl enable --now smart-long.timer\n\
            \  - systemctl enable --now zfs-scrub.timer\n\
            ",
        },
      },
    },
    dataFrom: [{
      extract: {
        key: "secrets/nas-admin",
      },
    }],
  },
}
