---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
{
  apiVersion: "source.toolkit.fluxcd.io/v1",
  kind: "OCIRepository",
  metadata: {
    name: "cilium",
  },
  spec: {
    interval: "15m",
    layerSelector: {
      mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip",
      operation: "copy",
    },
    url: "oci://quay.io/cilium/charts/cilium",
    ref: {
      tag: "1.19.1",
    },
    verify: {
      provider: "cosign",
      matchOIDCIdentity: [{
        issuer: "https://token.actions.githubusercontent.com",
        subject: "https://github.com/cilium/cilium/.github/workflows/release.yaml@refs/heads/main",
      }],
    },
  },
}
