---
{
  apiVersion: "policies.kyverno.io/v1",
  kind: "ImageValidatingPolicy",
  metadata: {
    name: "verify-fluxcd-images",
  },
  spec: {
    webhookConfiguration: {
      timeoutSeconds: 30,
    },
    validationActions: [
      "Deny",
    ],
    matchConstraints: {
      resourceRules: [{
        apiGroups: [
          "",
        ],
        apiVersions: [
          "v1",
        ],
        operations: [
          "CREATE",
          "UPDATE",
        ],
        resources: [
          "pods",
        ],
      }],
    },
    matchImageReferences: [{
      glob: "ghcr.io/fluxcd/source-controller*",
    }, {
      glob: "ghcr.io/fluxcd/kustomize-controller*",
    }, {
      glob: "ghcr.io/fluxcd/helm-controller*",
    }, {
      glob: "ghcr.io/fluxcd/notification-controller*",
    }],
    attestors: [{
      name: "fluxcd",
      cosign: {
        keyless: {
          identities: [{
            subjectRegExp: "https://github\\.com/fluxcd/.*",
            issuer: "https://token.actions.githubusercontent.com",
          }],
        },
        ctlog: {
          url: "https://rekor.sigstore.dev",
        },
      },
    }],
    validations: [{
      message: "image must be signed by fluxcd",
      expression: "\
         images.containers.map(image,\n\
        \  verifyImageSignatures(image, [attestors.fluxcd]) > 0\n\
         ).all(e, e)\
        ",
    }],
  },
}
---
{
  apiVersion: "policies.kyverno.io/v1",
  kind: "ImageValidatingPolicy",
  metadata: {
    name: "verify-flux-operator-images",
  },
  spec: {
    webhookConfiguration: {
      timeoutSeconds: 30,
    },
    validationActions: [
      "Deny",
    ],
    matchConstraints: {
      resourceRules: [{
        apiGroups: [
          "",
        ],
        apiVersions: [
          "v1",
        ],
        operations: [
          "CREATE",
          "UPDATE",
        ],
        resources: [
          "pods",
        ],
      }],
    },
    matchImageReferences: [{
      glob: "ghcr.io/controlplaneio-fluxcd/flux-operator*",
    }],
    attestors: [{
      name: "fluxOperator",
      cosign: {
        keyless: {
          identities: [{
            subjectRegExp: "https://github\\.com/controlplaneio-fluxcd/flux-operator/\\.github/workflows/release\\.yaml@refs/tags/.*",
            issuer: "https://token.actions.githubusercontent.com",
          }],
        },
        ctlog: {
          url: "https://rekor.sigstore.dev",
        },
      },
    }],
    validations: [{
      message: "image must be signed by controlplaneio-fluxcd",
      expression: "\
         images.containers.map(image,\n\
        \  verifyImageSignatures(image, [attestors.fluxOperator]) > 0\n\
         ).all(e, e)\
        ",
    }],
  },
}
