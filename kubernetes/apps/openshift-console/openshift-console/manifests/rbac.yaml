---
{
  apiVersion: "rbac.authorization.k8s.io/v1",
  kind: "ClusterRole",
  metadata: {
    name: "openshift-console-plugins",
  },
  rules: [{
    apiGroups: [
      "console.openshift.io",
    ],
    resources: [
      "consoleplugins",
    ],
    verbs: [
      "get",
      "list",
      "watch",
    ],
  }],
}
---
{
  apiVersion: "rbac.authorization.k8s.io/v1",
  kind: "ClusterRoleBinding",
  metadata: {
    name: "openshift-console-plugins",
  },
  subjects: [{
    kind: "ServiceAccount",
    name: "openshift-console",
    namespace: "openshift-console",
  }],
  roleRef: {
    kind: "ClusterRole",
    name: "openshift-console-plugins",
    apiGroup: "rbac.authorization.k8s.io",
  },
}
---
{
  apiVersion: "rbac.authorization.k8s.io/v1",
  kind: "Role",
  metadata: {
    name: "openshift-console-user-settings",
    namespace: "openshift-console-user-settings",
  },
  rules: [{
    apiGroups: [
      "rbac.authorization.k8s.io",
    ],
    resources: [
      "rolebindings",
    ],
    verbs: [
      "get",
      "list",
      "watch",
    ],
  }],
}
---
{
  apiVersion: "rbac.authorization.k8s.io/v1",
  kind: "RoleBinding",
  metadata: {
    name: "openshift-console-user-settings",
    namespace: "openshift-console-user-settings",
  },
  subjects: [{
    kind: "ServiceAccount",
    name: "openshift-console",
    namespace: "openshift-console",
  }],
  roleRef: {
    kind: "Role",
    name: "openshift-console-user-settings",
    apiGroup: "rbac.authorization.k8s.io",
  },
}
