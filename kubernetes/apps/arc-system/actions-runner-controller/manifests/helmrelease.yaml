---
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "actions-runner-controller",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "gha-runner-scale-set-controller",
    },
    postRenderers: [{
      kustomize: {
        patches: [{
          target: {
            kind: "Deployment",
          },
          patch: "\
             - op: replace\n\
            \  path: /spec/template/metadata/labels/app.kubernetes.io~1version\n\
            \  value: 0.13.1\n\
             - op: add\n\
            \  path: /spec/template/spec/hostUsers\n\
            \  value: false\n\
            ",
        }],
      },
    }],
    values: {
      fullnameOverride: "actions-runner-controller",
      replicaCount: 1,
      podSecurityContext: {
        runAsNonRoot: true,
        runAsUser: 65532,
        runAsGroup: 65532,
        seccompProfile: {
          type: "RuntimeDefault",
        },
      },
      securityContext: {
        allowPrivilegeEscalation: false,
        readOnlyRootFilesystem: true,
        capabilities: {
          drop: [
            "ALL",
          ],
        },
      },
      flags: {
        watchSingleNamespace: "arc-runners",
      },
      namespaceOverride: "arc-system",
      image: {
        repository: "ghcr.io/d4rkfella/actions-runner-controller",
        pullPolicy: "IfNotPresent",
        tag: "0.13.1@sha256:c8e93266b6343b5ca2603fac765cfbb6d9696aab1fd1cd0b826bc1256c6732ba",
      },
    },
  },
}
