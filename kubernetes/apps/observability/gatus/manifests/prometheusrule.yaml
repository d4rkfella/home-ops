---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
{
  apiVersion: "monitoring.coreos.com/v1",
  kind: "PrometheusRule",
  metadata: {
    name: "gatus-rules",
  },
  spec: {
    groups: [{
      name: "gatus.rules",
      rules: [{
        alert: "GatusEndpointDown",
        expr: "\
           gatus_results_endpoint_success{group=\"external\"} == 0\n\
          ",
        for: "5m",
        annotations: {
          summary: "The {{ $labels.name }} endpoint is down",
        },
        labels: {
          severity: "critical",
        },
      }, {
        alert: "GatusEndpointExposed",
        expr: "\
           gatus_results_endpoint_success{group=\"internal\"} == 0\n\
          ",
        for: "5m",
        annotations: {
          summary: "The {{ $labels.name }} endpoint has a public DNS record and is exposed",
        },
        labels: {
          severity: "critical",
        },
      }],
    }],
  },
}
