---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "flux-operator",
  },
  spec: {
    commonMetadata: {
      labels: {
        app.kubernetes.io/name: "flux-operator",
      },
    },
    healthChecks: [{
      apiVersion: "helm.toolkit.fluxcd.io/v2",
      kind: "HelmRelease",
      name: "flux-operator",
      namespace: "flux-system",
    }],
    interval: "1h",
    path: "./kubernetes/apps/flux-system/flux-operator/manifests",
    prune: true,
    retryInterval: "2m",
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    timeout: "5m",
  },
}
