---
# yaml-language-server: $schema=https://kubernetes-schemas-9iu.pages.dev/external-secrets.io/externalsecret_v1beta1.json
{
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "unpackerr",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "openbao",
    },
    target: {
      name: "unpackerr-secret",
    },
    data: [{
      secretKey: "UN_RADARR_0_API_KEY",
      remoteRef: {
        key: "kv/radarr",
        property: "RADARR_API_KEY",
      },
    }, {
      secretKey: "UN_SONARR_0_API_KEY",
      remoteRef: {
        key: "kv/sonarr",
        property: "SONARR_API_KEY",
      },
    }],
  },
}
