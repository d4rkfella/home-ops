---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/cert-manager.io/certificate_v1.json
{
  apiVersion: "cert-manager.io/v1",
  kind: "Certificate",
  metadata: {
    name: "nas-tls",
  },
  spec: {
    dnsNames: [
      "nas.darkfellanetwork.com",
    ],
    issuerRef: {
      group: "cert-manager.io",
      kind: "ClusterIssuer",
      name: "zerossl-prod",
    },
    privateKey: {
      algorithm: "ECDSA",
      rotationPolicy: "Always",
      size: 384,
      encoding: "PKCS8",
    },
    secretName: "nas-tls",
    usages: [
      "digital signature",
    ],
  },
}
