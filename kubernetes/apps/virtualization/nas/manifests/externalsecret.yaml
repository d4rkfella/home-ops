---
{
  # yaml-language-server: $schema=https://kubernetes-schemas-9iu.pages.dev/external-secrets.io/externalsecret_v1beta1.json
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "nas-cloudinit",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "openbao",
    },
    target: {
      name: "nas-cloudinit",
      template: {
        data: {
          userdata: "\
             #cloud-config\n\
             hostname: nas\n\
             fqdn: nas.darkfellanetwork.com\n\
             timezone: Europe/Sofia\n\
             \n\
             users:\n\
            \  - name: nas_admin\n\
            \    groups: [sudo, users, systemd-journal, adm]\n\
            \    sudo: ALL=(ALL) NOPASSWD:ALL\n\
            \    shell: /bin/bash\n\
            \    lock_passwd: false\n\
            \    no_user_group: true\n\
            \    passwd: {{ .NAS_ADMIN_PASSWORD }}\n\
            \    ssh_authorized_keys:\n\
            \      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIx83FBOhdNFJdkycrja/72bDI5lQlATVQm8vgZtTy4L d4rkfella@TheBeast\n\
             \n\
            \  - name: darkfella\n\
            \    shell: /usr/sbin/nologin\n\
            \    lock_passwd: true\n\
            \    no_create_home: true\n\
            \    no_user_group: true\n\
            \    sudo: null\n\
             \n\
            \  - name: kubernetes_workloads\n\
            \    uid: 65532\n\
            \    shell: /usr/sbin/nologin\n\
            \    lock_passwd: true\n\
            \    no_create_home: true\n\
            \    no_user_group: true\n\
            \    sudo: null\n\
             \n\
            \  - name: artifactory-system\n\
            \    uid: 1030\n\
            \    shell: /usr/sbin/nologin\n\
            \    lock_passwd: true\n\
            \    no_create_home: true\n\
            \    no_user_group: true\n\
            \    sudo: null\n\
             \n\
             package_update: true\n\
             package_upgrade: true\n\
             \n\
             packages:\n\
            \  - qemu-guest-agent\n\
            \  - zfsutils-linux\n\
            \  - nfs-kernel-server\n\
            \  - nfs-common\n\
            \  - acl\n\
            \  - attr\n\
            \  - samba\n\
            \  - wsdd-server\n\
            \  - smartmontools\n\
            \  - msmtp\n\
            \  - msmtp-mta\n\
            \  - mailutils\n\
             \n\
             write_files:\n\
            \  - path: /etc/nfs.conf.d/local.conf\n\
            \    content: |\n\
            \      [nfsd]\n\
            \      vers3=n\n\
            \      vers4=y\n\
            \      vers4.1=y\n\
            \      vers4.2=y\n\
             \n\
            \  - path: /etc/exports\n\
            \    content: |\n\
            \      /mnt/exos20/data *(sec=sys,rw,insecure,no_subtree_check)\n\
            \      /mnt/exos20/data/media *(sec=sys,rw,insecure,subtree_check)\n\
            \      /mnt/exos20/data/downloads/torrents *(sec=sys,rw,insecure,subtree_check)\n\
            \      /mnt/exos20/artifactory-backup *(sec=sys,rw,insecure,no_subtree_check)\n\
             \n\
            \  - path: /etc/samba/smb.conf\n\
            \    content: |\n\
            \      [global]\n\
            \        disable netbios = yes\n\
            \        workgroup = WORKGROUP\n\
            \        server string = NAS\n\
            \        server role = standalone server\n\
            \        ntlm auth = ntlmv2-only\n\
            \        server min protocol = SMB3\n\
            \        server max protocol = SMB3\n\
            \        security = user\n\
            \        passdb backend = tdbsam\n\
            \        map to guest = never\n\
            \        guest ok = no\n\
            \        logging = systemd\n\
            \        log level = 1\n\
            \        min receivefile size = 16384\n\
            \        aio read size = 16384\n\
            \        aio write size = 16384\n\
            \        socket options = TCP_NODELAY IPTOS_LOWDELAY\n\
            \        inherit acls = yes\n\
            \        map acl inherit = yes\n\
            \        inherit permissions = no\n\
            \        create mask = 0660\n\
            \        directory mask = 0770\n\
            \        force create mode = 0000\n\
            \        force directory mode = 0000\n\
            \        nt acl support = yes\n\
             \n\
            \      [data]\n\
            \        path = /mnt/exos20/data\n\
            \        browseable = yes\n\
            \        read only = no\n\
            \        valid users = darkfella\n\
             \n\
            \      [shared]\n\
            \        path = /mnt/exos20/shared\n\
            \        browseable = yes\n\
            \        read only = no\n\
            \        valid users = darkfella\n\
             \n\
            \  - path: /etc/msmtprc\n\
            \    owner: root:root\n\
            \    permissions: '0600'\n\
            \    content: |\n\
            \      defaults\n\
            \      auth            on\n\
            \      tls             on\n\
            \      tls_trust_file  /etc/ssl/certs/ca-certificates.crt\n\
            \      logfile         -\n\
            \      \n\
            \      account         brevo\n\
            \      host            smtp-relay.brevo.com\n\
            \      port            587\n\
            \      from            nas@darkfellanetwork.com\n\
            \      user            {{ .SMTP_EMAIL }}\n\
            \      password        {{ .SMTP_API_TOKEN }}\n\
            \      \n\
            \      account default : brevo\n\
             \n\
            \  - path: /etc/smartd.conf\n\
            \    content: |\n\
            \      # S/../../(1|4)/02 = Short Mon/Thu at 2am\n\
            \      # L/(02|04|06|08|10|12)/15/./04 = Long 15th of Even Months at 4am\n\
            \      DEFAULT -a -m {{ .SMTP_EMAIL }} -s (S/../../(1|4)/02|O/../../6/03|L/(02|04|06|08|10|12)/15/./04)\n\
            \      DEVICESCAN -d auto\n\
             \n\
            \  - path: /etc/systemd/system/zfs-scrub.service\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=ZFS scrub on media pool\n\
            \      After=zfs.target\n\
             \n\
            \      [Service]\n\
            \      Type=oneshot\n\
            \      ExecStart=/sbin/zpool scrub exos20\n\
             \n\
            \  - path: /etc/systemd/system/zfs-scrub.timer\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=Monthly ZFS scrub on media pool\n\
             \n\
            \      [Timer]\n\
            \      OnCalendar=*-*-01 03:00:00\n\
            \      RandomizedDelaySec=1h\n\
            \      Persistent=true\n\
             \n\
            \      [Install]\n\
            \      WantedBy=timers.target\n\
             \n\
            \  - path: /etc/systemd/system/zfs_exporter.service\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=ZFS Prometheus Exporter\n\
            \      After=network-online.target\n\
             \n\
            \      [Service]\n\
            \      User=root\n\
            \      Group=root\n\
            \      Type=simple\n\
            \      ExecStart=/usr/local/bin/zfs_exporter --pool=exos20 --collector.dataset-snapshot\n\
            \      Restart=on-failure\n\
             \n\
            \      [Install]\n\
            \      WantedBy=multi-user.target\n\
             runcmd:\n\
            \  - systemctl enable zfs-import-cache.service\n\
            \  - systemctl enable zfs-import.target\n\
            \  - systemctl enable zfs-mount.service\n\
            \  - systemctl enable zfs.target\n\
            \  - zpool import -f exos20\n\
             \n\
            \  - ufw enable\n\
            \  - ufw allow 2049/tcp\n\
            \  - ufw allow 445/tcp\n\
            \  - ufw allow 3702/udp\n\
            \  - ufw allow 5357/tcp\n\
            \  - ufw allow 111/udp\n\
            \  - ufw allow 22/tcp\n\
            \  - ufw allow 9134/tcp\n\
            \  - ufw allow in on enp2s0 proto igmp\n\
             \n\
            \  - groupadd -g 1400 media_users\n\
            \  - usermod -aG media_users darkfella\n\
            \  - usermod -aG media_users kubernetes_workloads\n\
             \n\
            \  - zfs set acltype=posixacl exos20/data\n\
            \  - zfs set xattr=sa exos20/data\n\
            \  - setfacl -bR /mnt/exos20/data\n\
            \  - setfacl -R -m user:nas_admin:rwx /mnt/exos20/data\n\
            \  - setfacl -R -m default:user:nas_admin:rwx /mnt/exos20/data\n\
            \  - setfacl -R -m group:media_users:rwX /mnt/exos20/data\n\
            \  - setfacl -R -m default:group:media_users:rwX /mnt/exos20/data\n\
            \  - setfacl -R -m other::--- /mnt/exos20/data\n\
            \  - setfacl -R -m default:other::--- /mnt/exos20/data\n\
            \  - setfacl -m user:nobody:--x /mnt/exos20/data\n\
            \  - setfacl -m user:nobody:--x /mnt/exos20/data/downloads\n\
            \  - setfacl -m user:nobody:--x /mnt/exos20/data/downloads/torrents\n\
            \  - setfacl -m user:nobody:--x /mnt/exos20/data/media\n\
            \  - setfacl -R -m group::--- /mnt/exos20/data\n\
            \  - setfacl -R -m default:group::--- /mnt/exos20/data\n\
             \n\
            \  - zfs set acltype=posixacl exos20/shared\n\
            \  - zfs set xattr=sa exos20/shared\n\
            \  - setfacl -bR /mnt/exos20/shared\n\
            \  - setfacl -R -m user:nas_admin:rwx /mnt/exos20/shared\n\
            \  - setfacl -R -m default:user:nas_admin:rwx /mnt/exos20/shared\n\
            \  - setfacl -R -m group:media_users:rwX /mnt/exos20/shared\n\
            \  - setfacl -R -m default:group:media_users:rwX /mnt/exos20/shared\n\
            \  - setfacl -R -m other::--- /mnt/exos20/shared\n\
            \  - setfacl -R -m default:other::--- /mnt/exos20/shared\n\
            \  - setfacl -m user:nobody:--x /mnt/exos20/shared\n\
            \  - setfacl -R -m group::--- /mnt/exos20/shared\n\
            \  - setfacl -R -m default:group::--- /mnt/exos20/shared\n\
             \n\
            \  - zfs set acltype=posixacl exos20/artifactory-backup\n\
            \  - zfs set xattr=sa exos20/artifactory-backup\n\
            \  - setfacl -bR /mnt/exos20/artifactory-backup\n\
            \  - chown -R artifactory-system /mnt/exos20/artifactory-backup\n\
            \  - find /mnt/exos20/artifactory-backup -type d -exec chmod 700 {} +\n\
            \  - find /mnt/exos20/artifactory-backup -type f -exec chmod 600 {} +\n\
            \  - setfacl -R -m user:nas_admin:rwx /mnt/exos20/artifactory-backup\n\
            \  - setfacl -R -m default:user:nas_admin:rwx /mnt/exos20/artifactory-backup\n\
            \  - setfacl -R -m other::--- /mnt/exos20/artifactory-backup\n\
            \  - setfacl -R -m default:other::--- /mnt/exos20/artifactory-backup\n\
            \  - setfacl -m user:nobody:--x /mnt/exos20/artifactory-backup\n\
            \  - setfacl -R -m group::--- /mnt/exos20/artifactory-backup\n\
            \  - setfacl -R -m default:group::--- /mnt/exos20/artifactory-backup\n\
             \n\
            \  - exportfs -ra\n\
            \  - systemctl enable nfs-kernel-server\n\
            \  - printf '%s\\n%s\\n' '{{ .DARKFELLA_SMB_PASSWORD }}' '{{ .DARKFELLA_SMB_PASSWORD }}' | smbpasswd -a -s darkfella\n\
            \  - smbpasswd -e darkfella\n\
            \  - systemctl enable --now smbd\n\
            \  - systemctl enable --now wsdd-server\n\
             \n\
            \  - systemctl enable --now smartmontools.service\n\
            \  - systemctl enable --now zfs-scrub.timer\n\
             \n\
            \  - wget -qO- https://github.com/pdf/zfs_exporter/releases/download/v2.3.12/zfs_exporter-2.3.12.linux-amd64.tar.gz | tar -xzvC /usr/local/bin --strip-components=1 zfs_exporter-2.3.12.linux-amd64/zfs_exporter\n\
            \  - chmod +x /usr/local/bin/zfs_exporter\n\
            \  - systemctl enable --now zfs_exporter\n\
             power_state:\n\
            \  mode: reboot\n\
            \  message: Cloud-init setup complete, rebooting\n\
            \  timeout: 30\n\
            \  condition: true\n\
            ",
        },
      },
    },
    dataFrom: [{
      extract: {
        key: "kv/nas-admin",
      },
    }],
  },
}
