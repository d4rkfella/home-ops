---
# yaml-language-server: $schema=https://kubernetes-schemas-9iu.pages.dev/external-secrets.io/clustersecretstore_v1beta1.json
{
  apiVersion: "external-secrets.io/v1",
  kind: "ClusterSecretStore",
  metadata: {
    name: "openbao",
  },
  spec: {
    provider: {
      vault: {
        server: "https://openbao.darkfellanetwork.com:8200",
        path: "kv",
        version: "v2",
        auth: {
          kubernetes: {
            mountPath: "kubernetes",
            role: "external-secrets",
            serviceAccountRef: {
              name: "external-secrets",
              namespace: "external-secrets",
            },
          },
        },
      },
    },
  },
}
---
# yaml-language-server: $schema=https://kubernetes-schemas-9iu.pages.dev/external-secrets.io/clustersecretstore_v1beta1.json
{
  apiVersion: "external-secrets.io/v1",
  kind: "ClusterSecretStore",
  metadata: {
    name: "hashicorp-vault",
  },
  spec: {
    provider: {
      vault: {
        server: "https://vault.darkfellanetwork.com:8200",
        path: "kv",
        version: "v2",
        auth: {
          kubernetes: {
            mountPath: "kubernetes",
            role: "external-secrets-operator",
            serviceAccountRef: {
              name: "external-secrets",
              namespace: "external-secrets",
            },
          },
        },
      },
    },
  },
}
