---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/cdi.kubevirt.io/cdi_v1beta1.json
{
  apiVersion: "cdi.kubevirt.io/v1beta1",
  kind: "CDI",
  metadata: {
    name: "cdi",
  },
  spec: {
    imagePullPolicy: "IfNotPresent",
    infra: {
      nodeSelector: {
        kubernetes.io/os: "linux",
      },
      tolerations: [{
        key: "CriticalAddonsOnly",
        operator: "Exists",
      }],
    },
    workload: {
      nodeSelector: {
        kubernetes.io/os: "linux",
      },
    },
    config: {
      scratchSpaceStorageClass: "openebs-zfs-128k",
      podResourceRequirements: {
        requests: {
          cpu: "100m",
          memory: "60M",
        },
      },
      uploadProxyURLOverride: "https://cdi-uploadproxy.darkfellanetwork.com",
    },
  },
}
