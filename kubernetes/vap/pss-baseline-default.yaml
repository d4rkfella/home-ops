---
{
  apiVersion: "admissionregistration.k8s.io/v1",
  kind: "ValidatingAdmissionPolicy",
  metadata: {
    name: "baseline-pss-policy",
  },
  spec: {
    failurePolicy: "Fail",
    matchConstraints: {
      resourceRules: [{
        apiGroups: [
          "",
        ],
        apiVersions: [
          "v1",
        ],
        operations: [
          "CREATE",
          "UPDATE",
        ],
        resources: [
          "pods",
        ],
      }],
    },
    validations: [
      # 1. Disallow hostNetwork
      {
        expression: "\
           !has(object.spec.hostNetwork) ||\n\
           object.spec.hostNetwork == false\n\
          ",
        message: "spec.hostNetwork must be false",
      },
      # 2. Disallow hostPID
      {
        expression: "\
           !has(object.spec.hostPID) ||\n\
           object.spec.hostPID == false\n\
          ",
        message: "spec.hostPID must be false",
      },
      # 3. Disallow hostIPC
      {
        expression: "\
           !has(object.spec.hostIPC) ||\n\
           object.spec.hostIPC == false\n\
          ",
        message: "spec.hostIPC must be false",
      },
      # 4. Disallow privileged containers
      {
        expression: "\
           !has(object.spec.containers) ||\n\
           object.spec.containers.all(c,\n\
          \  !has(c.securityContext) ||\n\
          \  !has(c.securityContext.privileged) ||\n\
          \  c.securityContext.privileged == false\n\
           )\n\
          ",
        message: "All containers must not be privileged",
      },
      # 5. Disallow privileged initContainers
      {
        expression: "\
           !has(object.spec.initContainers) ||\n\
           object.spec.initContainers.all(c,\n\
          \  !has(c.securityContext) ||\n\
          \  !has(c.securityContext.privileged) ||\n\
          \  c.securityContext.privileged == false\n\
           )\n\
          ",
        message: "All initContainers must not be privileged",
      },
      # 6. Disallow privileged ephemeralContainers
      {
        expression: "\
           !has(object.spec.ephemeralContainers) ||\n\
           object.spec.ephemeralContainers.all(c,\n\
          \  !has(c.securityContext) ||\n\
          \  !has(c.securityContext.privileged) ||\n\
          \  c.securityContext.privileged == false\n\
           )\n\
          ",
        message: "All ephemeralContainers must not be privileged",
      },
      # 7. Restrict added capabilities to the allowed list
      {
        expression: "\
           !has(object.spec.containers) ||\n\
           object.spec.containers.all(c,\n\
          \  !has(c.securityContext) ||\n\
          \  !has(c.securityContext.capabilities) ||\n\
          \  !has(c.securityContext.capabilities.add) ||\n\
          \  c.securityContext.capabilities.add.all(cap,\n\
          \    cap in [\n\
          \      \"AUDIT_WRITE\", \"CHOWN\", \"DAC_OVERRIDE\", \"FOWNER\",\n\
          \      \"FSETID\", \"KILL\", \"MKNOD\", \"NET_BIND_SERVICE\",\n\
          \      \"SETFCAP\", \"SETGID\", \"SETPCAP\", \"SETUID\", \"SYS_CHROOT\"\n\
          \    ]\n\
          \  )\n\
           )\n\
          ",
        message: "Adding capabilities outside the allowed baseline list is not permitted",
      },
      # 8. Forbid HostPath volumes
      {
        expression: "\
           !has(object.spec.volumes) ||\n\
           object.spec.volumes.all(v,\n\
          \  !has(v.hostPath)\n\
           )\n\
          ",
        message: "HostPath volumes are not allowed",
      },
      # 9. Disallow hostPort usage (only zero is permitted)
      {
        expression: "\
           !has(object.spec.containers) ||\n\
           object.spec.containers.all(c,\n\
          \  !has(c.ports) ||\n\
          \  c.ports.all(p,\n\
          \    !has(p.hostPort) || p.hostPort == 0\n\
          \  )\n\
           )\n\
          ",
        message: "HostPort usage must be 0 or unset",
      },
      # 10. Prevent AppArmor profile overrides at pod level
      {
        expression: "\
           !has(object.spec.securityContext) ||\n\
           !has(object.spec.securityContext.appArmorProfile) ||\n\
           !has(object.spec.securityContext.appArmorProfile.type) ||\n\
           object.spec.securityContext.appArmorProfile.type == \"RuntimeDefault\"\n\
          ",
        message: "Pod-level AppArmor profile must be RuntimeDefault or unset",
      },
      # 11. Prevent AppArmor profile overrides at container level
      {
        expression: "\
           !has(object.spec.containers) ||\n\
           object.spec.containers.all(c,\n\
          \  !has(c.securityContext) ||\n\
          \  !has(c.securityContext.appArmorProfile) ||\n\
          \  !has(c.securityContext.appArmorProfile.type) ||\n\
          \  c.securityContext.appArmorProfile.type == \"RuntimeDefault\"\n\
           )\n\
          ",
        message: "Container AppArmor profile must be RuntimeDefault or unset",
      },
    ],
  },
}
---
{
  apiVersion: "admissionregistration.k8s.io/v1",
  kind: "ValidatingAdmissionPolicyBinding",
  metadata: {
    name: "baseline-pss-binding",
  },
  spec: {
    policyName: "baseline-pss-policy",
    validationActions: [
      "Deny",
    ],
    matchResources: {
      resourceRules: [{
        apiGroups: [
          "",
        ],
        apiVersions: [
          "v1",
        ],
        resources: [
          "pods",
        ],
        operations: [
          "CREATE",
          "UPDATE",
        ],
      }],
      namespaceSelector: {
        matchExpressions: [{
          key: "pod-security.kubernetes.io/enforce",
          operator: "NotIn",
          values: [
            "privileged",
          ],
        }],
      },
      objectSelector: {
        matchExpressions: [{
          key: "app.kubernetes.io/name",
          operator: "NotIn",
          values: [
            "buildkit-amd64",
            "buildkit-arm64",
          ],
        }],
      },
    },
  },
}
