---
{
  # yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/external-secrets.io/externalsecret_v1beta1.json
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "nas-cloudinit",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "nas-cloudinit",
      template: {
        data: {
          userdata: "\
             #cloud-config\n\
             hostname: nas\n\
             fqdn: nas.darkfellanetwork.com\n\
             timezone: Europe/Sofia\n\
             \n\
             users:\n\
            \  - name: nas_admin\n\
            \    groups: [sudo, users, systemd-journal, adm]\n\
            \    sudo: ALL=(ALL) NOPASSWD:ALL\n\
            \    shell: /bin/bash\n\
            \    lock_passwd: false\n\
            \    passwd: {{ .NAS_ADMIN_PASSWORD }}\n\
            \    ssh_authorized_keys:\n\
            \      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIx83FBOhdNFJdkycrja/72bDI5lQlATVQm8vgZtTy4L d4rkfella@TheBeast\n\
             \n\
            \  - name: darkfella\n\
            \    shell: /usr/sbin/nologin\n\
            \    lock_passwd: true\n\
            \    no_create_home: true\n\
            \    sudo: null\n\
             \n\
            \  - name: kubernetes_workloads\n\
            \    uid: 65532\n\
            \    shell: /usr/sbin/nologin\n\
            \    lock_passwd: true\n\
            \    no_create_home: true\n\
            \    sudo: null\n\
             \n\
            \  - name: artifactory-system\n\
            \    uid: 1030\n\
            \    shell: /usr/sbin/nologin\n\
            \    lock_passwd: true\n\
            \    no_create_home: true\n\
            \    sudo: null\n\
             \n\
             package_update: true\n\
             package_upgrade: true\n\
             \n\
             apt:\n\
            \  sources:\n\
            \    netdata:\n\
            \      source: deb https://repo.netdata.cloud/repos/stable/ubuntu/questing/ /\n\
            \      keyid: 9DD4A74CECFA8F4F\n\
             \n\
             packages:\n\
            \  - nfs-kernel-server\n\
            \  - nfs-common\n\
            \  - zfsutils-linux\n\
            \  - acl\n\
            \  - attr\n\
            \  - samba\n\
            \  - wsdd-server\n\
            \  - smartmontools\n\
            \  - msmtp\n\
            \  - msmtp-mta\n\
            \  - netdata\n\
             \n\
             write_files:\n\
            \  - path: /etc/systemd/system/mnt-tls.mount\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=Mount TLS secret virtiofs\n\
            \      DefaultDependencies=no\n\
            \      After=local-fs.target\n\
            \      \n\
            \      [Mount]\n\
            \      What=tls-secret-fs\n\
            \      Where=/mnt/tls\n\
            \      Type=virtiofs\n\
            \      Options=ro\n\
            \      \n\
            \      [Install]\n\
            \      WantedBy=multi-user.target\n\
             \n\
            \  - path: /etc/systemd/system/netdata-cert-sync.service\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=Sync Netdata TLS cert from secret volume\n\
            \      Requires=mnt-tls.mount\n\
            \      After=mnt-tls.mount\n\
            \      \n\
            \      [Service]\n\
            \      Type=oneshot\n\
            \      ExecStartPre=/usr/bin/mkdir -p /etc/netdata/ssl\n\
            \      ExecStart=/bin/bash -c '\\\n\
            \        cp /mnt/tls/tls.crt /etc/netdata/ssl/tls.crt && \\\n\
            \        cp /mnt/tls/tls.key /etc/netdata/ssl/tls.key && \\\n\
            \        chmod 600 /etc/netdata/ssl/tls.key && \\\n\
            \        chown netdata:netdata /etc/netdata/ssl/tls.*'\n\
            \      ExecStartPost=/usr/bin/systemctl restart netdata\n\
             \n\
            \  - path: /etc/systemd/system/netdata-cert-sync.path\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=Watch for TLS cert changes in secret volume\n\
            \      After=mnt-tls.mount\n\
            \      \n\
            \      [Path]\n\
            \      PathChanged=/mnt/tls/tls.crt\n\
            \      \n\
            \      [Install]\n\
            \      WantedBy=multi-user.target\n\
             \n\
            \  - path: /etc/nfs.conf.d/local.conf\n\
            \    content: |\n\
            \      [nfsd]\n\
            \      vers3=n\n\
            \      vers4=y\n\
            \      vers4.1=y\n\
            \      vers4.2=y\n\
             \n\
            \  - path: /etc/exports\n\
            \    content: |\n\
            \      /mnt/exos20/data *(sec=sys,rw,insecure,no_subtree_check)\n\
            \      /mnt/exos20/data/media *(sec=sys,rw,insecure,subtree_check)\n\
            \      /mnt/exos20/data/downloads/torrents *(sec=sys,rw,insecure,subtree_check)\n\
            \      /mnt/exos20/SMB/LaunchBox *(sec=sys,rw,insecure,subtree_check)\n\
            \      /mnt/exos20/artifactory-backup *(sec=sys,rw,insecure,no_subtree_check)\n\
             \n\
            \  - path: /etc/samba/smb.conf\n\
            \    content: |\n\
            \      [global]\n\
            \        disable netbios = yes\n\
            \        workgroup = WORKGROUP\n\
            \        server string = NAS\n\
            \        server role = standalone server\n\
            \        ntlm auth = ntlmv2-only\n\
            \        server min protocol = SMB3\n\
            \        server max protocol = SMB3\n\
            \        security = user\n\
            \        passdb backend = tdbsam\n\
            \        map to guest = never\n\
            \        guest ok = no\n\
            \        inherit acls = yes\n\
            \        map acl inherit = yes\n\
            \        acl group control = yes\n\
            \        store dos attributes = yes\n\
            \        vfs objects = acl_xattr\n\
            \        logging = systemd\n\
            \        log level = 1\n\
            \        aio read size = 1\n\
            \        aio write size = 1\n\
            \        min receivefile size = 16384\n\
             \n\
            \      [data]\n\
            \        comment = Data\n\
            \        path = /mnt/exos20/data\n\
            \        browseable = yes\n\
            \        read only = no\n\
            \        valid users = darkfella\n\
            \        inherit acls = yes\n\
            \        inherit permissions = no\n\
             \n\
            \      [SMB]\n\
            \        comment = SMB\n\
            \        path = /mnt/exos20/SMB\n\
            \        browseable = yes\n\
            \        read only = no\n\
            \        valid users = darkfella\n\
            \        inherit acls = yes\n\
            \        inherit permissions = no\n\
             \n\
            \  - path: /etc/msmtprc\n\
            \    owner: root:root\n\
            \    permissions: '0600'\n\
            \    content: |\n\
            \      defaults\n\
            \      auth            on\n\
            \      tls             on\n\
            \      tls_trust_file  /etc/ssl/certs/ca-certificates.crt\n\
            \      logfile         -\n\
            \      \n\
            \      account         brevo\n\
            \      host            smtp-relay.brevo.com\n\
            \      port            587\n\
            \      from            nas@darkfellanetwork.com\n\
            \      user            {{ .SMTP_EMAIL }}\n\
            \      password        {{ .SMTP_API_TOKEN }}\n\
            \      \n\
            \      account default : brevo\n\
             \n\
            \  - path: /etc/netdata/netdata.conf\n\
            \    content: |\n\
            \      [global]\n\
            \        memory mode = dbengine\n\
            \      [web]\n\
            \        ssl key = /etc/netdata/ssl/tls.key\n\
            \        ssl certificate = /etc/netdata/ssl/tls.crt\n\
            \        tls version = 1.3\n\
            \        tls ciphers = TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256\n\
            \        x-frame-options response header = SAMEORIGIN\n\
            \        respect do not track policy = yes\n\
            \        allow connections from = localhost 192.168.91.*\n\
            \        allow dashboard from = localhost 192.168.91.*\n\
            \        enable gzip compression = yes\n\
            \        gzip compression level = 3\n\
             \n\
            \  - path: /etc/smartd.conf\n\
            \    content: |\n\
            \      # S/../../(1|4)/02 = Short Mon/Thu at 2am\n\
            \      # L/(02|04|06|08|10|12)/15/./04 = Long 15th of Even Months at 4am\n\
            \      DEFAULT -a -m {{ .SMTP_EMAIL }} -s (S/../../(1|4)/02|O/../../6/03|L/(02|04|06|08|10|12)/15/./04)\n\
            \      DEVICESCAN -d auto\n\
             \n\
            \  - path: /etc/systemd/system/zfs-scrub.service\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=ZFS scrub on exos20\n\
            \      After=zfs.target\n\
             \n\
            \      [Service]\n\
            \      Type=oneshot\n\
            \      ExecStart=/sbin/zpool scrub exos20\n\
             \n\
            \  - path: /etc/systemd/system/zfs-scrub.timer\n\
            \    content: |\n\
            \      [Unit]\n\
            \      Description=Monthly ZFS scrub on exos20\n\
             \n\
            \      [Timer]\n\
            \      OnCalendar=*-*-01 03:00:00\n\
            \      RandomizedDelaySec=1h\n\
            \      Persistent=true\n\
             \n\
            \      [Install]\n\
            \      WantedBy=timers.target\n\
             runcmd:\n\
            \  - systemctl enable zfs-import-cache.service\n\
            \  - systemctl enable zfs-import.target\n\
            \  - systemctl enable zfs-mount.service\n\
            \  - systemctl enable zfs.target\n\
            \  - zpool import -f exos20\n\
            \  - ufw enable\n\
            \  - ufw allow 2049/tcp\n\
            \  - ufw allow 445/tcp\n\
            \  - ufw allow 3702/udp\n\
            \  - ufw allow 5357/tcp\n\
            \  - ufw allow 19999/tcp\n\
            \  - ufw allow 111/udp\n\
            \  - ufw allow 22/tcp\n\
            \  - chown -R root:root /mnt/exos20/data\n\
            \  - chown -R root:root /mnt/exos20/SMB\n\
            \  - chown -R root:root /mnt/exos20/artifactory-backup\n\
            \  - zfs set acltype=posixacl exos20/data\n\
            \  - zfs set xattr=sa exos20/data\n\
            \  - setfacl -Rdm u::rwX,g::rwX,u:nas_admin:rwX,u:darkfella:rwX,u:kubernetes_workloads:rwX,o::--- /mnt/exos20/data\n\
            \  - setfacl -Rm u::rwX,g::rwX,u:nas_admin:rwX,u:darkfella:rwX,u:kubernetes_workloads:rwX,o::--- /mnt/exos20/data\n\
            \  - zfs set acltype=posixacl exos20/SMB\n\
            \  - zfs set xattr=sa exos20/SMB\n\
            \  - setfacl -Rdm u::rwX,g::rwX,u:nas_admin:rwX,u:darkfella:rwX,u:kubernetes_workloads:rwX,o::--- /mnt/exos20/SMB\n\
            \  - setfacl -Rm u::rwX,g::rwX,u:nas_admin:rwX,u:darkfella:rwX,u:kubernetes_workloads:rwX,o::--- /mnt/exos20/SMB\n\
            \  - zfs set acltype=posixacl exos20/artifactory-backup\n\
            \  - zfs set xattr=sa exos20/artifactory-backup\n\
            \  - setfacl -Rdm u::rwX,g::rwX,u:nas_admin:rwX,u:artifactory-system:rwX,o::--- /mnt/exos20/artifactory-backup\n\
            \  - setfacl -Rm u::rwX,g::rwX,u:nas_admin:rwX,u:artifactory-system:rwX,o::--- /mnt/exos20/artifactory-backup\n\
            \  - exportfs -ra\n\
            \  - systemctl enable nfs-kernel-server\n\
            \  - printf '%s\\n%s\\n' '{{ .DARKFELLA_SMB_PASSWORD }}' '{{ .DARKFELLA_SMB_PASSWORD }}' | smbpasswd -a -s darkfella\n\
            \  - smbpasswd -e darkfella\n\
            \  - systemctl enable --now smbd\n\
            \  - systemctl enable --now wsdd-server\n\
            \  - systemctl enable --now smartd\n\
            \  - systemctl enable --now zfs-scrub.timer\n\
            \  - systemctl enable --now mnt-tls.mount\n\
            \  - systemctl enable --now netdata-cert-sync.path\n\
            \  - systemctl enable --now netdata\n\
            ",
        },
      },
    },
    dataFrom: [{
      extract: {
        key: "secrets/nas-admin",
      },
    }],
  },
}
