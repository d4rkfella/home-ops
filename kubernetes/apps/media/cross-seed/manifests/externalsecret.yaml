---
{
  # yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "cross-seed",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "cross-seed-secret",
      template: {
        data: {
          config.js: "\
             module.exports = {\n\
            \  action: \"inject\",\n\
            \  apiKey: '{{ .CROSS_SEED_API_KEY }}',\n\
            \  delay: 30,\n\
            \  duplicateCategories: false,\n\
            \  flatLinking: false,\n\
            \  includeNonVideos: true,\n\
            \  includeSingleEpisodes: true,\n\
            \  linkCategory: \"cross-seed\",\n\
            \  linkDirs: [\"/data/downloads/torrents/cross-seed\", \"/data/LaunchBox/cross-seed\"],\n\
            \  linkType: \"hardlink\",\n\
            \  matchMode: \"partial\",\n\
            \  seasonFromEpisodes: 0.8,\n\
            \  port: Number(process.env.CROSS_SEED_PORT),\n\
            \  torrentClients: [`qbittorrent:http://{{ .QBITTORRENT_USERNAME }}:{{ .QBITTORRENT_PASSWORD }}@qbittorrent.media.svc.cluster.local`],\n\
            \  radarr: [`http://radarr.media.svc.cluster.local/?apikey={{ .RADARR_API_KEY }}`],\n\
            \  skipRecheck: true,\n\
            \  sonarr: [`http://sonarr.media.svc.cluster.local/?apikey={{ .SONARR_API_KEY }}`],\n\
            \  useClientTorrents: true,\n\
            \  torznab: [\n\
            \    3, // IPT\n\
            \    1, // SA\n\
            \    2, // TL\n\
            \  ].map(i => `http://prowlarr.media.svc.cluster.local/${i}/api?apikey={{ .PROWLARR_API_KEY }}`),\n\
             };\n\
            ",
        },
      },
    },
    dataFrom: [{
      extract: {
        key: "secrets/qbittorrent",
      },
    }, {
      extract: {
        key: "secrets/prowlarr",
      },
    }, {
      extract: {
        key: "secrets/radarr",
      },
    }, {
      extract: {
        key: "secrets/sonarr",
      },
    }, {
      extract: {
        key: "secrets/cross-seed",
      },
    }],
  },
}
