---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "pgadmin",
  },
  spec: {
    dependsOn: [{
      name: "cloudnative-pg-cluster",
    }, {
      name: "keycloak-instance",
      namespace: "keycloak",
    }],
    path: "./kubernetes/apps/database/pgadmin/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
    interval: "1h",
  },
}
