---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/monitoring.coreos.com/podmonitor_v1.json
{
  apiVersion: "monitoring.coreos.com/v1",
  kind: "PodMonitor",
  metadata: {
    name: "postgres-db",
  },
  spec: {
    selector: {
      matchLabels: {
        cnpg.io/cluster: "postgres-db",
      },
    },
    podMetricsEndpoints: [{
      port: "metrics",
      scheme: "https",
      tlsConfig: {
        ca: {
          secret: {
            name: "postgres-db-ca",
            key: "ca.crt",
          },
        },
        serverName: "postgres-db-rw",
      },
    }],
  },
}
