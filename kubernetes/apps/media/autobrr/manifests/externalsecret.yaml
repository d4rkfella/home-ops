---
{
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "autobrr",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "autobrr-secret",
    },
    dataFrom: [{
      extract: {
        key: "secrets/autobrr",
      },
    }, {
      extract: {
        key: "secrets/certificates/postgres",
      },
    }],
  },
}
