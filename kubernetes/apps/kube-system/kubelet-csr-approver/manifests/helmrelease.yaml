---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "kubelet-csr-approver",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "kubelet-csr-approver",
    },
    values: {
      replicas: 1,
      providerRegex: "^k8s-\\d$",
      bypassDnsResolution: true,
      metrics: {
        enable: true,
        serviceMonitor: {
          enabled: true,
        },
      },
    },
  },
}
