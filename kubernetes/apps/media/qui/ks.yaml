---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "qui",
  },
  spec: {
    components: [
      "../../../../components/volsync",
    ],
    interval: "1h",
    path: "./kubernetes/apps/media/qui/manifests",
    postBuild: {
      substitute: {
        APP: "qui",
      },
    },
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
  },
}
