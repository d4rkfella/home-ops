---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "nas",
  },
  spec: {
    interval: "1h",
    timeout: "15m",
    path: "./kubernetes/apps/virtualization/nas/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    healthChecks: [{
      apiVersion: "kubevirt.io/v1",
      kind: "VirtualMachine",
      name: "nas",
      namespace: "virtualization",
    }],
    healthCheckExprs: [{
      apiVersion: "kubevirt.io/v1",
      kind: "VirtualMachine",
      failed: "status.conditions.filter(e, e.type == 'AgentConnected').all(e, e.status == 'False')",
      current: "status.conditions.filter(e, e.type == 'AgentConnected').all(e, e.status == 'True')",
    }],
  },
}
