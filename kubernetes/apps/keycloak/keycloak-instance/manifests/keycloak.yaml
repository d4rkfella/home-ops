---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/k8s.keycloak.org/keycloak_v2alpha1.json
{
  apiVersion: "k8s.keycloak.org/v2alpha1",
  kind: "Keycloak",
  metadata: {
    name: "keycloak",
  },
  spec: {
    unsupported: {
      podTemplate: {
        spec: {
          volumes: [{
            name: "postgres-ca",
            secret: {
              secretName: "keycloak-secret",
            },
          }, {
            name: "tmpfs",
            emptyDir: {},
          }, {
            name: "data",
            emptyDir: {},
          }],
          containers: [{
            name: "keycloak",
            env: [{
              name: "KC_DB_URL_PROPERTIES",
              value: "?sslmode=verify-full&sslrootcert=/etc/ssl/certs/cnpg-ca.crt",
            }],
            volumeMounts: [{
              name: "postgres-ca",
              mountPath: "/etc/ssl/certs/cnpg-ca.crt",
              subPath: "ca.crt",
              readOnly: true,
            }, {
              name: "data",
              mountPath: "/opt/keycloak/data",
            }, {
              name: "tmpfs",
              mountPath: "/tmp",
            }],
            securityContext: {
              allowPrivilegeEscalation: false,
              readOnlyRootFilesystem: true,
              capabilities: {
                drop: [
                  "ALL",
                ],
              },
            },
          }],
          securityContext: {
            runAsUser: 65532,
            runAsGroup: 65532,
            runAsNonRoot: true,
            seccompProfile: {
              type: "RuntimeDefault",
            },
          },
          hostUsers: false,
        },
      },
    },
    db: {
      vendor: "postgres",
      usernameSecret: {
        name: "keycloak-secret",
        key: "POSTGRES_USERNAME",
      },
      passwordSecret: {
        name: "keycloak-secret",
        key: "POSTGRES_PASSWORD",
      },
      host: "postgres-db-rw.database.svc.cluster.local",
      database: "keycloak",
      port: 5432,
      schema: "public",
    },
    instances: 1,
    image: "ghcr.io/d4rkfella/keycloak:26.5.6@sha256:d01fdec87de75dadeb7a565d09e0de66f74933f2f3c091ffd4772a6aa23e5ee7",
    startOptimized: true,
    #bootstrapAdmin:
    #user:
    #secret: *secret
    proxy: {
      headers: "xforwarded",
    },
    hostname: {
      hostname: "https://accounts.darkfellanetwork.com",
    },
    http: {
      httpEnabled: true,
      httpPort: 80,
    },
    ingress: {
      enabled: false,
    },
  },
}
