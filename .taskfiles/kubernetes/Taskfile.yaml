---
{
  # yaml-language-server: $schema=https://taskfile.dev/schema.json
  version: "3",
  tasks: {
    sync-secrets: {
      desc: "Sync all ExternalSecrets",
      cmds: [{
        for: {
          var: "SECRETS",
          split: "\
             \n\
            ",
        },
        cmd: "kubectl --namespace {{splitList \",\" .ITEM | first}} annotate externalsecret {{splitList \",\" .ITEM | last}} force-sync=\"{{now | unixEpoch}}\" --overwrite",
      }],
      vars: {
        SECRETS: {
          sh: "kubectl get externalsecret --all-namespaces --no-headers --output=jsonpath='{range .items[*]}{.metadata.namespace},{.metadata.name}{\"\\n\"}{end}'",
        },
      },
      preconditions: [
        "which kubectl",
      ],
    },
    cleanse-pods: {
      desc: "Cleanse pods with a Failed/Pending/Succeeded phase",
      cmds: [{
        for: {
          matrix: {
            PHASE: [
              "Failed",
              "Pending",
              "Succeeded",
            ],
          },
        },
        cmd: "kubectl delete pods --all-namespaces --field-selector status.phase={{.ITEM.PHASE}} --ignore-not-found=true",
      }],
      preconditions: [
        "which kubectl",
      ],
    },
    # https://docs.github.com/en/enterprise-cloud@latest/actions/hosting-your-own-runners/managing-self-hosted-runners-with-actions-runner-controller/deploying-runner-scale-sets-with-actions-runner-controller#upgrading-arc
    upgrade-arc: {
      desc: "Upgrade the ARC",
      cmds: [
        "helm -n arc-runners uninstall home-ops-runner2",
        "helm -n arc-system uninstall actions-runner-controller",
        "sleep 5",
        "flux -n arc-system reconcile hr actions-runner-controller",
        "flux -n arc-runners reconcile hr home-ops-runner2",
      ],
      preconditions: [
        "which flux helm",
      ],
    },
    vnc: {
      desc: "Open a VNC session to a VM",
      interactive: true,
      vars: {
        VM: {
          sh: "gum input --placeholder \"VM name\"",
        },
        NS: {
          sh: "gum input --placeholder \"Namespace\" --value \"virtualization\"",
        },
      },
      cmd: "virtctl vnc --vnc-type=tiger --vnc-path=/usr/bin/vncviewer --namespace {{.NS}} {{.VM}}",
      preconditions: [
        "which kubectl",
        "which virtctl",
        "which vncviewer",
        "which gum",
        "kubectl get virtualmachine -n {{.NS}} {{.VM}}",
      ],
    },
    browse-pvc: {
      desc: "Browse files on a PVC using filebrowser",
      interactive: true,
      vars: {
        PVC: {
          sh: "gum input --placeholder \"PVC name\"",
        },
        NS: {
          sh: "gum input --placeholder \"Namespace\"",
        },
        USER: {
          sh: "gum input --placeholder \"User ID\" --value \"65532\"",
        },
      },
      cmds: [
        "kubectl run filebrowser-{{.PVC}} --image=filebrowser/filebrowser:latest --restart=Never --namespace={{.NS}} --overrides='{\"spec\":{\"securityContext\":{\"fsGroup\":{{.USER}}},\"containers\":[{\"name\":\"filebrowser\",\"image\":\"filebrowser/filebrowser:latest\",\"args\":[\"--noauth\",\"--root\",\"/data\",\"--config\",\"/tmp/settings.json\",\"--database\",\"/tmp/filebrowser.db\"],\"ports\":[{\"containerPort\":80}],\"volumeMounts\":[{\"mountPath\":\"/data\",\"name\":\"data\"}]}],\"volumes\":[{\"name\":\"data\",\"persistentVolumeClaim\":{\"claimName\":\"{{.PVC}}\"}}]}}'",
        "kubectl wait pod/filebrowser-{{.PVC}} --for=condition=Ready --namespace={{.NS}} --timeout=60s",
        "xdg-open http://localhost:8080 &",
        "kubectl port-forward pod/filebrowser-{{.PVC}} 8080:8080 --namespace={{.NS}}",
        {
          defer: "kubectl delete pod filebrowser-{{.PVC}} --namespace={{.NS}} --ignore-not-found",
        },
      ],
      preconditions: [
        "which kubectl",
        "which gum",
        "which xdg-open",
      ],
    },
  },
}
