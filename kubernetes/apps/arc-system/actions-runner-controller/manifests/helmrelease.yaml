---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "actions-runner-controller",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "gha-runner-scale-set-controller",
    },
    postRenderers: [{
      kustomize: {
        patches: [{
          target: {
            kind: "Deployment",
          },
          patch: "\
             - op: add\n\
            \  path: /spec/template/spec/hostUsers\n\
            \  value: false\n\
            ",
        }],
      },
    }],
    values: {
      fullnameOverride: "actions-runner-controller",
      replicaCount: 1,
      podSecurityContext: {
        runAsNonRoot: true,
        runAsUser: 65532,
        runAsGroup: 65532,
        seccompProfile: {
          type: "RuntimeDefault",
        },
      },
      securityContext: {
        allowPrivilegeEscalation: false,
        readOnlyRootFilesystem: true,
        capabilities: {
          drop: [
            "ALL",
          ],
        },
      },
      flags: {
        watchSingleNamespace: "arc-runners",
      },
      namespaceOverride: "arc-system",
    },
  },
}
