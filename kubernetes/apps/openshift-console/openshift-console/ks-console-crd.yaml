---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "openshift-console-crds",
    namespace: "flux-system",
  },
  spec: {
    interval: "1h",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "openshift-api",
    },
    path: "./console/v1/zz_generated.crd-manifests",
  },
  "": ,
  "": ,
  "": ,
  "": ,
  "": ,
}
---
{
  apiVersion: "source.toolkit.fluxcd.io/v1",
  kind: "GitRepository",
  metadata: {
    name: "openshift-api",
    namespace: "flux-system",
  },
  spec: {
    interval: "1h",
    url: "https://github.com/openshift/api",
    ref: {
      branch: "master",
    },
  },
}
