---
{
  # yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "pgadmin",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "pgadmin",
    },
    values: {
      controllers: {
        pgadmin: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          containers: {
            pgadmin: {
              image: {
                repository: "ghcr.io/d4rkfella/pgadmin4",
                tag: "9.13@sha256:364e84459d6c04b7bdfe8bfdaddaeff05d4c07552ba8bd6699c3266e72589e72",
              },
              env: {
                GUNICORN_LIMIT_REQUEST_LINE: 0,
                GUNICORN_LIMIT_REQUEST_FIELD_SIZE: 0,
                PGADMIN_DISABLE_POSTFIX: "true",
                PGADMIN_CONFIG_AUTHENTICATION_SOURCES: "['oauth2']",
                PGADMIN_CONFIG_MASTER_PASSWORD: "True",
              },
              envFrom: [{
                secretRef: {
                  name: "pgadmin-secret",
                },
              }],
              securityContext: {
                allowPrivilegeEscalation: false,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
                readOnlyRootFilesystem: true,
              },
            },
          },
        },
      },
      defaultPodOptions: {
        hostUsers: false,
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      persistence: {
        config: {
          existingClaim: "{{ .Release.Name }}",
          globalMounts: [{
            path: "/var/lib/pgadmin",
          }],
        },
        config-distro: {
          type: "configMap",
          name: "pgadmin4-config",
          globalMounts: [{
            path: "/var/lib/pgadmin/config_distro.py",
            subPath: "config_distro.py",
            readOnly: true,
          }],
        },
        gunicorn_config: {
          type: "configMap",
          name: "pgadmin4-config",
          globalMounts: [{
            path: "/usr/share/pgadmin4/gunicorn_config.py",
            subPath: "gunicorn_config.py",
            readOnly: true,
          }],
        },
        empty: {
          type: "emptyDir",
          sizeLimit: "100Mi",
          globalMounts: [{
            path: "/tmp",
            subPath: "tmp",
          }, {
            path: "/var/log",
            subPath: "log",
          }],
        },
      },
      route: {
        pgadmin: {
          hostnames: [
            "{{ .Release.Name }}.darkfellanetwork.com",
          ],
          parentRefs: [{
            name: "internal",
            namespace: "envoy-gateway-system",
          }],
          rules: [{
            backendRefs: [{
              port: 80,
              name: "pgadmin",
            }],
          }],
        },
      },
      service: {
        pgadmin: {
          controller: "pgadmin",
          ports: {
            http: {
              port: 80,
            },
          },
        },
      },
    },
  },
}
