---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
{
  apiVersion: "grafana.integreatly.org/v1beta1",
  kind: "GrafanaDashboard",
  metadata: {
    name: "dcgm-exporter",
  },
  spec: {
    allowCrossNamespaceImport: true,
    instanceSelector: {
      matchLabels: {
        grafana.internal/instance: "grafana",
      },
    },
    datasources: [{
      datasourceName: "prometheus",
      inputName: "DS_PROMETHEUS",
    }],
    url: "https://raw.githubusercontent.com/NVIDIA/dcgm-exporter/main/grafana/dcgm-exporter-dashboard.json",
  },
}
