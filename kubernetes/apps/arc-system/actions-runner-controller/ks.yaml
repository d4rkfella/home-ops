---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "actions-runner-controller",
  },
  spec: {
    healthChecks: [{
      apiVersion: "helm.toolkit.fluxcd.io/v2",
      kind: "HelmRelease",
      name: "actions-runner-controller",
      namespace: "arc-system",
    }],
    path: "./kubernetes/apps/arc-system/actions-runner-controller/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    interval: "1h",
    wait: true,
  },
}
