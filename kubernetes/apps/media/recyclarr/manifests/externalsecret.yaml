---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/external-secrets.io/externalsecret_v1beta1.json
{
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "recyclarr",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "recyclarr-secret",
    },
    data: [{
      secretKey: "RADARR_API_KEY",
      remoteRef: {
        key: "secrets/radarr",
        property: "RADARR_API_KEY",
      },
    }, {
      secretKey: "SONARR_API_KEY",
      remoteRef: {
        key: "secrets/sonarr",
        property: "SONARR_API_KEY",
      },
    }],
  },
}
