---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "multus",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "multus",
    },
    postRenderers: [{
      kustomize: {
        patches: [{
          target: {
            kind: "DaemonSet",
            name: "multus",
          },
          patch: "\
             - op: add\n\
            \  path: /spec/template/spec/containers/0/args\n\
            \  value:\n\
            \    - \"--cleanup-config-on-exit\"\n\
            \    - \"--multus-bin-file=/usr/bin/multus\"\n\
            \    - \"--multus-cni-conf-dir=/tmp\"\n\
            ",
        }],
      },
    }],
    values: {
      cni-plugins: {
        image: {
          repository: "ghcr.io/d4rkfella/cni-plugins",
          tag: "1.9.1@sha256:7bf918df0914b7a3267629da13abb6d6cb7455aca603eb5baaf63d7c05ba0b2d",
        },
        resources: {},
      },
      multus: {
        image: {
          repository: "ghcr.io/d4rkfella/multus-cni",
          tag: "4.2.4@sha256:6b111564f35ed1db1f9b11571c285fd7f05a61d3ba38339b2f3ccaa32a7321e6",
        },
        resources: {
          requests: {
            cpu: "10m",
          },
          limits: {
            memory: "512Mi",
          },
        },
      },
      cni: {
        netPath: "/etc/cni/net.d",
        binPath: "/opt/cni/bin",
      },
    },
  },
}
