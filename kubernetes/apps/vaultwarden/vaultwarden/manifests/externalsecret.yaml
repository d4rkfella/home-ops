---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/external-secrets.io/externalsecret_v1beta1.json
{
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "vaultwarden",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "vaultwarden-secret",
      template: {
        data: {
          SMTP_USERNAME: "{{ .SMTP_USERNAME }}",
          SMTP_PASSWORD: "{{ .SMTP_PASSWORD }}",
          PUSH_INSTALLATION_ID: "{{ .PUSH_INSTALLATION_ID }}",
          PUSH_INSTALLATION_KEY: "{{ .PUSH_INSTALLATION_KEY }}",
          SSO_CLIENT_SECRET: "{{ .SSO_CLIENT_SECRET }}",
          DATABASE_URL: "postgresql://{{ .POSTGRES_USERNAME }}:{{ .POSTGRES_PASSWORD | urlquery }}@postgres-db-rw.database.svc.cluster.local:5432/vaultwarden?sslmode=verify-full&sslrootcert=system",
        },
      },
    },
    dataFrom: [{
      extract: {
        key: "secrets/vaultwarden",
      },
    }],
  },
}
