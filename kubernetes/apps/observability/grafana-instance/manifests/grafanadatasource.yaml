---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
{
  apiVersion: "grafana.integreatly.org/v1beta1",
  kind: "GrafanaDatasource",
  metadata: {
    name: "alertmanager",
  },
  spec: {
    instanceSelector: {
      matchLabels: {
        grafana.internal/instance: "grafana",
      },
    },
    datasource: {
      type: "alertmanager",
      name: "alertmanager",
      access: "proxy",
      url: "https://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093",
      jsonData: {
        implementation: "prometheus",
        serverName: "kube-prometheus-stack-alertmanager.observability.svc.cluster.local",
      },
    },
    valuesFrom: [{
      targetPath: "datasource.secureJsonData.tlsCACert",
      valueFrom: {
        secretKeyRef: {
          name: "internal-ca-secret",
          key: "ca.crt",
        },
      },
    }],
    uid: "alertmanager",
  },
}
---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
{
  apiVersion: "grafana.integreatly.org/v1beta1",
  kind: "GrafanaDatasource",
  metadata: {
    name: "prometheus",
  },
  spec: {
    instanceSelector: {
      matchLabels: {
        grafana.internal/instance: "grafana",
      },
    },
    datasource: {
      type: "prometheus",
      name: "prometheus",
      access: "proxy",
      isDefault: true,
      url: "https://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090",
      jsonData: {
        prometheusType: "Prometheus",
        timeInterval: "60s",
        manageAlerts: true,
        alertmanagerUid: "alertmanager",
        serverName: "kube-prometheus-stack-prometheus.observability.svc.cluster.local",
      },
    },
    uid: "prometheus",
  },
}
---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/grafana.integreatly.org/grafanadatasource_v1beta1.json
{
  apiVersion: "grafana.integreatly.org/v1beta1",
  kind: "GrafanaDatasource",
  metadata: {
    name: "loki",
  },
  spec: {
    instanceSelector: {
      matchLabels: {
        grafana.internal/instance: "grafana",
      },
    },
    datasource: {
      type: "loki",
      name: "loki",
      access: "proxy",
      url: "http://loki-headless.observability.svc.cluster.local:3100",
    },
    uid: "loki",
  },
}
