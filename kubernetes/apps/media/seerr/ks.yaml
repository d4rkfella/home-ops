---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "seerr",
  },
  spec: {
    commonMetadata: {
      labels: {
        app.kubernetes.io/name: "seerr",
      },
    },
    components: [
      "../../../../components/volsync",
    ],
    dependsOn: [{
      name: "cloudnative-pg-cluster",
      namespace: "database",
    }],
    path: "./kubernetes/apps/media/seerr/manifests",
    postBuild: {
      substitute: {
        APP: "seerr",
      },
    },
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
    interval: "1h",
    timeout: "5m",
    retryInterval: "1m",
  },
}
