---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "truenas-scale",
    namespace: "virtualization",
  },
  spec: {
    path: "./kubernetes/apps/virtualization/truenas-scale/manifests",
    prune: true,
    interval: "1h",
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    healthChecks: [{
      apiVersion: "kubevirt.io/v1",
      kind: "VirtualMachine",
      name: "truenas",
      namespace: "virtualization",
    }],
    healthCheckExprs: [{
      apiVersion: "kubevirt.io/v1",
      kind: "VirtualMachine",
      inProgress: "status.printableStatus != \"Running\"",
      current: "status.conditions.filter(e, e.type == \"Ready\").all(e, e.status == \"True\") && status.conditions.filter(e, e.type == \"AgentConnected\").all(e, e.status == \"True\") && status.conditions.filter(e, e.type == \"DataVolumesReady\").all(e, e.status == \"True\")",
      failed: "status.conditions.filter(e, e.type == \"Ready\").any(e, e.status == \"False\") || status.conditions.filter(e, e.type == \"AgentConnected\").any(e, e.status == \"False\") || status.conditions.filter(e, e.type == \"DataVolumesReady\").any(e, e.status == \"False\")",
    }],
  },
}
