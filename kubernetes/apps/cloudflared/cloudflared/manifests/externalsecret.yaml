---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/external-secrets.io/externalsecret_v1beta1.json
{
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "cloudflared",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "cloudflared-secret",
      template: {
        data: {
          TUNNEL_TOKEN: "\
             {{ toJson (dict \"a\" .CLOUDFLARE_ACCOUNT_TAG \"t\" .CLOUDFLARE_TUNNEL_ID \"s\" .CLOUDFLARE_TUNNEL_SECRET) | b64enc }}\n\
            ",
        },
      },
    },
    dataFrom: [{
      extract: {
        key: "secrets/cloudflare",
      },
    }],
  },
}
