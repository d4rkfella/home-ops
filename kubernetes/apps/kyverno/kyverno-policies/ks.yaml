---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "kyverno-policies",
  },
  spec: {
    dependsOn: [{
      name: "kyverno",
    }],
    path: "./kubernetes/apps/kyverno/kyverno-policies/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
    interval: "1h",
  },
}
