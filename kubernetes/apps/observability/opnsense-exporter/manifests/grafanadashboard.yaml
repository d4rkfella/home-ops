---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
{
  apiVersion: "grafana.integreatly.org/v1beta1",
  kind: "GrafanaDashboard",
  metadata: {
    name: "opnsense-exporter",
  },
  spec: {
    allowCrossNamespaceImport: true,
    instanceSelector: {
      matchLabels: {
        grafana.internal/instance: "grafana",
      },
    },
    datasources: [{
      datasourceName: "prometheus",
      inputName: "DS_PROMETHEUS-K0",
    }],
    url: "https://raw.githubusercontent.com/AthennaMind/opnsense-exporter/main/deploy/grafana/dashboard-v1.json",
  },
}
