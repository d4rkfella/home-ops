---
{
  apiVersion: "storage.k8s.io/v1",
  kind: "StorageClass",
  metadata: {
    name: "openebs-zfs-1m",
    annotations: {
      cdi.kubevirt.io/clone-strategy: "snapshot",
    },
  },
  provisioner: "zfs.csi.openebs.io",
  volumeBindingMode: "WaitForFirstConsumer",
  allowVolumeExpansion: true,
  parameters: {
    thinprovision: "yes",
    recordsize: "1m",
    compression: "lz4",
    dedup: "off",
    csi.storage.k8s.io/fstype: "zfs",
    shared: "yes",
    poolname: "ssd_pool",
  },
}
