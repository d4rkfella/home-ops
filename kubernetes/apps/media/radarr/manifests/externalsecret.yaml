---
# yaml-language-server: $schema=https://kubernetes-schemas-9iu.pages.dev/external-secrets.io/externalsecret_v1beta1.json
{
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "radarr",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "radarr-secret",
    },
    dataFrom: [{
      extract: {
        key: "kv/radarr",
      },
    }, {
      extract: {
        key: "kv/pushover",
      },
    }],
  },
}
