---
{
  # yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "filestash",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "filestash",
    },
    values: {
      controllers: {
        filestash: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          containers: {
            filestash: {
              image: {
                repository: "machines/filestash",
                tag: "latest",
              },
              env: {
                APPLICATION_URL: "filestash.darkfellanetwork.com",
                CANARY: "true",
                OFFICE_URL: "http://collabora-collabora-online.filestash.svc.cluster.local:9980",
                OFFICE_FILESTASH_URL: "https://filestash.darkfellanetwork.com",
                OFFICE_REWRITE_URL: "https://office.darkfellanetwork.com",
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 1000,
          fsGroupChangePolicy: "OnRootMismatch",
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      service: {
        filestash: {
          controller: "filestash",
          ports: {
            http: {
              port: 8334,
            },
          },
        },
      },
      route: {
        filestash: {
          hostnames: [
            "filestash.darkfellanetwork.com",
          ],
          parentRefs: [{
            name: "internal",
            namespace: "envoy-gateway-system",
            sectionName: "https",
          }],
          rules: [{
            backendRefs: [{
              name: "filestash",
              port: 8334,
            }],
          }],
        },
      },
      persistence: {
        state: {
          type: "persistentVolumeClaim",
          suffix: "state",
          size: "15Gi",
          accessMode: "ReadWriteOnce",
          storageClass: "openebs-zfs-128k",
          globalMounts: [{
            path: "/app/data/state",
          }],
        },
        tmp: {
          type: "emptyDir",
        },
      },
    },
  },
}
