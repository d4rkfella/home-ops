---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "kubevirt-apiserver-proxy",
  },
  spec: {
    interval: "1h",
    path: "./kubernetes/apps/kubevirt/kubevirt-apiserver-proxy/manifests",
    prune: false,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    dependsOn: [{
      name: "kubevirt-instance",
    }],
  },
}
