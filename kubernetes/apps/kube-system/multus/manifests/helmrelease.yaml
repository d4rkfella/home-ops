---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "multus",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "multus",
    },
    values: {
      cni-plugins: {
        image: {
          repository: "ghcr.io/d4rkfella/cni-plugins",
          tag: "1.9.1@sha256:bb3bdc927b463c7d65346d4b735a2ffef72dff519d12aabf44d8a55df9c5d40c",
        },
        resources: {},
      },
      multus: {
        image: {
          repository: "ghcr.io/d4rkfella/multus-cni",
          tag: "4.2.4@sha256:1b77e09fd778094c342eabdabc0f89da8fb5bfc0183d49192b286d4cee87a506",
        },
        resources: {
          requests: {
            cpu: "10m",
          },
          limits: {
            memory: "512Mi",
          },
        },
      },
      cni: {
        netPath: "/etc/cni/net.d",
        binPath: "/opt/cni/bin",
      },
    },
  },
}
