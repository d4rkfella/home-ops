---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/monitoring.coreos.com/servicemonitor_v1.json
{
  apiVersion: "monitoring.coreos.com/v1",
  kind: "ServiceMonitor",
  metadata: {
    name: "envoy-gateway",
  },
  spec: {
    endpoints: [{
      port: "metrics",
      path: "/metrics",
      honorLabels: true,
    }],
    jobLabel: "envoy-gateway",
    namespaceSelector: {
      matchNames: [
        "envoy-gateway-system",
      ],
    },
    selector: {
      matchLabels: {
        control-plane: "envoy-gateway",
      },
    },
  },
}
