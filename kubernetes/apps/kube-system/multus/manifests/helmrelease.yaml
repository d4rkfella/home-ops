---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "multus",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "multus",
    },
    postRenderers: [{
      kustomize: {
        patches: [{
          target: {
            kind: "DaemonSet",
            name: "multus",
          },
          patch: "\
             - op: add\n\
            \  path: /spec/template/spec/containers/0/args\n\
            \  value:\n\
            \    - \"--cleanup-config-on-exit\"\n\
            \    - \"--multus-bin-file=/usr/bin/multus\"\n\
            \    - \"--multus-cni-conf-dir=/tmp\"\n\
            ",
        }],
      },
    }],
    values: {
      cni-plugins: {
        image: {
          repository: "ghcr.io/d4rkfella/cni-plugins",
          tag: "1.9.1@sha256:1948638d897460ff423ce6c46f677cda9d0b0e3a93c51c5c9ad1359bd77b8d37",
        },
        resources: {},
      },
      multus: {
        image: {
          repository: "ghcr.io/d4rkfella/multus-cni",
          tag: "4.2.4@sha256:aec04029284c7aba4e406df4c4c42abdb0b7c4e12b82c929500ac8996f57e8f0",
        },
        resources: {
          requests: {
            cpu: "10m",
          },
          limits: {
            memory: "512Mi",
          },
        },
      },
      cni: {
        netPath: "/etc/cni/net.d",
        binPath: "/opt/cni/bin",
      },
    },
  },
}
