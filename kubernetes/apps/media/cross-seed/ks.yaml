---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "cross-seed",
  },
  spec: {
    dependsOn: [{
      name: "qbittorrent",
    }, {
      name: "prowlarr",
    }, {
      name: "radarr",
    }, {
      name: "sonarr",
    }],
    interval: "1h",
    path: "./kubernetes/apps/media/cross-seed/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
  },
}
