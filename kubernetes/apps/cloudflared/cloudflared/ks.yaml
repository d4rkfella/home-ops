---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "cloudflared",
  },
  spec: {
    dependsOn: [{
      name: "cloudflare-dns",
      namespace: "external-dns",
    }],
    path: "./kubernetes/apps/cloudflared/cloudflared/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
    interval: "1h",
  },
}
