---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/external-secrets.io/clusterexternalsecret_v1beta1.json
{
  apiVersion: "external-secrets.io/v1",
  kind: "ClusterExternalSecret",
  metadata: {
    name: "internal-ca",
  },
  spec: {
    namespaceSelector: {
      matchExpressions: [{
        key: "kubernetes.io/metadata.name",
        operator: "NotIn",
        values: [
          "kube-system",
          "kube-public",
          "kube-node-lease",
          "external-secrets",
        ],
      }],
    },
    externalSecretSpec: {
      refreshInterval: "1h",
      secretStoreRef: {
        kind: "ClusterSecretStore",
        name: "hashicorp-vault",
      },
      target: {
        name: "internal-ca-secret",
        creationPolicy: "Owner",
        deletionPolicy: "Retain",
      },
      dataFrom: [{
        extract: {
          key: "secrets/certificates/internal-ca",
        },
      }],
    },
  },
}
