---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "bazarr",
  },
  spec: {
    commonMetadata: {
      labels: {
        app.kubernetes.io/name: "bazarr",
      },
    },
    components: [
      "../../../../components/volsync",
    ],
    dependsOn: [{
      name: "cloudnative-pg-cluster",
      namespace: "database",
    }, {
      name: "keycloak-instance",
      namespace: "keycloak",
    }],
    path: "./kubernetes/apps/media/bazarr/manifests",
    postBuild: {
      substitute: {
        APP: "bazarr",
        VOLSYNC_CAPACITY: "2Gi",
      },
    },
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
    interval: "31m",
    timeout: "5m",
  },
}
