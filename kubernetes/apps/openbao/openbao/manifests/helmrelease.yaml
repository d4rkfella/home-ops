---
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "openbao",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "openbao",
    },
    postRenderers: [{
      kustomize: {
        patches: [{
          target: {
            kind: "StatefulSet",
            name: "openbao",
          },
          patch: "\
             - op: add\n\
            \  path: /spec/template/spec/hostUsers\n\
            \  value: false\
            ",
        }, {
          target: {
            kind: "ServiceMonitor",
            name: "openbao",
            namespace: "openbao",
          },
          patch: "\
             - op: add\n\
            \  path: /spec/endpoints/0/bearerTokenFile\n\
            \  value: \"/vault/secrets/token\"\
            ",
        }],
      },
    }],
    values: {
      global: {
        enabled: false,
        tlsDisable: false,
        serverTelemetry: {
          prometheusOperator: false,
        },
      },
      injector: {
        enabled: true,
        logFormat: "json",
        revokeOnShutdown: true,
        strategy: {
          type: "Recreate",
        },
        webhook: {
          failurePolicy: "Fail",
        },
      },
      server: {
        enabled: true,
        updateStrategyType: "RollingUpdate",
        logLevel: "debug",
        logFormat: "json",
        extraEnvironmentVars: {
          GOOGLE_APPLICATION_CREDENTIALS: "/openbao/userconfig/gcp-creds/openbao-unseal-creds.json",
        },
        server: ,
        volumes: [{
          name: "gcp-kms-creds",
          secret: {
            secretName: "gcp-kms-creds",
          },
        }, {
          name: "openbao-server-tls",
          secret: {
            secretName: "openbao-server-tls",
          },
        }],
        volumeMounts: [{
          name: "gcp-kms-creds",
          mountPath: "/openbao/userconfig/gcp-creds",
          readOnly: true,
        }, {
          name: "openbao-server-tls",
          mountPath: "/openbao/userconfig/openbao-server-tls",
          readOnly: true,
        }],
        affinity: "\
           podAntiAffinity:\n\
          \  preferredDuringSchedulingIgnoredDuringExecution:\n\
          \    - weight: 100\n\
          \      podAffinityTerm:\n\
          \        labelSelector:\n\
          \          matchLabels:\n\
          \            app.kubernetes.io/name: {{ template \"openbao.name\" . }}\n\
          \            app.kubernetes.io/instance: \"{{ .Release.Name }}\"\n\
          \            component: server\n\
          \        topologyKey: kubernetes.io/hostname\n\
          ",
        persistentVolumeClaimRetentionPolicy: {
          whenDeleted: "Retain",
          whenScaled: "Retain",
        },
        auditStorage: {
          enabled: true,
        },
        ha: {
          enabled: true,
          replicas: 3,
          apiAddr: "https://openbao.darkfellanetwork.com:8200",
          raft: {
            enabled: true,
            setNodeId: true,
            config: "\
               ui = true\n\
               \n\
               listener \"tcp\" {\n\
              \  tls_disable = 0\n\
              \  tls_min_version = \"tls13\"\n\
              \  tls_cert_file = \"/openbao/userconfig/openbao-server-tls/tls.crt\"\n\
              \  tls_key_file  = \"/openbao/userconfig/openbao-server-tls/tls.key\"\n\
              \  address = \"[::]:8200\"\n\
              \  cluster_address = \"[::]:8201\"\n\
               }\n\
               \n\
               storage \"raft\" {\n\
              \  path = \"/openbao/data\"\n\
              \  retry_join {\n\
              \    leader_api_addr = \"https://openbao-0.openbao-internal:8200\"\n\
              \    leader_client_cert_file = \"/openbao/userconfig/openbao-server-tls/tls.crt\"\n\
              \    leader_client_key_file = \"/openbao/userconfig/openbao-server-tls/tls.key\"\n\
              \    leader_tls_servername = \"openbao.darkfellanetwork.com\"\n\
              \  }\n\
              \  retry_join {\n\
              \    leader_api_addr = \"https://openbao-1.openbao-internal:8200\"\n\
              \    leader_client_cert_file = \"/openbao/userconfig/openbao-server-tls/tls.crt\"\n\
              \    leader_client_key_file = \"/openbao/userconfig/openbao-server-tls/tls.key\"\n\
              \    leader_tls_servername = \"openbao.darkfellanetwork.com\"\n\
              \  }\n\
              \  retry_join {\n\
              \    leader_api_addr = \"https://openbao-2.openbao-internal:8200\"\n\
              \    leader_client_cert_file = \"/openbao/userconfig/openbao-server-tls/tls.crt\"\n\
              \    leader_client_key_file = \"/openbao/userconfig/openbao-server-tls/tls.key\"\n\
              \    leader_tls_servername = \"openbao.darkfellanetwork.com\"\n\
              \  }\n\
               }\n\
               \n\
               service_registration \"kubernetes\" {}\n\
               \n\
               telemetry {\n\
              \  prometheus_retention_time = \"24h\"\n\
              \  disable_hostname = true\n\
               }\n\
               \n\
               seal \"gcpckms\" {\n\
              \  project     = \"home-ops-503207\"\n\
              \  region      = \"global\"\n\
              \  key_ring    = \"openbao-unseal-kr\"\n\
              \  crypto_key  = \"openbao-unseal-key\"\n\
               }\n\
              ",
          },
        },
      },
      ui: {
        enabled: true,
        serviceType: "LoadBalancer",
        externalTrafficPolicy: "Local",
        annotations: {
          external-dns.alpha.kubernetes.io/hostname: "openbao.darkfellanetwork.com",
          lbipam.cilium.io/ips: "192.168.91.54",
        },
      },
      serverTelemetry: {
        serviceMonitor: {
          enabled: true,
          selectors: {},
          scheme: "",
          interval: "30s",
          scrapeTimeout: "10s",
          tlsConfig: {
            serverName: "openbao.darkfellanetwork.com",
          },
        },
        prometheusRules: {
          enabled: true,
          rules: [{
            alert: "VaultHighResponseTime",
            annotations: {
              message: "The response time of Vault is over 500ms on average over the last 5 minutes.",
            },
            expr: "vault_core_handle_request{quantile=\"0.5\", namespace=\"mynamespace\"} > 500",
            for: "5m",
            labels: {
              severity: "warning",
            },
          }, {
            alert: "VaultHighResponseTime",
            annotations: {
              message: "The response time of Vault is over 1s on average over the last 5 minutes.",
            },
            expr: "vault_core_handle_request{quantile=\"0.5\", namespace=\"mynamespace\"} > 1000",
            for: "5m",
            labels: {
              severity: "critical",
            },
          }, {
            alert: "VaultAutopilotNodeHealthy",
            expr: "vault_autopilot_healthy < 1",
            for: "1m",
            labels: {
              severity: "critical",
            },
            annotations: {
              summary: "Autopilot Vault Raft node unhealthy",
              description: "At least one of the Autopilot Vault Raft nodes is unhealthy",
            },
          }, {
            alert: "VaultLeadershipLoss",
            expr: "sum(increase(vault_core_leadership_lost_count{job=\"vault-monitoring\"}[1h])) > 5",
            for: "1m",
            labels: {
              severity: "critical",
            },
            annotations: {
              summary: "High frequency of Vault leadership losses",
              description: "There have been more than 5 Vault leadership losses in the past 1h",
            },
          }, {
            alert: "VaultLeadershipStepDowns",
            expr: "sum(increase(vault_core_step_down_count{job=\"vault-monitoring\"}[1h])) > 5",
            for: "1m",
            labels: {
              severity: "critical",
            },
            annotations: {
              summary: "High frequency of Vault leadership step downs",
              description: "There have been more than 5 Vault leadership step downs in the past 1h",
            },
          }, {
            alert: "VaultLeadershipSetupFailures",
            expr: "sum(increase(vault_core_leadership_setup_failed{job=\"vault-monitoring\"}[1h])) > 5",
            for: "1m",
            labels: {
              severity: "critical",
            },
            annotations: {
              summary: "High frequency of Vault leadership setup failures",
              description: "There have been more than 5 Vault leadership setup failures in the past 1h",
            },
          }, {
            alert: "VaultRequestFailures",
            expr: "increase(vault_audit_log_request_failure[5m]) > 0",
            for: "15m",
            labels: {
              severity: "critical",
            },
            annotations: {
              summary: "High frequency of failed Vault requests",
              description: "There has been an increased number of failed Vault requests in the last 15 minutes",
            },
          }, {
            alert: "VaultResponseFailures",
            expr: "increase(vault_audit_log_response_failure[5m]) > 0",
            for: "15m",
            labels: {
              severity: "critical",
            },
            annotations: {
              summary: "High frequency of failed Vault responses",
              description: "There has been an increased number of failed Vault responses in the last 15 minutes",
            },
          }, {
            alert: "VaultTokenCreate",
            expr: "increase(vault_token_create_count[5m]) > 100",
            for: "15m",
            labels: {
              severity: "critical",
            },
            annotations: {
              summary: "High frequency of created Vault token",
              description: "There has been an increased number of Vault token creation in the last 15 minutes",
            },
          }, {
            alert: "VaultTokenStore",
            expr: "increase(vault_token_store_count[5m]) > 100",
            for: "15m",
            labels: {
              severity: "critical",
            },
            annotations: {
              summary: "High frequency of stored Vault token",
              description: "There has been an increased number of Vault token storing in the last 15 minutes",
            },
          }, {
            alert: "VaultLowFailureTolerance",
            expr: "vault_autopilot_failure_tolerance == 0",
            for: "5m",
            labels: {
              severity: "critical",
            },
            annotations: {
              summary: "Vault Raft Cluster Failure Tolerance Critical",
              description: "Vault Raft cluster has a failure tolerance of 0",
            },
          }],
        },
        grafanaDashboard: {
          enabled: true,
        },
      },
      extraObjects: [{
        apiVersion: "cilium.io/v2",
        kind: "CiliumNetworkPolicy",
        metadata: {
          name: "openbao-server-policy",
        },
        spec: {
          endpointSelector: {
            matchLabels: {
              app.kubernetes.io/name: "openbao",
            },
          },
          ingress: [{
            fromEndpoints: [{
              matchLabels: {
                app.kubernetes.io/name: "external-secrets",
                io.kubernetes.pod.namespace: "external-secrets",
              },
            }],
          }, {
            fromEndpoints: [{
              matchLabels: {
                app.kubernetes.io/name: "openbao",
                app.kubernetes.io/instance: "openbao",
                io.kubernetes.pod.namespace: "openbao",
              },
            }],
            toPorts: [{
              ports: [{
                port: "8200",
                protocol: "TCP",
              }, {
                port: "8201",
                protocol: "TCP",
              }],
            }],
          }, {
            fromEndpoints: [{
              matchLabels: {
                app.kubernetes.io/name: "cert-manager",
                io.kubernetes.pod.namespace: "cert-manager",
              },
            }],
            toPorts: [{
              ports: [{
                port: "8200",
                protocol: "TCP",
              }],
            }],
          }, {
            fromEndpoints: [{
              matchLabels: {
                app.kubernetes.io/name: "prometheus",
                io.kubernetes.pod.namespace: "observability",
              },
            }],
            toPorts: [{
              ports: [{
                port: "8200",
                protocol: "TCP",
              }],
            }],
          }, {
            fromEndpoints: [{
              matchLabels: {
                app.kubernetes.io/name: "gatus",
                io.kubernetes.pod.namespace: "observability",
              },
            }],
            toPorts: [{
              ports: [{
                port: "8200",
                protocol: "TCP",
              }],
            }],
          }, {
            fromCIDRSet: [{
              cidr: "192.168.91.0/24",
            }],
            toPorts: [{
              ports: [{
                port: "8200",
                protocol: "TCP",
              }],
            }],
          }],
          egress: [{
            toEndpoints: [{
              matchLabels: {
                io.kubernetes.pod.namespace: "kube-system",
                k8s-app: "kube-dns",
              },
            }],
            toPorts: [{
              ports: [{
                port: "53",
                protocol: "UDP",
              }, {
                port: "53",
                protocol: "TCP",
              }],
              rules: {
                dns: [{
                  matchPattern: "*",
                }],
              },
            }],
          }, {
            toEndpoints: [{
              matchLabels: {
                app.kubernetes.io/name: "openbao",
                app.kubernetes.io/instance: "openbao",
                io.kubernetes.pod.namespace: "openbao",
              },
            }],
            toPorts: [{
              ports: [{
                port: "8200",
                protocol: "TCP",
              }, {
                port: "8201",
                protocol: "TCP",
              }],
            }],
          }, {
            toEntities: [
              "kube-apiserver",
            ],
            toPorts: [{
              ports: [{
                port: "6443",
                protocol: "TCP",
              }],
            }],
          }, {
            toFQDNs: [{
              matchName: "cloudkms.googleapis.com",
            }],
            toPorts: [{
              ports: [{
                port: "443",
                protocol: "TCP",
              }],
            }],
          }, {
            toFQDNs: [{
              matchName: "2bd80478faceecf0d53c596cd910805f.r2.cloudflarestorage.com",
            }],
            toPorts: [{
              ports: [{
                port: "443",
                protocol: "TCP",
              }],
            }],
          }],
        },
      }, {
        apiVersion: "grafana.integreatly.org/v1beta1",
        kind: "GrafanaDashboard",
        metadata: {
          name: "openbao",
        },
        spec: {
          allowCrossNamespaceImport: true,
          instanceSelector: {
            matchLabels: {
              grafana.internal/instance: "grafana",
            },
          },
          datasources: [{
            datasourceName: "prometheus",
            inputName: "DS_PROMXY",
          }],
          configMapRef: {
            name: "openbao-dashboard",
            key: "dashboard.json",
          },
        },
      }],
      snapshotAgent: {
        enabled: true,
        schedule: "30 2 * * *",
        image: {
          repository: "ghcr.io/openbao/openbao-snapshot-agent",
          tag: "0.3.0",
        },
        extraEnvironmentVars: {
          BAO_ADDR: "https://openbao.darkfellanetwork.com:8200",
        },
        s3CredentialsSecret: "openbao-r2-credentials",
        config: {
          s3Host: "https://2bd80478faceecf0d53c596cd910805f.r2.cloudflarestorage.com",
          s3Bucket: "openbao-snapshots",
          s3Uri: "s3://openbao-snapshots",
          s3ExpireDays: "14",
          s3cmdExtraFlag: "-v --region=auto",
          baoAuthPath: "kubernetes",
          baoRole: "snapshot",
        },
      },
    },
  },
}
