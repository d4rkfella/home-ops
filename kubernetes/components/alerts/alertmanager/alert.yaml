---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/notification.toolkit.fluxcd.io/alert_v1beta3.json
{
  apiVersion: "notification.toolkit.fluxcd.io/v1beta3",
  kind: "Alert",
  metadata: {
    name: "alertmanager",
  },
  spec: {
    providerRef: {
      name: "alertmanager",
    },
    eventSeverity: "error",
    eventSources: [{
      kind: "FluxInstance",
      name: "*",
    }, {
      kind: "GitRepository",
      name: "*",
    }, {
      kind: "HelmRelease",
      name: "*",
    }, {
      kind: "HelmRepository",
      name: "*",
    }, {
      kind: "Kustomization",
      name: "*",
    }, {
      kind: "OCIRepository",
      name: "*",
    }],
    exclusionList: [
      "context canceled$",
      "dial.*tcp.*timeout",
      "error.*lookup.*github",
      "read: connection timed out",
      "waiting.*socket",
    ],
    suspend: false,
  },
}
