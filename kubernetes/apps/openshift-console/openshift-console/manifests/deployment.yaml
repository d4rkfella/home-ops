---
{
  apiVersion: "apps/v1",
  kind: "Deployment",
  metadata: {
    name: "openshift-console",
    labels: {
      app: "openshift-console",
    },
  },
  spec: {
    replicas: 1,
    selector: {
      matchLabels: {
        app: "openshift-console",
      },
    },
    template: {
      metadata: {
        labels: {
          app: "openshift-console",
        },
      },
      spec: {
        serviceAccountName: "openshift-console",
        initContainers: [{
          name: "generate-cookie-keys",
          image: "busybox:1.36",
          command: [
            "sh",
            "-c",
          ],
          args: [
            "dd if=/dev/urandom of=/etc/console-cookie/auth bs=1 count=32 && dd if=/dev/urandom of=/etc/console-cookie/encrypt bs=1 count=32",
          ],
          volumeMounts: [{
            name: "console-cookie",
            mountPath: "/etc/console-cookie",
          }],
          securityContext: {
            allowPrivilegeEscalation: false,
            readOnlyRootFilesystem: true,
            runAsNonRoot: true,
            runAsUser: 1000,
          },
        }],
        containers: [{
          name: "console",
          image: "quay.io/openshift/origin-console:latest",
          ports: [{
            name: "http",
            containerPort: 9000,
            protocol: "TCP",
          }],
          command: [
            "/opt/bridge/bin/bridge",
          ],
          args: [
            "-cookie-authentication-key-file=/etc/console-cookie/auth",
            "-cookie-encryption-key-file=/etc/console-cookie/encrypt",
            "-user-settings-location=localstorage",
            "-ca-file=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt",
          ],
          env: [{
            name: "BRIDGE_USER_AUTH",
            value: "oidc",
          }, {
            name: "BRIDGE_USER_AUTH_OIDC_ISSUER_URL",
            value: "https://accounts.darkfellanetwork.com/realms/DarkfellaNET",
          }, {
            name: "BRIDGE_USER_AUTH_OIDC_CLIENT_ID",
            value: "openshift-console",
          }, {
            name: "BRIDGE_USER_AUTH_OIDC_CLIENT_SECRET",
            valueFrom: {
              secretKeyRef: {
                name: "openshift-console-secret",
                key: "clientSecret",
              },
            },
          }, {
            name: "BRIDGE_K8S_MODE",
            value: "off-cluster",
          }, {
            name: "BRIDGE_K8S_MODE_OFF_CLUSTER_ENDPOINT",
            value: "https://kubernetes.default.svc.cluster.local",
          }, {
            name: "BRIDGE_CA_FILE",
            value: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt",
          }, {
            name: "BRIDGE_K8S_MODE_OFF_CLUSTER_SKIP_VERIFY_TLS",
            value: "true",
          }, {
            name: "BRIDGE_BASE_ADDRESS",
            value: "https://console.darkfellanetwork.com",
          }, {
            name: "BRIDGE_BRANDING",
            value: "okd",
          }, {
            name: "BRIDGE_PLUGINS",
            value: "kubevirt-plugin=http://kubevirt-plugin.openshift-console.svc.cluster.local:8080/",
          }, {
            name: "BRIDGE_I18N_NAMESPACES",
            value: "plugin__kubevirt-plugin",
          }, {
            name: "BRIDGE_PUBLIC_DIR",
            value: "/opt/bridge/static",
          }, {
            name: "BRIDGE_USER_SETTINGS_LOCATION",
            value: "localstorage",
          }, {
            name: "BRIDGE_K8S_MODE_OFF_CLUSTER_THANOS",
            value: "http://prometheus-operated.observability.svc.cluster.local:9090",
          }, {
            name: "BRIDGE_K8S_MODE_OFF_CLUSTER_ALERTMANAGER",
            value: "http://alertmanager-operated.observability.svc.cluster.local:9093",
          }],
          resources: {
            requests: {
              cpu: "100m",
              memory: "256Mi",
            },
            limits: {
              cpu: "500m",
              memory: "512Mi",
            },
          },
          securityContext: {
            allowPrivilegeEscalation: false,
            readOnlyRootFilesystem: false,
            runAsNonRoot: true,
            runAsUser: 1000,
            capabilities: {
              drop: [
                "ALL",
              ],
            },
          },
          volumeMounts: [{
            name: "console-cookie",
            mountPath: "/etc/console-cookie",
            readOnly: true,
          }, {
            name: "oidc-secret",
            mountPath: "/etc/oidc",
            readOnly: true,
          }],
        }],
        volumes: [{
          name: "console-cookie",
          emptyDir: {},
        }, {
          name: "oidc-secret",
          secret: {
            secretName: "openshift-console-secret",
          },
        }],
      },
    },
  },
}
