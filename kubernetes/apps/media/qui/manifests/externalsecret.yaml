---
{
  # yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "qui",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "qui-secret",
      template: {
        data: {
          QUI__SESSION_SECRET: "{{ .QUI_SESSION_SECRET }}",
          QUI__OIDC_CLIENT_SECRET: "{{ .QUI_OIDC_CLIENT_SECRET }}",
          QUI__DATABASE_HOST: "postgres-db-rw.database.svc.cluster.local",
          QUI__DATABASE_PORT: "5432",
          QUI__DATABASE_NAME: "qui",
          QUI__DATABASE_USER: "{{ .QUI_DATABASE_USER }}",
          QUI__DATABASE_PASSWORD: "{{ .QUI_DATABASE_PASSWORD }}",
          QUI__DATABASE_SSL_MODE: "verify-full",
          ca.crt: "{{ index . \"ca.crt\" }}",
        },
      },
    },
    dataFrom: [{
      extract: {
        key: "secrets/qui",
      },
    }, {
      extract: {
        key: "secrets/certificates/postgres",
      },
    }],
  },
}
