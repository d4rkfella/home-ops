---
{
  apiVersion: "rbac.authorization.k8s.io/v1",
  kind: "ClusterRole",
  metadata: {
    name: "kubevirt-console-access",
  },
  rules: [{
    apiGroups: [
      "kubevirt.io",
    ],
    resources: [
      "virtualmachines",
      "virtualmachineinstances",
      "virtualmachinepools",
      "virtualmachineinstancetypes",
      "virtualmachineinstancepreferences",
      "virtualmachineinstancemigrations",
      "virtualmachinesnapshots",
      "virtualmachinerestores",
      "virtualmachineexports",
    ],
    verbs: [
      "get",
      "list",
      "watch",
    ],
  }, {
    apiGroups: [
      "kubevirt.io",
    ],
    resources: [
      "virtualmachines",
      "virtualmachinepools",
    ],
    verbs: [
      "create",
      "update",
      "patch",
      "delete",
    ],
  }, {
    apiGroups: [
      "subresources.kubevirt.io",
    ],
    resources: [
      "virtualmachines/start",
      "virtualmachines/stop",
      "virtualmachines/restart",
      "virtualmachineinstances/console",
      "virtualmachineinstances/vnc",
    ],
    verbs: [
      "get",
      "post",
      "put",
    ],
  }, {
    apiGroups: [
      "instancetype.kubevirt.io",
    ],
    resources: [
      "virtualmachineinstancetypes",
      "virtualmachineinstancepreferences",
    ],
    verbs: [
      "get",
      "list",
      "watch",
    ],
  }, {
    apiGroups: [
      "clone.kubevirt.io",
    ],
    resources: [
      "virtualmachineclones",
    ],
    verbs: [
      "get",
      "list",
      "watch",
      "create",
      "update",
      "patch",
      "delete",
    ],
  }, {
    apiGroups: [
      "cdi.kubevirt.io",
    ],
    resources: [
      "datavolumes",
      "datasources",
      "storageprofiles",
      "cdiconfigs",
    ],
    verbs: [
      "get",
      "list",
      "watch",
      "create",
      "update",
      "patch",
      "delete",
    ],
  }, {
    apiGroups: [
      "k8s.cni.cncf.io",
    ],
    resources: [
      "network-attachment-definitions",
    ],
    verbs: [
      "get",
      "list",
      "watch",
    ],
  }, {
    apiGroups: [
      "snapshot.kubevirt.io",
    ],
    resources: [
      "virtualmachinesnapshots",
      "virtualmachinerestores",
    ],
    verbs: [
      "get",
      "list",
      "watch",
      "create",
      "update",
      "patch",
      "delete",
    ],
  }],
}
---
{
  apiVersion: "rbac.authorization.k8s.io/v1",
  kind: "ClusterRoleBinding",
  metadata: {
    name: "kubevirt-console-group-access",
  },
  subjects: [{
    kind: "User",
    name: "oidc:georgi.panov@darkfellanetwork.com",
    apiGroup: "rbac.authorization.k8s.io",
  }],
  roleRef: {
    kind: "ClusterRole",
    name: "kubevirt-console-access",
    apiGroup: "rbac.authorization.k8s.io",
  },
}
