---
{
  apiVersion: "console.openshift.io/v1",
  kind: "ConsolePlugin",
  metadata: {
    name: "kubevirt-plugin",
  },
  spec: {
    displayName: "KubeVirt Plugin",
    description: "KubeVirt management plugin for OpenShift Console",
    backend: {
      type: "Service",
      service: {
        name: "kubevirt-plugin",
        namespace: "openshift-console",
        port: 8080,
      },
      proxy: [{
        type: "Service",
        alias: "kubevirt-plugin",
        endpoint: {
          type: "Service",
          service: {
            name: "kubevirt-plugin",
            namespace: "openshift-console",
            port: 8080,
          },
        },
      }],
    },
    i18n: {
      loadType: "Preload",
    },
  },
}
