---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "pgadmin",
  },
  spec: {
    components: [
      "../../../../components/volsync",
    ],
    dependsOn: [{
      name: "cloudnative-pg-cluster",
    }],
    postBuild: {
      substitute: {
        APP: "pgadmin",
        VOLSYNC_PUID: "5050",
        VOLSYNC_PGID: "5050",
      },
    },
    path: "./kubernetes/apps/pgadmin/pgadmin/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
    interval: "2h",
  },
}
