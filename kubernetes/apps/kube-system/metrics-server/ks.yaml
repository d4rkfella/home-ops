---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "metrics-server",
  },
  spec: {
    commonMetadata: {
      labels: {
        app.kubernetes.io/name: "metrics-server",
      },
    },
    path: "./kubernetes/apps/kube-system/metrics-server/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
    interval: "1h",
    timeout: "5m",
    retryInterval: "2m",
  },
}
