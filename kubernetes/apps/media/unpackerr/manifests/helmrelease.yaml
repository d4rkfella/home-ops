---
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "unpackerr",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "unpackerr",
    },
    values: {
      controllers: {
        unpackerr: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          containers: {
            app: {
              image: {
                repository: "ghcr.io/unpackerr/unpackerr",
                tag: "0.15.2@sha256:89e13608521ece21dd300c39229fd595a55fbf4b8152771af5670a7455b5c747",
              },
              env: {
                TZ: "Europe/Sofia",
                UN_WEBSERVER_METRICS: true,
                UN_WEBSERVER_LOG_FILE: "/logs/webserver.log",
                UN_ACTIVITY: true,
                UN_SONARR_0_URL: "http://sonarr.media.svc.cluster.local",
                UN_SONARR_0_PATHS_0: "/data/downloads/torrents/tv",
                UN_RADARR_0_URL: "http://radarr.media.svc.cluster.local",
                UN_RADARR_0_PATHS_0: "/data/downloads/torrents/movies",
              },
              envFrom: [{
                secretRef: {
                  name: "{{ .Release.Name }}-secret",
                },
              }],
              probes: {
                liveness: {
                  enabled: true,
                },
                readiness: {
                  enabled: true,
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
              resources: {
                requests: {
                  cpu: "10m",
                },
                limits: {
                  memory: "4Gi",
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      service: {
        app: {
          controller: "unpackerr",
          ports: {
            http: {
              port: 5656,
            },
          },
        },
      },
      serviceMonitor: {
        app: {
          serviceName: "unpackerr",
          endpoints: [{
            port: "http",
            scheme: "http",
            path: "/metrics",
            interval: "1m",
            scrapeTimeout: "10s",
          }],
        },
      },
      persistence: {
        logs: {
          type: "emptyDir",
        },
        media: {
          type: "nfs",
          server: "192.168.91.40",
          path: "/mnt/exos20/data/downloads/torrents",
          globalMounts: [{
            path: "/data/downloads/torrents",
          }],
        },
      },
    },
  },
}
