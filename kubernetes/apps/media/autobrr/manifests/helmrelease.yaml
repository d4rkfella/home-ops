---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "autobrr",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "autobrr",
    },
    values: {
      controllers: {
        autobrr: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          containers: {
            app: {
              image: {
                repository: "ghcr.io/d4rkfella/autobrr",
                tag: "1.75.1@sha256:deb87958b951c7811c576984aef96bf9ec63f0cca81eee7f5fb661333dd7a9d4",
              },
              env: {
                TZ: "Europe/Sofia",
                AUTOBRR__CHECK_FOR_UPDATES: "false",
                AUTOBRR__HOST: "0.0.0.0",
                AUTOBRR__PORT: 80,
                AUTOBRR__METRICS_ENABLED: true,
                AUTOBRR__METRICS_HOST: "0.0.0.0",
                AUTOBRR__METRICS_PORT: 9094,
                AUTOBRR__LOG_PATH: "/config/log",
                AUTOBRR__LOG_LEVEL: "INFO",
                AUTOBRR__OIDC_DISABLE_BUILT_IN_LOGIN: "true",
                AUTOBRR__DATABASE_TYPE: "postgres",
                AUTOBRR__POSTGRES_DATABASE: "autobrr",
                AUTOBRR__POSTGRES_HOST: "postgres-db-rw.database.svc.cluster.local",
                AUTOBRR__POSTGRES_PORT: 5432,
                AUTOBRR__POSTGRES_SSLMODE: "verify-full",
                AUTOBRR__POSTGRES_EXTRA_PARAMS: "sslrootcert=/etc/ssl/certs/postgres-ca.crt",
                AUTOBRR__SESSION_SECRET: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "{{ .Release.Name }}-secret",
                      key: "SESSION_SECRET",
                    },
                  },
                },
                AUTOBRR__POSTGRES_USER: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "{{ .Release.Name }}-secret",
                      key: "POSTGRES_USERNAME",
                    },
                  },
                },
                AUTOBRR__POSTGRES_PASS: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "{{ .Release.Name }}-secret",
                      key: "POSTGRES_PASSWORD",
                    },
                  },
                },
                AUTOBRR__OIDC_ENABLED: "true",
                AUTOBRR__OIDC_ISSUER: "https://accounts.darkfellanetwork.com/realms/DarkfellaNET",
                AUTOBRR__OIDC_CLIENT_ID: "93ebcd6f-7b49-4967-bb42-9b9634c67c14",
                AUTOBRR__OIDC_CLIENT_SECRET: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "{{ .Release.Name }}-secret",
                      key: "CLIENT_SECRET",
                    },
                  },
                },
                AUTOBRR__OIDC_REDIRECT_URL: "https://autobrr.darkfellanetwork.com/api/auth/oidc/callback",
              },
              probes: {
                liveness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/api/healthz/liveness",
                      port: 80,
                    },
                    initialDelaySeconds: 2,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
                readiness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/api/healthz/readiness",
                      port: 80,
                    },
                    initialDelaySeconds: 0,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
              resources: {
                requests: {
                  cpu: "10m",
                },
                limits: {
                  cpu: "2000m",
                  memory: "256Mi",
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        hostUsers: false,
        hostAliases: [{
          ip: "192.168.91.52",
          hostnames: [
            "radarr.darkfellanetwork.com",
            "sonarr.darkfellanetwork.com",
            "cross-seed.darkfellanetwork.com",
          ],
        }, {
          ip: "192.168.91.51",
          hostnames: [
            "accounts.darkfellanetwork.com",
          ],
        }],
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      service: {
        app: {
          controller: "autobrr",
          ports: {
            http: {
              port: 80,
            },
            metrics: {
              port: 9094,
            },
          },
        },
      },
      serviceMonitor: {
        app: {
          serviceName: "autobrr",
          endpoints: [{
            port: "metrics",
          }],
        },
      },
      route: {
        app: {
          hostnames: [
            "{{ .Release.Name }}.darkfellanetwork.com",
          ],
          parentRefs: [{
            name: "internal",
            namespace: "envoy-gateway-system",
            sectionName: "https",
          }],
          rules: [{
            backendRefs: [{
              name: "autobrr",
              port: 80,
            }],
          }],
        },
      },
      persistence: {
        config: {
          type: "emptyDir",
          advancedMounts: {
            autobrr: {
              app: [{
                path: "/config",
              }],
            },
          },
        },
        tmp: {
          type: "emptyDir",
          advancedMounts: {
            autobrr: {
              app: [{
                path: "/tmp",
              }],
            },
          },
        },
        postgres-ca: {
          type: "secret",
          name: "{{ .Release.Name }}-secret",
          advancedMounts: {
            autobrr: {
              app: [{
                path: "/etc/ssl/certs/postgres-ca.crt",
                subPath: "ca.crt",
                readOnly: true,
              }],
            },
          },
        },
      },
    },
  },
}
