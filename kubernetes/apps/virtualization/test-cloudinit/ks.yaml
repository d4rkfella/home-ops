---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "nas-test",
  },
  spec: {
    interval: "1h",
    path: "./kubernetes/apps/virtualization/test-cloudinit/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    healthChecks: [{
      apiVersion: "kubevirt.io/v1",
      kind: "VirtualMachine",
      name: "nas-test",
      namespace: "virtualization",
    }],
    healthCheckExprs: [{
      apiVersion: "kubevirt.io/v1",
      kind: "VirtualMachine",
      failed: "status.conditions.filter(e, e.type == 'AgentConnected').all(e, e.status == 'False')",
      current: "status.conditions.filter(e, e.type == 'AgentConnected').all(e, e.status == 'True')",
    }],
  },
}
