---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "home-ops-runner",
  },
  spec: {
    dependsOn: [{
      name: "actions-runner-controller",
      namespace: "arc-system",
    }],
    path: "./kubernetes/apps/arc-runners/home-ops-runner/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    interval: "1h",
    wait: false,
  },
}
