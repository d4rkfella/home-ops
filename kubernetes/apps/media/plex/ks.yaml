---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "plex",
  },
  spec: {
    components: [
      "../../../../components/volsync",
    ],
    dependsOn: [{
      name: "volsync",
      namespace: "volsync-system",
    }, {
      name: "gpu-operator",
      namespace: "gpu-operator",
    }],
    path: "./kubernetes/apps/media/plex/manifests",
    postBuild: {
      substitute: {
        APP: "plex",
        VOLSYNC_CAPACITY: "16Gi",
        VOLSYNC_CACHE_CAPACITY: "8Gi",
      },
    },
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: false,
    interval: "1h",
  },
}
