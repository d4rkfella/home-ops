---
{
  apiVersion: "source.toolkit.fluxcd.io/v1",
  kind: "OCIRepository",
  metadata: {
    name: "loki",
  },
  spec: {
    interval: "1h",
    layerSelector: {
      mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip",
      operation: "copy",
    },
    url: "oci://ghcr.io/d4rkfella/charts-mirror/loki",
    ref: {
      tag: "6.55.0",
    },
    verify: {
      provider: "cosign",
      matchOIDCIdentity: [{
        issuer: "https://token.actions.githubusercontent.com",
        subject: "https://github.com/d4rkfella/charts-mirror/.github/workflows/chart-builder.yaml@refs/heads/main",
      }],
    },
  },
}
