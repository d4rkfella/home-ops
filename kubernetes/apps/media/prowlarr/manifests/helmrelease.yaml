---
{
  # yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "prowlarr",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "app-template",
    },
    values: {
      controllers: {
        prowlarr: {
          annotations: {
            reloader.stakater.com/auto: "true",
          },
          containers: {
            app: {
              image: {
                repository: "ghcr.io/d4rkfella/prowlarr",
                tag: "2.3.3@sha256:cfd431dc84a2da8631472161ebd6ad9797df6412978476c7f472b368956100d5",
              },
              env: {
                TZ: "Europe/Sofia",
                PROWLARR__APP__INSTANCENAME: "Prowlarr",
                PROWLARR__APP__THEME: "dark",
                PROWLARR__AUTH__METHOD: "External",
                PROWLARR__AUTH__REQUIRED: "DisabledForLocalAddresses",
                PROWLARR__LOG__DBENABLED: "False",
                PROWLARR__LOG__LEVEL: "info",
                PROWLARR__SERVER__BINDADDRESS: "0.0.0.0",
                PROWLARR__SERVER__PORT: 80,
                PROWLARR__AUTH__APIKEY: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "{{ .Release.Name }}-secret",
                      key: "PROWLARR_API_KEY",
                    },
                  },
                },
                PROWLARR__POSTGRES__HOST: "postgres-db-rw.database.svc.cluster.local",
                PROWLARR__POSTGRES__MAINDB: "{{ .Release.Name }}",
                PROWLARR__POSTGRES__USER: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "{{ .Release.Name }}-secret",
                      key: "POSTGRES_USERNAME",
                    },
                  },
                },
                PROWLARR__POSTGRES__PASSWORD: {
                  valueFrom: {
                    secretKeyRef: {
                      name: "{{ .Release.Name }}-secret",
                      key: "POSTGRES_PASSWORD",
                    },
                  },
                },
              },
              probes: {
                liveness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/ping",
                      port: 80,
                    },
                    initialDelaySeconds: 2,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
                readiness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/ping",
                      port: 80,
                    },
                    initialDelaySeconds: 2,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
              },
              resources: {
                requests: {
                  cpu: "100m",
                },
                limits: {
                  memory: "1Gi",
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: true,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 65532,
          runAsGroup: 65532,
          fsGroup: 65532,
          fsGroupChangePolicy: "OnRootMismatch",
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      service: {
        app: {
          controller: "prowlarr",
          ports: {
            http: {
              port: 80,
            },
          },
        },
      },
      route: {
        app: {
          hostnames: [
            "{{ .Release.Name }}.darkfellanetwork.com",
          ],
          parentRefs: [{
            name: "internal",
            namespace: "envoy-gateway-system",
            sectionName: "https",
          }],
          rules: [{
            backendRefs: [{
              name: "prowlarr",
              port: 80,
            }],
          }],
        },
      },
      persistence: {
        config: {
          type: "emptyDir",
          globalMounts: [{
            path: "/config",
          }],
        },
        tmp: {
          type: "emptyDir",
        },
      },
    },
  },
}
