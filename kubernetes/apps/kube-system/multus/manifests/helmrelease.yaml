---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "multus",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "multus",
    },
    postRenderers: [{
      kustomize: {
        patches: [{
          target: {
            kind: "DaemonSet",
            name: "multus",
          },
          patch: "\
             - op: add\n\
            \  path: /spec/template/spec/containers/0/args\n\
            \  value:\n\
            \    - \"--cleanup-config-on-exit\"\n\
            \    - \"--multus-bin-file=/usr/bin/multus\"\n\
            \    - \"--multus-cni-conf-dir=/tmp\"\n\
            ",
        }],
      },
    }],
    values: {
      cni-plugins: {
        image: {
          repository: "ghcr.io/d4rkfella/cni-plugins",
          tag: "1.9.1@sha256:2b210f56bf78f125ec5a502ec34a4e2709b64b7ac163f194fdc99e4a78d283db",
        },
        resources: {},
      },
      multus: {
        image: {
          repository: "ghcr.io/d4rkfella/multus-cni",
          tag: "4.2.4@sha256:db66c8a561ea2dfc6e94b602451e1a95b38fbc89aa10b39db8e8c8e320e2d0dc",
        },
        resources: {
          requests: {
            cpu: "10m",
          },
          limits: {
            memory: "512Mi",
          },
        },
      },
      cni: {
        netPath: "/etc/cni/net.d",
        binPath: "/opt/cni/bin",
      },
    },
  },
}
