---
{
  apiVersion: "external-secrets.io/v1",
  kind: "ExternalSecret",
  metadata: {
    name: "keycloak",
  },
  spec: {
    secretStoreRef: {
      kind: "ClusterSecretStore",
      name: "hashicorp-vault",
    },
    target: {
      name: "keycloak-secret",
    },
    dataFrom: [{
      extract: {
        key: "secrets/keycloak",
      },
    }, {
      extract: {
        key: "secrets/certificates/postgres",
      },
    }],
  },
}
