---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "cloudnative-pg-barman-cloud",
  },
  spec: {
    dependsOn: [{
      name: "cert-manager",
      namespace: "cert-manager",
    }, {
      name: "cloudnative-pg-operator",
    }],
    path: "./kubernetes/apps/database/barman-cloud/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    wait: true,
    interval: "1h",
  },
}
