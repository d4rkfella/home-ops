---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
{
  apiVersion: "helm.toolkit.fluxcd.io/v2",
  kind: "HelmRelease",
  metadata: {
    name: "flaresolverr",
  },
  spec: {
    interval: "1h",
    chartRef: {
      kind: "OCIRepository",
      name: "flaresolverr",
    },
    values: {
      controllers: {
        flaresolverr: {
          containers: {
            app: {
              image: {
                repository: "ghcr.io/flaresolverr/flaresolverr",
                tag: "v3.4.6@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e",
              },
              env: {
                TZ: "Europe/Sofia",
                PORT: 80,
                HOST: "0.0.0.0",
                TEST_URL: "https://www.google.com",
                BROWSER_TIMEOUT: 40000,
                HEADLESS: true,
                LOG_LEVEL: "info",
                LOG_HTML: false,
                CAPTCHA_SOLVER: "none",
              },
              probes: {
                liveness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/health",
                      port: 80,
                    },
                    initialDelaySeconds: 0,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
                readiness: {
                  enabled: true,
                  custom: true,
                  spec: {
                    httpGet: {
                      path: "/health",
                      port: 80,
                    },
                    initialDelaySeconds: 0,
                    periodSeconds: 10,
                    timeoutSeconds: 1,
                    failureThreshold: 3,
                  },
                },
              },
              securityContext: {
                allowPrivilegeEscalation: false,
                readOnlyRootFilesystem: false,
                capabilities: {
                  drop: [
                    "ALL",
                  ],
                },
              },
              resources: {
                requests: {
                  cpu: "10m",
                },
                limits: {
                  memory: "1024Mi",
                },
              },
            },
          },
        },
      },
      defaultPodOptions: {
        hostUsers: false,
        securityContext: {
          runAsNonRoot: true,
          runAsUser: 1000,
          runAsGroup: 1000,
          fsGroup: 1000,
          fsGroupChangePolicy: "OnRootMismatch",
          seccompProfile: {
            type: "RuntimeDefault",
          },
        },
      },
      service: {
        app: {
          controller: "flaresolverr",
          ports: {
            http: {
              port: 80,
            },
          },
        },
      },
      persistence: {
        tmp: {
          type: "emptyDir",
        },
      },
    },
  },
}
