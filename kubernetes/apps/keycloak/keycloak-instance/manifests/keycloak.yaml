---
# yaml-language-server: $schema=https://kubernetes-schemas-9iu.pages.dev/k8s.keycloak.org/keycloak_v2alpha1.json
{
  apiVersion: "k8s.keycloak.org/v2beta1",
  kind: "Keycloak",
  metadata: {
    name: "keycloak",
  },
  spec: {
    unsupported: {
      podTemplate: {
        metadata: {
          annotations: {
            security.darkfellanetwork.com/mount-postgres-ca: "true",
          },
        },
        spec: {
          volumes: [{
            name: "tmpfs",
            emptyDir: {},
          }, {
            name: "data",
            emptyDir: {},
          }],
          containers: [{
            name: "keycloak",
            env: [{
              name: "KC_DB_URL_PROPERTIES",
              value: "?sslmode=verify-full&sslrootcert=/etc/ssl/certs/postgres-ca.crt",
            }],
            volumeMounts: [{
              name: "data",
              mountPath: "/usr/share/java/keycloak/data",
            }, {
              name: "tmpfs",
              mountPath: "/tmp",
            }],
            securityContext: {
              allowPrivilegeEscalation: false,
              readOnlyRootFilesystem: true,
              capabilities: {
                drop: [
                  "ALL",
                ],
              },
            },
          }],
          securityContext: {
            runAsUser: 65532,
            runAsGroup: 65532,
            runAsNonRoot: true,
            seccompProfile: {
              type: "RuntimeDefault",
            },
          },
          hostUsers: false,
        },
      },
    },
    db: {
      vendor: "postgres",
      usernameSecret: {
        name: "keycloak-secret",
        key: "POSTGRES_USERNAME",
      },
      passwordSecret: {
        name: "keycloak-secret",
        key: "POSTGRES_PASSWORD",
      },
      host: "postgres-db-rw.database.svc.cluster.local",
      database: "keycloak",
      port: 5432,
      schema: "public",
    },
    instances: 1,
    image: "ghcr.io/d4rkfella/keycloak:26.7.0@sha256:809b97240eb9cb9cf0e3b700a5460d57bfb70c2e3a2717fd28dc55172e4ea6d5",
    startOptimized: true,
    proxy: {
      headers: "xforwarded",
    },
    hostname: {
      hostname: "https://accounts.darkfellanetwork.com",
    },
    http: {
      httpEnabled: true,
      httpPort: 8080,
    },
    ingress: {
      enabled: false,
    },
  },
}
