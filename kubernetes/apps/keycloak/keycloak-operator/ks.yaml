---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/source.toolkit.fluxcd.io/gitrepository_v1.json
{
  apiVersion: "source.toolkit.fluxcd.io/v1",
  kind: "GitRepository",
  metadata: {
    name: "keycloak-k8s-resources",
  },
  spec: {
    interval: "1h",
    url: "https://github.com/keycloak/keycloak-k8s-resources",
    ref: {
      tag: "26.6.1",
    },
    ignore: "\
       /*\n\
       !/kubernetes\n\
      ",
  },
}
---
# yaml-language-server: $schema=https://51f35e2d.kubernetes-schemas-9iu.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "keycloak-operator",
  },
  spec: {
    interval: "1h",
    path: "./kubernetes",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "keycloak-k8s-resources",
    },
    healthChecks: [{
      apiVersion: "apiextensions.k8s.io/v1",
      kind: "CustomResourceDefinition",
      name: "keycloaks.k8s.keycloak.org",
    }, {
      apiVersion: "apps/v1",
      kind: "Deployment",
      name: "keycloak-operator",
      namespace: "keycloak",
    }],
  },
}
