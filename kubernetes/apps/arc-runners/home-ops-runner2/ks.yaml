---
{
  apiVersion: "kustomize.toolkit.fluxcd.io/v1",
  kind: "Kustomization",
  metadata: {
    name: "home-ops-runner2",
  },
  spec: {
    dependsOn: [{
      name: "actions-runner-controller",
      namespace: "arc-system",
    }],
    path: "./kubernetes/apps/arc-runners/home-ops-runner2/manifests",
    prune: true,
    sourceRef: {
      kind: "GitRepository",
      name: "flux-system",
      namespace: "flux-system",
    },
    interval: "1h",
    wait: false,
  },
}
